body:
  text: 江村銷夏録卷一詹事府詹事髙士竒撰晉右軍王羲之袁生帖紙本髙八寸濶三寸計三行得袁二謝書具為慰袁生暫至都已還未此生至到之懷吾所盡也音釋本法書要録右草書計二十六字宋宣和御府收藏月白簽御標晉王羲之袁生帖七字泥金楷書晉字微有剝損黃絹隔水右邊鈐印長方雙龍璽二方御書瓢印一方本帖之右圓雙龍璽一方宣和連章一方帖左政和宣和二璽鈐印長方雙龍璽二方政和連章一方後有內府圖書之印末有真賞瓢章華夏藏印蓋錫山華氏故物摹入真賞齋帖者以火前刻本較之毫髮不爽外用宋刻絲裝褾織成仙山樓閣顔色秀麗界畫精工煙雲縹眇絶似李思訓雖筆墨追摹恐未易到非是帖不足以當之也右王右軍袁生帖曽入宣和御府即書譜所載淳化第六卷亦載此帖是又嘗入太宗御府而黃長睿閣帖考嘗致詳於此然閣帖本較此微有不同不知當時臨摹失真或淳化所收别是摹本皆不可知而此帖八璽爛然其後覃紙及內府圖書之印皆宣和裝池故物也而金書標籖又出祐陵親劄當是真迹無疑此帖舊藏吳興嚴氏震直家震直洪武中仕為工部尚書家多法書後皆散失吾友沈維時購得之嘗以示豫今復見於華中甫氏中甫嘗以勒石矣顧真迹無前人題識俾豫疏其本末如此徴明跋嘉靖十年嵗在辛卯九月朔長洲文王右軍書千字文卷紙本髙八寸長九尺三寸凡七接計一百十二行魏太尉鍾繇千字文右軍將軍王羲之奉敕書文不録行書二儀日月雲霧嚴霜起字大如錢至末尾右滅秦及焉哉乎也等字倍大渾圓遒徑筆力雄偉前有雙龍璽宣和鈐印祕府瓢印內殿珍玩晉府書畫之印希世之寶黃綾隔水上有御書瓢印晉國奎章項氏收藏諸印張氏珍玩楊氏家藏後有明昌寶玩秋壑圖書鈐記有宣和政和小璽歐陽玄印楊士竒印覃紙有羣玉中祕明昌御覽平海軍節度使之印吳俊仲傑小印鬱岡齋曽摹之入石跋云觀此帖者必有宋板大明律之疑不知閣帖之首已有章草千文雖未必是漢章帝書亦可證千文不始於梁人矣米元章書家申韓豈妄許可者亦稱此帖筆力圓熟定為右軍書臨池之工得不矜重奉為模範耶損菴老人書唐栁諫議小楷度人經卷硬黃箋髙不及八寸長九尺四寸凡六接太上洞元靈寶無量度人上品妙經文不録翰林學士諫議大夫知制誥賜紫金魚袋栁公權書於上都昭成觀永充供養讀誦昭成觀內供奉經法大德三洞道士孫文杲校勘觀察支使給事郎殿中侍御史內供奉長孫公受界造有唐開成三年嵗在戊午正月十六日記卧雲道士來相辭相辭倐忽何所之紫閣當春凝煙靄東風吹岸花枝枝藥成酒熟有時節寒食恐失松間期冥鴻復見傷弓翼髙飛轉展心無疑滿瀉數杯酒狂吟幾首詩留不住去不悲醯雞蜉蝣安得知玄題大順元年二月十九日華山道士魚又右烏絲行連魚書共計二百餘行前有宣和政和後有大觀宣和諸璽真德秀印記二方檇李圓印少溪主人桃花村裏人家蘭石主人等藏印卷中麗字其上從二丙淵字世民字皆諱筆項司馬少卿家以授仲子希憲內有希憲子長鈐印之見此硬黃小字臨黃庭曩曽見之獨度人經未開成年栁誠懸得意細楷也有宣和標題可證時一展誦便到黍珠鬱羅蕭臺又何必太清頂𩕳之表前集賢待制馮子振奉書皇姊大長公主命題右軍曽寫換鵝經珠黍仙骨氣清看到栁公心正處千年筆諫尚馳名繇趙巖宋僅得四十四人正書之擅名者自魏鍾至於而唐栁誠懸實錚錚乎其間則夫墨妙筆精有不待贊矣其入宋祕府凡六帖而書度人經者二此卷特其一爾是經乃晉宋人偽作至誠懸時相傳稍久故信而書之近代紫陽方回則謂五季蜀王建時道士王喬始造且確然弗自疑不幾於甚可笑歟使回見誠懸此書吾知其顙有泚矣洪武九年六月十五日翰林學士承旨金華宋濂謹記深頓首頓首辱不鄙棄馳示栁誠懸真迹希世之寶也前題後跋皆佳我師尊篤好致此異品掩照一拂過目已若刮金箆何當得把玩纍日也大寶不敢久留竊恐穿壁飛去幸檢入草草上記少宰相公蒲汀老師函丈門生陸深百拜誠懸十二工吟咏元和天子知名姓侍書祕殿論揮毫旨哉心正則筆正文宗再召直𢎞文瑰詞俄頃飛泉迸風亭賜對夜何其絳燭將殘語未竟重濡蠟液繼焚膏翠袖紅粧暗窺映外夷泛海覓公書萬里籯金櫝寶聘鐫碑勒石赫當時子孫不求為不敬然公非徒翰墨名遇事侃侃輒諫諍志業秋霜朗日存一一有禆唐末政晦明寒暑遞乘除斷簡殘箋如景慶千言小字度人經楷法端嚴筋力徑書供昭成觀裏藏開成戊午時寅孟人寰亦有歐褚書鼓旗那敢相凌競硬黃宫紙理細膩徽宗雙璽色明靚華山道士魚又玄煙靄花枝句交橫煌煌馮趙兩元臣題奉大長公主命辨晰源流誰最精金華學士握犀柄夜來雷雨過庭階萬里澄藍天宇淨髹几藤牀清畫看恍啓寒奩出明鏡江村髙士竒題唐僧義道書法華經硬黃箋二十七幅髙八寸濶一尺六寸每行四十字妙法蓮華經序品第一文不録東晉後秦鳩摩羅法師譯大唐貞元十一年嵗次丙子五月辛卯朔十五日己巳婺州金華觀音寺僧闕升清恐代改時移故有斯記生前共寫女人陳燕子丁法華一經是經之王若人受持讀誦正憶念解其義趣其功其德不可思議若但書寫是人命終當生忉利天上如來是真語者實語者豈虛言哉唐僧義道與女人陳燕子丁共以小楷細書是經為薦亡母解脫清升觀其點畫波撇一一珠回玉轉文彩墨光照耀眼目若出一手者也千載之下使人見之無不頂戴喜躍其孝誠之心蓋可見矣薊門李周輕氏多親近善知識或受是經周輕藏弆有年夜光之璧明月之珠雖希世之寶以是經出世大寶比之則失其貴矣周輕徴豫題其後是經何義存翁法師敷文布於前豫尚何言哉是軸甚為難有周輕宜加護焉洪武二十八年蒼龍乙亥春三月念又三日獨菴比丘道衍希有歷兵火如是法寶甚深微妙如是墨寶甚難劫了無斷滅天龍神鬼所共護持懷祖居士有大因緣獲兹殊特頂禮讚歎如佛塔廟從一點一畫乃至千億現光明藏無有窮盡勿隨世文字觀而生隨喜辛丑淳園龔鼎孳同善女人智珠合十拜題於長安精舍之香嚴居共寫小字法華經一唐僧義道偕其妹陳燕子丁部字小於顔之麻姑壇褚之隂符經而結構精雅視顔稍逸視褚稍莊雖不敢謂闕前然可與二公同日而道也其卷尾題云恐代改時移故有斯記此僧殊自負今千年矣紙墨完好七卷自始至終無毫髮遺恨雖收藏好事者之力亦此僧願力所持也向藏我鄉顧光祿家眉公一見驚異載之祕笈中但題女人姓名為燕子丁子丁自當以原文為正前一跋稱原文乃陳燕菴比丘道衍為姚少師廣孝應是初選從燕邸北來時猶然本色衲僧結字亦莊雅流傳薊門而光祿購得之今歸吾友張子懷祖甚為得所懷祖書法本於黃庭樂毅與書是經者同師右軍也豫不善書而好論書私謂晉人得書道唐人得書法宋人得書力明人得書度此經乃法勝懷祖謂豫言固發所未發第疑晉唐宋若遞降而度優於力恐南宫忠惠未肯為祝文陸董諸公屈豫笑語懷祖子當自為力闕哉順我論若為子也子且軼法而道何論時代治甲午仲春十一日為懷祖先生題同郡宋徴輿唐張萱漢宫祈巧圖絹本立軸長四尺七寸濶三尺二寸唐張萱真迹流傳者絶少此圖乃其尤最者向藏宣和御府所作朱欄碧瓦曲折工麗極盡六宫之勝凡筵盤盂種種臻妙宫嬪三十一人晚粧妍靚端莊豐厚各具意態至於庭柯掩靄儼然夜色洵非神手不辦也夕漏點無聲銀河白未央虬鑰扃漢殿涼輕秋七千門露冷芙蓉深院隔瓊箱綵襻夜軒陳荆艷燕佳出宫掖越羅嫌薄怯宵沈紅粉含羞恨月魄重重綺檻珠櫳開一一衣裁天水碧不畏苔階濕鳯鞋爭把瑛盤飣果核鵲橋遙盼禱天孫金錯為刀玉為尺翠鬢花鈿笑語低九孔針穿覓纎隙香緘疊成比目魚鸞帳縫作同心翮鮮雲半斂起微風苑外人家散薌澤自然蕙質巧偏多細網蛛絲愛聨繹當時祕事誰得知京兆張萱偶採托點綴梧桐金井間竹榭花蹊臨太液流傳世上凡有三譜在宣和舊圖籍汴宋亡來落市廛明昌天歷幾搜索兹軸猶存見態度南北收藏比拱璧筆裝玳瑁硯眉子細寫宮箋辨真迹江村髙士竒題唐李升袁安卧雪圖絹本立軸長四尺二寸五分濶二尺八寸五分徽宗瘦金書唐李升袁安卧雪圖真迹於首右圓雙龍印左御書瓢印及御書之寶下左角松雪齋印此圖以焦墨作山石皴法蒼莽非人力可到人物樹木略設淡色生動異常隆暑張之凜然有寒意傳寶於世幾及千年而絹素完潔尤為所難真希世之珍也五代阮郜閬苑女仙圖卷絹本髙一尺三寸長五尺餘隔水綾上有內府合同養字十九號字一行及宣和收藏諸印此其一也樹石按宣和畫譜御府所藏郜畫有四皆用金碧間以珊瑚琅玕之屬景物瑰麗望而知為仙境仙姬五人侍從者十六人皆古衣冠翺翔往來為態非一鄧子方所題得其髣佛矣鳴於當阮郜是五代人仕太常以善畫人物士女時蓋多習於唐周昉王朏筆法傳世不多得今觀此女仙圖有纖穠淑婉之態瑤池閬苑風景霓旌羽蓋飄飄凌雲萼緑雙成可以宛見令人玩愛不肯釋手而此曽入宣和內府復克傳至於今誠為珍寶當什襲之重於白珩也時元統甲戌重九日觀於崇真萬夀宫之承慶堂商梃題閬風元圃仙女居阮生寫作羣仙圖蒼松根老琥珀伏海波突起珊瑚株翠樹瑤華紛逺近細草若展青氍毺樓臺迥隱五雲表别有世界非堪輿仙姿縹眇各有態絶食煙火餐瓊蔬兩仙拈筆點花露長者宴坐看琅書一仙倚石間摘阮一仙偃蹇被長袪其中一仙速相就珮聲微響如雲趨羽扇雲環盡婀娜忽見龍鶴來天衢翩然復有一仙至乘飈御氣三從俱我疑數仙天帝女帝傍暫别遊清都俯視塵網中穢濁何紛如人間光景疾如箭壺中日月無居諸舞白鳯歌且謠有耳只解聞雲韶永超劫外何逍遙紫陽真人持勿驕佇當來迎共食瑤海桃上清鄧宇題於神樂方丈交光雪月射層臺霧縠氷綃費剪裁認得玉真遊戲處畫師可是女牀來剩水殘山五季頻閬風不受海東塵羊權漫乞金跳脫爭似雙鬟卷裏人辛未春三月江村高士竒題五代董北苑溪山行旅圖絹本半幅立軸長三尺四寸濶一尺六寸水墨畫無款印畫之髙古自不待言其從來受授思翁言之已詳跋在邉綾兩傍小楷致佳嚮之所稱江南半幅董源真迹者此也於江南不能得萬厯癸巳春與友余求董北苑畫人飲顧仲方第因語及之仲方曰公入長安從張樂山金吾購之此有真迹乃從吾郡馬耆清和尚往者先是豫少時於清公觀畫猶歷歷在眼特不知為北苑耳比入都三日有徽人吳江村持畫數幅謁余余方肅客倦甚未及發其畫首叩之曰君知有張金吾樂山否吳愕然曰其人已千古矣公何為詢之亟也余曰吾家北苑畫無恙否吳執圖以上曰即此是余驚喜不自持展看之次如逢舊友亦有冥數云旅辛丑五月草六日記田有自臨此畫為溪山行圖沈石田家藏物石溪山行旅用𨽻書題款亦妙手也玄宰北宋僧巨然煙浮逺岫圖絹本立軸長五尺二寸寬一尺六寸大山滿幅層疊蒼莽下有巖谷樹木一兩重曲折而入似深隱者筆墨沈酣非南宋人可及按宣和畫譜此圖有六必是雙幅絹兹其一也四角有宣和小璽押縫左角有天目山房藏書之印黃綾橫隔水上宋徽宗御題巨然煙浮逺岫圖宋范文正公與尹師魯二劄一紙髙尺一長一尺七寸一紙髙尺一長一尺三寸仲淹啓熱中得回問知漢中尤甚然西洛上京皆苦熱宣下開井救暍者此可知矣三兩日來因雨微涼彼亦然矣折支已差人許州般取到即走報不易闕請見錢者猶煎熬不足蓋日給外月月有橫費處家家如之邠酒四瓶近寄來請收檢鄧醖已竭候新者送去合得花蛇散空心可日一服甚有功恐疑之和方寄上希多愛多愛不宣仲淹上師魯舍人左右七月十四日新牧舊識候到即有書去兼是棊侣也先託伸意仲淹頓首李寺丞行曽奉闕削遞中亦領來教承動止休勝仲淹此中無事闕兒子病未得全愈亦漸退減田元均書來専送上近得闕揚州書甚問師魯亦已報他貧且安也暑中且得未動亦佳惟君子為能樂是正在此矣加愛加愛不宣仲淹闕師魯舍人左右四月草七日師魯自均州輿疾至南陽託范公以死蓋平日之相豫者如此四明樓爚書紹興三年十月晦范公二帖皆是師魯謫漢東時書後一帖却當在前或是自均過鄧託范公以死時問訊之書與衆云云之戒可見也賢者困厄至此人到於今傷之藏之深固之密石可朽名不滅歐公銘文盡之矣佳洪邁書得得來主人雙眼為渠開逢人莫説當客千山時事且泊南亭把一杯戒右第二紙當是尹自均來訪范於南陽時也范尹以不須與衆云云此意最深書淳熙戊申三月草八日廬陵楊萬里敬靜翁近又收得此二帖乃文正公與尹師魯書也交情古誼百世之下尚可想見視他帖尤當珍愛學士大夫所願見而不可得者况尤樓洪楊四公之題識亦豈復可得哉賢子孫永宜寶之至順四年五月五日後學東昜胡助謹書異議出知饒景祐二年公上論遷都事與吕文靖州祕書丞集賢校理余靖言加罪言者非太平之政坐落職監均州酒稅而太子中允館閣校勘尹洙又言范某義兼師友乞從降黜亦坐貶從信軍節度掌書記監郢州酒稅此帖皆尹公在郢時所遣問若曰日給外月月有橫費家家如之至於收檢邠酒候送鄧醖合花蛇散和方送上見朋友有救恤之義而惟君子樂道為能盡之也其後公鎮鄧尹公再貶監均州酒稅輿疾來鄧以存沒託公則公之於尹公可謂生死不易其諒矣然楊洪二公跋語以第二帖是自均來南陽時且有不須與衆云云之戒今帖中乃無此語然以動止休佳及報他貧且安也等言證之則非疾時矣恐此跋非此帖也前銜縫有王厚之順伯隂文十六字印知為順伯所藏順伯臨川王和父之孫好古博物為中興第一徽文公與之友善集中載其書問可考也田元均諱况蓋諡宣簡云東陽後學栁貫謹識公自謂與范公義兼師友而其言談罕及於性尹命至尹公處死生之變尤人所難及非知道者不足以與於此蓋是時風俗醇厚士大夫不言而躬行未至立名字以相髙此宋三百年極盛之際也伏觀范公遺帖安得不為之撫卷而三歎乎至正七年春正月甲子後學黃溍敬觀知饒州尹公景祐四年文正公既以言吕夷簡出師魯亦貶監郢州酒稅慶歷四年尹為涇原經略以爭城水洛事為董士廉所訟再貶均州監稅時文正公在政府也踰年公出知邠州又改鄧州此二帖蓋在鄧與尹者夫以尹公之賢文正公於其生也通以書而盡其慰問之誠歐陽公又於其沒也為之銘以致其痛惜之意好賢樂善固如是哉文至元四年後戊寅十有一月望後學鄭僖書又正公與尹師魯帖詞翰俱不易得名公題跋盡美愚何幸身親見之唐劉魁拜識成化辛丑六月草日髙尹師魯何如人而克致范文正公之敬愛若是耶余嘗考之師魯以靜退為樂以古文矯俗其行髙學古可知巳及觀文正黜知饒州師魯請同降黜其臣節友誼又可知己宜其為文正之所敬愛帖簡往還契之若金蘭而友之若兄弟也噫觀文正遺翰留芳千載一日師魯之名得與同垂不朽亦何幸哉有成化辛丑秋八月八日句曲戴仁敬題宋盛時西夏之擾范公與師魯合謀戮力以抗之相得甚深蓋以道義事功為友者也此二帖公與師魯者其一已刻於文正尺牘中寬嘗閲之何幸今日復獲見此真迹哉然二帖不藏於尹氏顧歸於文正子孫則其後世之盛衰亦可知矣鄉後學吳寬謹書師魯舍人二劄蓋家人寒暄語耳范文正公與尹未幾而為師魯經紀身後志其遺行至今為士林所稱則君臣父子朋友之道此實基之故不當以書家論也跋者如宋洪文敏邁之博學樓宣獻鑰楊文節萬里明吳文定寬之學行元栁待制貫黃文獻溍之詞萟汪文節澤民台哈巴哈忠介之死節皆卓然名縉紳與二公風猷節槩固有相感異代者敬為識之考胡古愚跋稱尤樓洪楊尤是文簡公袤錫人也以祕監終得諡文簡豈贉池脫落時佚之耶公萬厯己卯秋日後學王世貞敬書諸賢范文正當有宋全盛之日立功社稷一時以風義相敦厲方其謫官饒州尹師魯疏乞從貶兩人於貶所書問不絶蓋古人於朋友之際其生死不相負如此誠可風也余在都門得公手牘二幀後有前賢諸跋內東陽栁待制以洪文敏楊文節跋中有不須與衆云云之戒而今帖中無之遂疑所跋非此帖也余屏居無事反覆諦觀見洪楊跋內一云二書一云二紙兩二字上畫獨濃定係三字所改是與衆云云諸語必在第三帖中今散佚矣又胡古愚稱宋時諸跋尤文簡為冠今尤跋跋無存王元美稱有汪文節澤民台哈巴哈忠介二卷中亦未之見豈與第三帖同被割裂耶歷觀諸賢題識本末粲然定非舛誤至於書法挺徑秀特肖其為人諸公論之已詳不復贅云竒江村髙士宋蘇文忠公送安國教授詩紙本小行書别君二十嵗坐失兩鬢青吾道雖艱難斯文終典刑屢作退飛鷁羞看乾死螢一落戎馬間五見霜葉零夜談空説劒春夢猶橫經新科復舊貫童子方乞靈須煩凌雲手去作入蜀星蒼苔髙聯室古柏文翁庭初聞編簡香始覺鋒鏑腥岷峨有雛鳯梧竹養修翎鳴呼應嶰律飛舞集虞廷吾儕便歸老亦足慰餘齡送家安國教授成都黃太史有言東坡居士立朝而意在東山合觀所賦郭熙平逺則有聲句中可以想見惟公之生眉山草木衣被聲光盛矣況家氏之才子兼資文武著績縉紳偉然於元祐碑中蓋其筮仕之初已蒙文忠印正則知公之所以範模後進與家氏之所以步趨前修有以增岷峨之髙浚錦水之清矣三復敬歎乃書至元辛巳秋分石澗陳宗宋米南宫書諸體詩卷蜀素本織就烏絲欄髙八寸長八尺行書共五百五十六字詩體具備有御府鈐印李西崖印項子京收藏圖記吳廷等印引首宋箋上董文敏題云增城嗜書又好米南宫書余在長安得蜀素摹本嘗與增城言米書無第二但恨真迹不可得耳凡二十餘年竟為增城有亦是聚於所好今方置棐几日夕臨池米公且有衛夫人之泣余亦不勝其妬也董其昌題擬古青松徑挺姿凌霄恥屈盤種種出枝葉牽連上松端秋光起絳煙旖旎雲錦殷不羞不自立舒光射丸丸柏見吐子效鶴疑縮頸還青松本無華安得保嵗寒龜鶴年夀齊羽介所託殊種種是靈物相得忘形軀鶴有沖霄心龜厭曳尾居以竹兩附口相將上雲衢報汝慎勿語一語墮泥塗吳江垂虹亭作斷雲一片洞庭帆玉破鱸魚金破柑好作新詩寄桑苧垂虹秋色滿東南泛泛五湖霜氣清漫漫不辨水天形何須織女支機石且戲嫦娥稱客星時為湖州之行入境寄集賢林舍人揚帆載月逺相過佳氣蔥蔥聽誦歌路不拾遺知政肅野多滯穗是時和天分秋暑資吟興晴獻溪山入醉哦便捉蟾蜍共研墨綵箋書盡剪江波重九會郡樓山清氣爽九秋天黃菊紅茱滿泛船千里結言寧有後羣賢畢至猥居前杜郎間客今焉是謝守風流古所傳獨把秋英緣底事老來情味向詩偏和林公峴山之作皎皎中天月團團徑千里震澤乃一水所占已過二娑羅即峴山謬云形大地地惟東吳偏山水古佳麗中有皎皎人瓊衣玉為餌位雖列仙長學與千年對幽操久獨處迢迢願招類金􅀈帶秋威歘逐雲檣至朝隮輿馭飈暮返光浮袂雲盲有風驅蟾餮有刀利亭亭太隂宫無乃瞻星氣興深夷險一理洞軒裳偽紛紛夸俗勞坦坦忘懷易浩浩我將行蠢蠢須公起送王渙之彥舟集英春殿鳴梢歇神武天臨光下徹鴻臚初唱第一聲白面王郎年十八神武樂育天下造不使敲枰使傳道衣錦東南第一州棘壁湖山兩清照襄陽野老漁竿客不愛紛華愛泉石相逢不約約無逆輿握古書同岸幘淫朋嬖黨初相慕濯髮灑心求易慮翩翩遼鶴雲中侣土苴尫鴟那一顧邇來器業何深至湛湛具區無底沚可憐一點終不易枉駕殷勤尋漫仕漫仕平生四方走多與英才並肩肘少有俳辭能罵鬼老學鴟夷漫存口一官聊具三徑資取捨殊塗莫回首元祐戊辰九月草三日溪堂米黻記慶歷甲申嵗東川造蜀素一卷藏余家者二十年今既裝褫將屬諸善書題其首時熙寧元年戊申三月丙子吳郡記邵希子中海徐道淵成都閭丘熙寧八年四月十四日與東公顯同赴子中邵氏東園之招觀此數遍胡完夫題晉陵米元章此卷如獅子捉象以全力赴之當為生平合作余先得摹本刻之鴻堂帖甲辰五月新都吳太學攜真迹至西湖遂以諸名迹易之時徐茂吳方詣吳觀書畫知豫得此卷歎曰已探驪龍珠餘皆長物矣吳太學書畫船為之減色然復自寬曰米家書得所歸太學名廷尚有右軍官奴帖真本萬董其昌題至日海昌陳瓛觀歷乙卯長曽孫陳燾珍玩襄以上書素上愛積晉唐法書種種必自臨拓務陽公在當代求逼真時以真迹溷出眩惑人目或被人指摘相與發笑然亦自試其藝之精抑試人之知如此所以名書於宋與蔡蘇黃為四大家後之人惡敢議其劣亦不容諛其優矣汪君宗道持其所書雜詩織行綾卷索題佛頭上豈可作罪過但以蘇長公論其清雄絶俗之文超妙入神之字今於此卷見之因掇以塞其請云沈周正德改元八月下浣後學南宫帖豫見數本每見未嘗無所得此藏汪宗道家尤為精粹余作有意學米安得常對面也臨别漫志於尾唐宋書苑大家不過數輩宗道皆能致之歐陽公謂物長聚於所好信哉祝允明書嘉靖丁巳十月長洲文徴明觀川所造東園邵子蜀素一卷乃慶歷四年甲申東中藏於家草餘年至熙寧元年戊申裝褫成卷先記其尾虛其首以將屬諸善書者慶歷至熙寧二十餘年矣至熙寧八年乙卯胡完夫徐道淵閭丘公顯觀於子中家展轉數遍亦題其尾尚其素也至元祐三年戊辰始為米溪堂書熙寧至元祐又幾二十餘年矣子中完夫諸公愛其素如此不知諸公及見溪堂之詞翰否乎余自嘉靖三十二年癸丑得見於長安友人家傾囊以購之余素愛米書見者不下草卷此卷五百五十六字詩體具備墨妙入神真祕玩也且自慶歷至今五百二十餘年矣完好如故又為沈石田祝枝山文衡山三先生所賞鑒尤為可寶余每以此卷自隨一日過吳中謁文衡山先生獨不攜此適有覆舟之厄先生曰米書在否曰否先生曰豈無神物呵護至此耶嘉靖四十年辛酉閏五月研山居士顧從義北上舟次南陽閘展卷謹志小楷書右米書蓋以老法用秃筆者遒古可愛九月九日王衡題於春水船甲辰閏崇禎七年嵗在癸酉子月申甫計偕入都門再觀於東華門邸中一似米老重觀研山第無玉蟾蜍淚滴之恨烏董其昌識時年七十九嵗入魏晉醖蜀縑織素絲界米顛書邁歐虞派出天真風檣陳馬絶痛快想昔秋登海岱樓筆勢江波各澎湃清雄超妙氣凌雲一洗胸襟頑與隘熙寧造練元祐書年經六百未塵壞獅子捉象喻筆力疑有驪龍護神怪頻歷滄桑兵燹餘幾逢七夕鄰家曬五百五十六字強一一琳琅等金薤我學青松保嵗寒漢隂抱甕忘機械見兹頓令心愛慕似於吾道有微疥欲從碧落遊帝宸鶴羽沖霄誰可鎩一官未挂洞庭帆月夜間階了詩債江村髙士竒宋米元暉雲山得意卷紙本髙八寸長六尺紙凡三接墨鉤細雲滿紙浮動山勢迤邐隱顯出沒林木蕭疏屋宇虛曠山頂浮圖用墨點成略不經意左方有休堂圖書吳廷用卿藏印跋計十三行一百二十六字字之精妙亦是得意書云紹興乙卯初夏十九日自溧陽來遊苕川忽見此卷於李振叔家實余兒戲得意作也世人知余喜畫競欲得之鮮有曉余所以為畫者非具頂門上慧眼者不足以識不可以古今畫家者流畫求之老境於世海中一毛髮事泊然無著染每靜室僧趺忘懷萬慮與碧虛寥廓同其流蕩焚生事折腰為米大非得已此卷慎勿與人元章早年涉學既多晚乃則法鍾王此元祐初作也風神蕭散所謂天成者非世間墨工槧人之可髣佛伯玉出以相示因書其後晦平丘曽覿純父紹興壬午中冬雲山煙樹總糢糊此是南宫鶻突圖自笑頂門無慧眼臨窗墨迹淡如無米老此圖初藏於苕川李振叔後入嚴尚書府今宫保閔公得之蓋嚴與李同郡而宫保為尚書外孫流傳有自而收蓄得所此老亦無所恨矣治癸亥九月既望長洲吳寬書𢎞米元暉畫自負出王右丞之上觀其晚年墨戲真淘洗宋時院體而以造化為師蓋吾家北苑之嫡冢也此卷亦其得意筆後曽氏跋以為元章誤矣董其昌題曹周翰出示大父公所藏米卷豫雖不知畫觀其雲山煙樹走筆而成縈紆蓊鬱之致超然脫去蹊徑知為真迹無疑也展卷至後題輒語周翰此元暉筆耳曽跋蓋元章他書好事者裝池誤綴其後吳匏菴先生未暇深考因定為元章豫既憑筆迹臆斷其非又按本傳及蔡肇所撰墓志卒之嵗為闕元其年僅四十有九距紹興乙卯凡三十闕年矣暉夀至八十餘與所云老境者適相合夫筆墨之辨世已不能知獨恃嵗月可據而乃失之於匏翁則題識可弗慎歟或曰此題似非出於吳豫謂吳本不工鑒别真贋安可知而跋語則未必偽作周翰試更考之戊戌秋七月十二日婁孟堅題匏菴跋中所云嚴尚書者名震直字子敏元時右人洪武初官工部尚書有優詔旌之休堂其印章也閔宫保者名圭字朝英明天順進士官刑部尚書諡莊懿公俱湖州烏程人計此流傳吳越間自宋紹興迄今幾五百餘年未嘗磨漶亦翰墨之幸矣宜珍襲何如史康熙二十年嵗次辛酉仲秋八月望日江上外笪重光識按米元章付竇先生十紙説有余年五十始用此紙又跋謝太傅一帖云余生辛卯今太嵗辛巳跋右軍快雪帖云紹聖丁酉海岱樓又吾潤北固海嶽菴有殘缺舊南宫所自寫像子元暉題贊亦非盛年之狀余見曽肇所作襄陽墓志草藁蓋無享年四十有九之説觀此則婁跋未為確據記此以俟博雅者論定云為江上逸光者割去數段綴後五洲煙雨圖其中昔時好事跋一二希圖獲利遂使前賢翰墨有不全之憾此卷猶係完璧故應珍惜勿落書估中毒手狡獪同於五洲圖也八公洞僧舍索得友人所藏米元暉僕於夏初宿五洲煙雨圖卷即攜上五洲翠巖禪室是日冒雨山中雲氣噴薄變幻堪與畫圖相質證卷尾有牟獻跋云此元暉紹興辛亥避江淮兵時所作視豫所藏此卷乃紹興乙卯年自跋按彼畫於紹興元年此跋乃紹興五年相去五載而云見之苕溪李振叔家則此卷亦或數載前所作猶是北宋時物未可知也只五洲卷紙矮僅三寸許後少元暉自題識而此卷經營慘淡更為神化其深厚處與董源未易伯仲真襄陽戲墨中第一品也非洞知畫理者孰能辨之毋怪當時自為矜許乃爾聞沈啓南先生云年至七十始得見米迹余復何幸得此傳其瀟湘煙雨與海嶽菴卷好事者購之價至五六百金歎未曽獲睹今不知流轉何處矣記重光山雨山雲斷又遮溪前溪後幾人家江鄉湖曲多相似樹靄林煙認米家瀟湘煙水渺無波京口雲山曉暮多細雨斜風無限好誰將艇子著漁簑康熙庚午秋八月草又六日冷雨復晴新得木瓜作供洗研試小華墨題此抱甕翁髙士竒宋李龍眠華嚴變相卷紙本髙尺許長二丈二尺淡設色人物長六寸其上各以楷書標識名目諸天八部龍神之狀莊嚴端肅對之起敬宜乎諸賢之寶重也向為內府所藏後入元周公謹家有藏印數方檇李項氏鑒賞諸印覃紙前一題四短行乃宋後湖居士丹陽蘇庠養正書字亦古雅得一瞻禮此生之幸也力超逸然此公性龍眠居士畫華嚴變相豈獨筆理皆通誠可歎服也覩庠謹書界觀手畫毗盧妙龍眠居士宿慧通親華嚴法相好靈知所現非幻作諸大勇識以次來衣冠瓔珞嚴飾具乃至諸天諸大天福德貴神八部等威慈並承佛恩力各隨因地見形勢我思法雲頂中寶紫金光聚超衆地一毛空中一切見半月滿月諸寶王香雲鬘雲宫殿雲重重單復互含攝悲愍衆生故在世令我愚蒙得瞻仰顧如童真法王子彈指開門入寶閣普禮普贊盡未來與佛長住金剛定邵菴道人虞集生贊宋李龍眠設色蓮社圖絹本立軸髙二尺七寸濶一尺五寸五分宣和御筆標題李公麟蓮社圖六字上有雙龍宣和二璽下有政和長方璽每人上以金書題名下有文待詔小楷書李元中記一篇文不録後署明嘉靖丙午正月既望文徴明書時年七十有七又小楷二行云按朝補之雞肋集亦有蓮社記其所稱人物與此微有不同覽者當更詳之豫家向藏元顔秋月所寫蓮社圖髙頭卷紙本人物長六七寸全用水墨位置雖法伯時而山林樹石淋漓之勢另有一種天趣欵題樹杪顔輝二字放逸不羈印文可寸許文字漫滅今復見是軸益知筆墨具有淵源李之精嚴顔之疏逸正如李廣程不識之用兵不妨各極其長耳逺慕廬山十八賢松間引水種池蓮謝公心亂淵明醉盡託龍眠繪事傳白描橫卷昔曽看勾粉塗丹見更難况有宣和舊題識嫩黃宫錦裹香檀江村髙士竒題宋司馬端衡米元暉詩意卷題字大如錢每幅有宋文房等鈐印潺潺石澗溜五字題於畫首後端衡詩云峰回石路轉足可娛觀聽其中如有屋便是醉翁亭山稠隘石泉五字題於畫首後元暉詩云密密萬重山一派哀湍瀉此志入瑤琴當有知音者萬頃長江水貼天中有峰巒聳蒼緑青霄影蘸白蟾蜍浩浩澄波晃寒渌少陵詩名冠古今一生苦冷餐不足端衡寫作無聲詩曽與拙堂伴幽獨恨司馬君實米元章德行文彩皆本朝第一等人豫生晚不及見前輩今觀二公墨妙追思終日為之慨然二公非畫師何乃精絶至是豈鳯雛驥子其天姿超詣種種自不同乎紹興十八年九月二十六日癡叟田如鼇書於端叔集少陵詩句已是可喜又摘其可畫者為圖得元暉端衡墨妙朝夕展玩其胸中丘壑定自不凡興夢山王珉中玉書九日金華王與道觀於宜紹己巳秋九月十有春郡齋句超逸絶塵非後人可及二公墨妙灑落少陵詩不羣非碌碌者能辦亦可謂三絶也王汾陽愚叟富元衡獲覩於富郡齋後有宋景濂百谷董玄宰跋皆精妙宋米元暉五洲煙雨卷紙本髙三寸長丈餘跋髙七寸宋箋引首董文敏題本身無欵識隔水上有黃琳美之藏印六方鈐記有黃氏淮東書院圖籍條印六方數筆元暉水墨痕眼前歷歷五洲村雲山煙樹糢糊裏魂夢經行古石門海陵堯嶽曉窗白髮戰西風一笑青雲往事空惟有南山是知己相逢多在畫圖中汾亭石巖山林佳處屢幽尋畫卷重披意更深莫訝行人少歸迹白雲縱出亦何心汝南趙仲仁雨過郊原曙色分亂山元氣碧氤氲白雲滿案從舒卷誰道不堪持寄君京口俞希魯羣山出沒白雲中煙樹參差淡又濃筆意無窮看不厭天邉更有兩三峰南徐朱文瑛山勢西來萬馬奔泯江一道瀉乾坤扁舟更得長風便我欲東遊看海門南宮磻青山如遊龍雲氣常隱見下有東逝波奔騰疾於箭水流既不返白雲無定姿悠悠山中人耿耿令我思翰顧觀天下褎卷沅湘世所傳百折江從銀元暉墨妙漢落萬重山作翠屏連漁村屋傍雲中樹春水帆移天上船我亦久成書畫癖問君欲假筆如椽楊遵煙樹外水逺山更長天地有如許扁舟何處鶻突藏胡為小遊戲尚欲繼阿章當時水賊繁不見此夜光百年乃亡恙懷袖行可將我亦流落者此况慣所嘗誰寫岷峨雪坐我於其旁竹此元暉紹興辛亥避江淮兵時所作今歸之韓坡多難餘生覽之悽然因題其後山谷詩教字元暉繼阿章故云陵陽牟獻之鶻突亦畫家品目坐對晴窗憶壯遊參差煙樹五湖秋白雲流水知多少不見鴟夷一葉舟三吳張澤之米虎兒居京口目想楚山逺天長雲與瀟湘絶類當時有瀟湘白雲卷海嶽菴圖卷與此五洲圖並墨戲之烜赫有名者此卷獨不用本家筆皴染用吾家北苑法尤可寶也本黃美之所藏收藏賞鑒為一時最董其昌觀因題宋徽宗文杏水鳬紙本細勾設色長二尺八寸濶一尺二寸立軸上有癸亥朱文大連章及御書之寶宋趙大年荷鄉清夏圖絹本立軸長四尺五寸濶二尺三寸餘宋馬和之照水圖絹本立軸長二尺六寸濶一尺四寸餘有趙氏仲時楊氏家藏等印宋牟益搗衣圖卷紙本髙七寸長一丈四尺餘紙凡六接畫後有董良史書惠連搗衣詩八行小楷精工贅以董氏適適堂竒迹方印書帷寶繪鼎印董史祕貦洪都董史章等四印前後凡三見德新自跋二次又有集句詩一首字畫間雅用意周緻卷中人物學周昉其運筆秀徑絶類伯時全用水墨夜色迷離得詩中夕隂宵月之意首作園菊三叢莎雞草蟲翔集其上庭前槐葉蕭疏搖落寒螿飛鳴旁有回欄曲檻其中飾容招攜者共得六人欄外二人徐行庭際雲鬟簪玉翩然而來二侍史各持文綺隨其後又繞欄而行者二人相倚緩步珮玉璆然前導二人各秉一燭復有髙欄長楹湘簾畫障一人端坐監視羣姝綺製古拙非世俗恆見者一於燈下鋪尉一持盥水侍右二人執杵而搗砧聲歇續其停杵揮汗而勻鬢者所謂微芳起兩袖也一人踞牀裁素一人俯按一人盤膝縫紉又三人執紈素而來餘或憑肩熟視或屏後半窺最後一牀不施屏扆一人右手舉尺左手執帶一人欹坐旁觀一人捧盤盤中疊置成衣一人啓篋將有所韞共三十二人各具凄涼怨慕之意畫中有詩良不誣也謝惠連搗衣詩衡紀無淹度晷運倐如催白露滋園菊秋風落庭槐肅肅莎雞羽烈烈寒螿啼夕隂結空幕宵月皓中閨美人戒裳服端飾相招攜簪玉出北房鳴金步南階欄髙砧響發楹長杵聲哀微芳起兩袖輕汗染雙題紈素既已成君子行未歸裁用笥中刀縫為萬里衣盈篋自余手幽緘候君開腰帶準疇昔不知今是非良史書右謝惠連搗衣詩五言十二韻曲盡閨闈婉孌動息矉伸之態意韻萬千妙在言外咏歎不已因取周昉美人稍加位置畫為橫卷思短筆拙雖不足以形容謝詩妙處若曰摹章寫句亦自謂得其倣佛顧年踰耳順之三疲弊精神尚爾兒戲良可憫矣志之所好自忘其勞不知視苦身疾作務積而不能用與夫夜以繼日思慮善否者其為樂果何如得失果惡乎在寓目者毋徒議筆墨之工拙試與共商𣙜之新書嘉熙庚子良月既望蜀客牟益德戊戌春寓番昜安國僧舍嘗作此圖積日月而後成雖不自以為竒念為之勤非知音不妄出後二年攜至豫章遂歸連帥文昌吳闕是嵗秋館於東湖董良史圃中復為此紙視前增人十樹四砧杵之上又加屋焉始題數語於後聊披閲以自娛良史既見有欲得之色而不言僕曰子欲之乎曰是所願而不敢請僕曰子以我為難乎嬉戲鄙事取之於己而不竭者於朋友又何難遂舉以遺之良史好古博雅藏書萬卷古玩名帖羅列几格乃欲以此圖錯置其間猶肆筵設席水陸畢陳而山肴野蔌尚所不棄竊喜小道獨有所偶於是載書默蟲聲日夜感衣裘山谷鐵馬追風塞草秋東坡默此時誰會得荆公畫成應遣一生愁司馬公右集句一首間中隙月漏微光涼聲入衣早銀漢回碧波白露下秋草深閨美人思流年感此煢煢那得眠鳴環緩步踏幽影畫欄斜倚雙嬋娟鶴關音信經年絶帶綰同心向誰説并刀闕製寒衣數尺纎書淚成血良工善得詩家情筆端描寫逾丹青至今流落在人手展玩尤為人所稱嗟哉男兒有身當報國共期百嵗全闕息曽鼎功成名就歡相逢莫為搗衣空歎佳人何事搗寒衣和淚裁縫欲寄誰惆悵愁隨霜葉墜丁東聲雜草蛩悲九秋風露難成夢萬里關山有所思一段間情誰解得凄涼都付畫兼詩有唐王右丞能詩善畫東坡謂其詩中有畫畫中詩然而世不多見惟輞川圖陽關圖有之千百年來士大夫學詩畫者多倣其意惜乎知此者不知彼知彼者不知此得於此者失於彼得於彼者失於此求其兼美者百不得一二吁此無他能得詩畫三昧者乃可與言也今觀牟祈德新所繪搗衣圖蓋摹江左謝惠連詩意其風簷月席煙露草蟲之情閨房簮珥之態皆含蓄在圖內非特描寫形容以為工者真所謂畫中有詩者也使小謝復生而見之必賞其能為之傳神云內弟子昌自其聶氏故居攜歸城東别館蓋藏其家已三世矣後人宜寶之愛黃矩畫追憶先人所藏燬於壬辰之變豫平生古人可痛惜哉兵定之後豫思有以述前志又值困頓之餘弗盡如願雖間得二三殊無絶筆獨此卷得之豫章夏氏之三友堂前太守曹公仲修嘗撫卷玩歎而謂余曰慎勿視其簡淡而輕棄焉畫史尤工於詩文者也觀其摹章寫句曲盡幽閨情態亦已至矣想當下筆之初心融神會用意豈淺淺哉履時洪武初元中秋日良識圖未書於卷而謫居道藏其父仲善所跋搗衣遼東履道珍藏不敢失墜余在泮求為書之余嘉其志故特書於卷後若履道可謂知所愛矣洪武辛未夏黃慶書右丞蘇內翰來寥寥矣此牟祈妙畫又善文自王畫有識語甚佳其人大宋一竒士無大名位為可惜此畫則王蘇不如矣是可寶也視公麟七月圖比此可髣佛哉可髣佛哉花搢紳書惆悵近來無池塘春水已生魚門外飛點石渠過雁一簾香雨搗衣圖陵習韶書奉議大夫兵部郎中廬落葉蕭蕭風露涼深閨感此搗衣裳三邉夢斷雲連海雙杵敲殘月滿牀聲雜候蟲秋慘切愁隨更漏夜添長縫成不怕關山阻惆悵憑誰逺寄將之右搗衣圖一卷乃牟德新所畫曲盡閨房簪珥態皆妙絶一時信名筆也昔藏於城南聶履道之家當時以為至寶至其子子昌與益勤善乃以此卷贈之暇日俾余題識豫觀此圖妙在意外固不容論而又復覩諸先生之雄文巨篇播之咏歌發揮之至矣奚用贅辭因其請之數固不容默喙而已也遂拾陳腐執筆惶悚所謂持布鼓過雷門正謂此也峰時永樂草年龍集壬寅秋七月中元日後學秀張峻識并書玉鋪皎月移秋隂老槐葉脫孤螿吟間庭露冷夜涼入美人相對鳴秋砧宫眉倒暈出新樣晚籹閙掃橫珠簪風絃露索響寂歷雙杵宛中宫商音暗泉石竇聽決決金戈鐵馬來駸駸愁多力少斷復續可憐驚起雙棲禽拼當次第入筐篋鈎縚綿密親縫絍燈光香灺黯無語羅屏斜展簷櫳深小謝詩篇老牟畫等間寫出璇閨心騰聲傳寶自南宋年將五百留至今春窗日嫩一披卷恍如秋夜天橫參幽噫怨亂百感作移人那減雍門琴幸我心無不平事否則懭悢添胸襟團窠細錦密包裹對客誇比雙南金辛未春日竹窗高士竒題宋趙千里荷亭銷夏圖絹本立軸長五尺濶二尺七寸五分金碧山水中作草亭環以藕花前有髙閣欄檻疏豁與亭相望閣後山峰竦峙雲表紅樓碧樹掩映蔽虧宛然長夏景色亭中坐者有二人童子將茗自後出閣內一人與老僧奕一人執羽扇傍坐回顧一人乂手拱立其後若相語然波面兩舟一舟稍大舟內三人前者持漁具其後者持楫有稚子戲其側舟之小者一人鼓枻而來茂林髙栁隂翳山麓䇿杖負笈往來其間者凡三人皆曲盡其態實千里傑作元胡廷暉有摹本在江南人家豫曽見之不及此多也五代黃筌翠竹圖絹本立軸長五尺五寸濶二尺六寸右下有內府鈐印黃筌以寫生擅名其筆墨流傳于世者皆花卉蟲鳥而畫竹為少此幅作巨竹四竿拔地而起有翻風凌雲之勢旁作新筍大小三本掀泥迸石香苞怒生所謂蜩腹蛇跗之時已具節葉者也息齋之真東坡之妙兼而有之宋李永桃花三兔圖卷絹本髙八寸餘長二尺三寸前有天歷之寶李永二字小楷書在左角下有隴西郡記一方營丘深得忘歸趣直向崔徐妙處參三窟為謀太狂狡思量夷甫謾清談明昌乙卯正月草六日磐溪隱士題庭暮東風瑚蝶飛無數褐衣老穎眼宫華簌簌宫迷離獨卧華隂戲雙兔八月燕山沙草枯栁林鷹犬醉相呼明昌天歷須臾事空對桃花看畫圖海雪居士題尚斑二雛相倚思安間畫師想亦便春入輕風緑丘壑貌出長林豐草間春抑菴兩兒誰道姮娥能絶憐雌兔眼迷離芳草眠對作伴廣寒孤宿已多時夜槎軒孤影玄霜不自脫玉杵無聲桂宫冷老蟾泣餘塵胎一墮白雲雙目炯龍沙廢苑草如煙故物金源二百年令人追憶當時事雙兔花隂傍母眠東山樵者困韓盧亦任田中笑守株千載獨傳毛不從東郭穎傳常留姓字與人呼動李營丘筆力絶髙而寫生更少觀尺素間具見植之態宜前賢之樂為題咏也展玩久之率爾續貂庶得附驥云張鳯翼長洲玉兔將雛下廣寒畫師名手借毫端嫦娥杵就長生藥乞與人間一兩丸李營丘以畫山水擅名為宋畫院第一出其餘技時作寫生便覺風神髙逸非李迪諸人所得齊驅也前代名流篇咏奕奕故知真賞之士不妄許可太原王稚登宋夏禹玉山水卷絹本髙七寸七分長一丈六尺三寸末尾著細楷書臣夏圭畫四字共十二景每景題字皆理宗御筆有雙龍小璽內府大璽前後鈐縫宋印三方元印五方絹素精堅完好筆墨間雅位置清曠為所見第一江皋玩遊汀洲靜釣晴市炊煙清江寫望茂林佳趣梯空煙寺靈巖對奕竒峰孕秀遙山書雁煙村歸渡漁笛清幽煙堤晚泊禹玉居錢塘蚤嵗專工人物次及山水筆法蒼古墨氣明潤點染嵐煙恍若欲雨樹石濃淡遐邇分明蓋畫院中之首選也惟雪景更師范寬自李唐之後藝林可當獨步矣在當時鄭重況今代乎右嚴陵邵享貞識畫一卷禹玉錢唐人寧宗朝為南宋夏圭禹玉待詔賜金帶蓋畫人物山水筆法蒼老墨氣淋漓髙低醖釀逺近濃淡不繁而意足更有不窮之趣院中畫山水者自李唐以來無出其右真竒作也此卷乃經進之畫其欵書臣其上各題皆有雙龍小印當是理宗之筆可為妙品矣宜寶藏之靖壬戌仲春之望王穀祥嘉夏圭師李唐更加簡率如塑工所謂減塑者其意欲盡去模擬蹊徑而若滅若沒寓二米墨戲於筆端他人破觚為員此則琢員為觚耳六月董其昌題天啓丁卯宋馬麟蝶戲長春袖卷紙本髙五寸餘連跋長四尺五寸設色月季花一枝彩蝶回旋其上右方楷書蝶戲長春四字左方馬麟二字細楷書蝶戀花枝久親王墨未乾春光常在畫不似舊時看停扇觀飛蝶徐行似惜春芳容雖入畫終不犯沙塵葩河東張愚翩蛺蝶不勝情若教飛入湘美質竒足並稱聨花裏非是娥皇即女英寓舍八分書麟溪八十翁題於武林春日花開御苑西芳叢曽許蝶雙棲畫圖寫出東風意留得親王彩筆題緩步昭陽東殿頭翠衣紈扇最風流夢中曽識羊車路笑逐飛飛蛺蝶遊會稽楊維賢熙熙春暖日初長內苑名葩艷簇粧何處飛來雙粉蝶翩然花上戲春光翩翻蛺蝶忽交飛紈扇停揮蝶不疑縑素秖緣傳吮墨內庭淑德後人知北山樵者花開上苑得長春天近能沾雨露新蛺蝶相隨雙戀戀愛渠顔色往來頻深宫新試薄羅衣獨立瑶階扇不揮細看無知兩蝴蝶春來猶自得雙飛古虞俞常蝶舞花開淑景長侍臣染翰豈尋常誰知事去人猶歎不是梧桐集鳯凰宣和花月樂當年玉貌多於彩筆傳何似漢宫辭輦者溫溫令德照青編錢唐皇甫暕蝶戲長春圖乃院人馬逺子名麟者所畫美人撲蝶圖筆勢圓徑意非李伯時不能到二畫皆絶品也舊時曽在宫掖故其間有上兄永陽王及楊妹子之字題者專指祐陵以為言則恐未然也翰林學士宋濂題和待詔至興祖亦以畫為紹興待馬賁以畫為宣詔其二子公顯世榮又皆待詔於畫院世榮生逵與逺畫山水人物花果禽鳥精妙稱為絶品逺待詔光寧兩朝院中稱為獨步麟乃逺之子也馬氏之畫相傳數世其默契神會而若天成者豈他可及哉然麟不逮父而逺愛之多以己畫得意者題作馬麟故麟聲亦張而得為祇候此幅麟自為者也若美人圖氣韻間逸則若賈師古之筆師古學伯時紹興畫院祇候宋學士謂二畫舊嘗在宫掖其信然矣廬山陳繼宋僧梵隆十六羅漢渡水圖絹本髙六寸六分長七尺七寸水墨畫首尾鈐記元人印共三方凡三處興之菁山善畫山水人物髙僧梵隆字茂宗居吳宗雅愛之因得名於時此卷乃茂宗筆觀其經營位置作羅漢渡水狀者或扶或倚深則厲淺則揭回視顧盼無不畢備此茂宗之所以過於人者豫甚羡之吳興錢選舜舉書已渡未渡皆得渡菩薩現前開正路同登彼岸免沈淪牢把腳跟須進步蜀庸居叟馮恪為説偈言學為學得自由十方剎土遍遨遊觀空想已明無心竟過水還應濕腳不曽向靈山承佛説更為苦海度人舟世間勝地堪留迹鬼虎龍蛇絶外憂嵗在戊寅冬十月下浣白雲堂如蘭拜贊也朝野行可所藏渡水羅漢圖蓋宋茂宗隆公筆名公贊之如右靈石山主復為説偈十六應真同住世中流揭厲誘迷儔靈山記莂無餘事遊戲神通卒未休余洪武壬子秋七月七日如玘卷又再梵隆羅漢曽見之於王元美先生家此見於遂林上人山寮筆法解脫設布竒險真貫休徑敵也余嘗題渡海羅漢云世外之人豈有風波示相宰官公無渡河陳繼儒題宋僧溫日觀葡萄卷紙本髙八寸餘長三尺作葡萄一枝於卷中前後俱題以詩有知歸子印舉世只知嗟逝水無人微解悟空花此一聨乃大唐貫休禪師之佳句皇宋溫日觀為書之為後人䇿勵之端仍為寫龍鬚於後癸巳年三月三日扁舟至天佛院晴窗晚興有見副堂寶之共八行後又題云紙長宜以好詩書之為後之名勝笑覽明月清風宗炳社夕陽秋色庾公樓修心未到無心地萬種千般逐水流吳綃蜀繭筆底墨雲飛一片點點秋腴收得驪龍頷下珠興來一掃惜處有時慳似寶露葉蕭條幾度西風吹不凋奉題減字木蘭花山陽曽寅孫昔年添竹延秋蔓露葉離披馬乳寒今日天涯忽開卷還如架底夜涼看一片秋雲江上影老禪收拾入葡萄小窗剩著詩為伴不博涼州意自髙鄱陽仲輿葉衡題就借日觀韻奉題里上饒程鳯飛同老僧妙墨遍中州好事攜將萬遊要識色空不朽龍鬚馬乳等浮漚萄日觀墨葡濃淡纍纍半幅披却疑月架影參差憑君問取乘槎使還似宛西舊折枝寓蜀益川張應夢敬題至正壬辰維夏書於雲間舍敬題日觀手卷後風明瑞燕墨浪黏天潑一枝纍纍數顆綴雲衣南吹到山外帶得幽香巢底歸辛卯華亭人寓西湖瑪瑙寺寫蒲萄如破袈裟溫日觀趙松雪極重之書法師楊凝式晚年專修淨土道乃髙卓不獨書勝畫也崇禎壬申五月十六日題於佘山頑仙廬同觀者王景暉懸眉道人陳繼儒露葉氷丸墨瀋和恍從架底看蘿若將橘柚芬芳比還讓蒲萄津液多萄梁使徐君房魏使陳昭各言方物昭問君房葡何如橘柚答曰津液竒勝芬芳減之余謂葡萄之佳者亦未易優劣耳庚午七月江村髙士竒題宋鄭所南墨竹卷紙本髙三寸長四尺詩欵在卷中錯雜於竿葉之間頽毫焦墨筆法蒼老若不經意真逸品也先生為宋宿儒入元髙隱蓋信國之儔也清曉清風吹過後露出青青一罅天一似推篷偷看見竹林半抹古蒼煙所南老子昔與此君曽半面短篷今日試重推葉聲冷瀉銀牀露老鶴幾番驚夢回蔣堂墨胎之墨死不化固應此君長入畫雨裏推篷略見來至今風節傳天下遂昌鄭元祐鄭老寧非老畫師筆端瀟灑發天機披圖葉葉清人骨似帶秋聲出翠微周維新南翁髙卧似淵明不種黃花種竹君挂起北窗長見此蒼煙一抹帶斜曛錢良右奉題雅操端如金鐵幾度凌霜傲雪風前略露煙梢未許人窺全節藏六翁書淡煙古墨縱橫寫出此君半面不須日報平安髙節嵗寒曽見汪遂良須溪劉先生嘗題墨竹長卷云摩訶池上龍千年化為匹練橫曳煙我見其面何必全詩與畫適相類此故為書之先吳江湖南野逸張淵人間為世所南翁吾鄉老生也殘筆賸墨流落珍美時或蒼煙半抹斜月數竿超出意外姑蘇徐君彥用果好事者傾槖贖而表出之當代賢豪浩有題跋余忝幸桑梓之末敢不貂續數語涕泗感激為徐君謝云丙子八月十六日三山王廷器敬書絶筆後墨竹不世有間出所南翁獨擅無雙蕭郎手虛心抱直節逢人好呈醜橫斜三兩莖絶勝一千畝想渠欲畫時自有神扶肘想渠欲題時自有鬼擘口時或風雷怒宛擬蛟龍吼翁兮惜淪喪百世名不朽半抹古蒼煙寂寞嵗愈久具眼今為誰千金買敝帚保愛等性命起敬若父母再拜謝徐君佇望屢翹首橫空飛佩珊珊翰墨散落人間瞻望清風髙節管中窺見一斑所南先生貞節之士有夷齊之風書畫散落人間政自不少雖片紙不盈數寸或蘭或竹必有題詠然其用意深密非髙識韻士豈容易窺見哉余自童稚至壯時得承顔接辭而先生去世幾草載今獲觀小軸如在其右展卷懸情慨想雲甫里陸行直書於壺中天江寒南翁筆底得碧午夏楚山冷白雨六月湘佳趣蕭蕭半壁青琅玕染烈哲微馨開窗展玩髙筆底琅玕入骨清松煤葉帶風别人説先生眼自青深仁仲葛夀孫肯全泄造試觀所南之墨竹中有意固不俗未化機聊露一斑於片幅隱其全體顯一罅知此理者機在目能將隱顯同一觀明月清風皆自足此翁談玄亦如然微露一機與人參舉一不以三隅反扣其餘藴終莫宣如悟厥理本一致斯明畫竹之意焉求所南鄭翁先考之益友也深於玄學善畫蘭竹則不與不求或與一枝半朵片言隻字乘興而作興盡則止流布人間多矣然大槩用意叵測舉其始而不肯要其終談其粗而不肯言其精將由言者不足以語之耶或知者不言而言者不知耶雖畫亦然將由求者不足以與之而吝與之耶不求者或可以與之而固與之耶闕觀遺稿不覺感慨敢述數語以敘其本懷云爾識者幸恕其僭夀時至元五年嵗次己卯季春朔日魚門靜山周闕書於小隱齋竹之與筍蓋草木中之殊名親屬一物則根葉茂而堅其莖心空而直其枝背戾而裊其葉玲瓏而繁貞而不剛柔而不屈居天下之大端貫四時而不易葉蓋得氣之本也是故君子愛之壯者謂之竹弱者謂之筍厥譬母子焉少慕長焉言其濟人之利溥矣所南畫竹機杼自别雖片楮斷軸咸意出塵表此卷寫掀篷見竹尤為瑰竒因書竹事短句洪武五年夏月陸居仁書髙節南翁世所優當時遺墨竟誰收嚴陵公子多清致留得湘江一段秋按所南名思肖字所南福州人深於玄學工畫墨竹墨蘭嘗以畫墨蘭一卷髙可五寸許天真爛漫超出物表題云純是君子絶無小人此卷僅髙三寸大作竹枝飄瞥離披情景俱異題跋十又四人悉元名士壬辰冬日得之拾遺入手且易頗自喜第鐵網珊瑚中具載諸人題跋尚有所南自製一詩六人跋語是必為狡獪之徒分成兩卷不稱完璧為深惜耳諸詩悉有佳致詳録之左方且為異日合劒張本蘭室中是嵗臘月草又五日嚴澍書於滋萬頃琅玕壓碧雲清風幽興渺無垠當時首肯説不得不意相知有此君所南翰墨不到處凜然冰雪姿分明圖畫見何似倚蓬時樗叟善住要寫秋光寫不成愁凝苦竹淡煙橫葉間尚有湘妃淚滴作江南夜雨聲翠寒孤竹君家元姓墨墨君消息要深參詩人莫作推篷看認取南枝見所南越來子俞焯我身坐船中竹自在沙洔靜觀不推篷固已識全體喜來踏破漆桶底小作此君聊戲耳此君徹上徹下旨相逢無言只彈指春山車馬東風前荒深一脈秋花天百年斯文誰為傳欲弔是翁吾亦顛偶至元二載中春既望吳人陳昱題先生多少清爾推篷聊見竹却非坐井小觀天髙趣不許時人識得全乘叔淵十洲驀地推篷得空雲影外泛孤舟向曉風遍看見蒼煙翠竹弄清秋白至元改元嵗次辛巳閏五月十有九日虛室生居士王育書於讀書精舍薜荔窗南微紅岸竹蕭蕭弄野風寒翠也從篷曉煙初破日底見題詩如對所南翁庚午仲冬舟行石門道中推篷見竹惜不能畫聊題所翁卷後江村髙士竒來懶尋水與山病多酒杯終嵗間小齋劚地種歸修竹愛此翠色窗扉間湖鄉船行亦安宅寒梢濛濛覆船碧適情隨處成林園鄭翁同是天機客是日又題宋錢進士山居圖卷紙本髙八寸長三尺六寸仿唐人金碧粉雲丹樹翠岫蒼岩真蓬壺風景水面扁舟人物飄飄有凌雲之致其用墨設色處雖趙吳興未之或先也山居圖江上嵐光滴翠微江波浩渺蕩晴暉石林霜老丹楓樹茆屋雲深白板扉鏡裏一天飛鳥盡槎頭三尺釣絲歸展圖無限滄洲興愧我黃塵未拂衣紀儀桃源起新徴芝巖亦科稅剩水殘山無寸遺白雲夢斷歸來地晴窗忽見古畫圖眼中突兀開仙都玄圃滄洲宛相似不知塵世皆泥塗芙蓉峰髙眩金璧海霞掩映成五色茅堂深開白板扉漁磯隂護青苔石江天鏡闊波不驚野樹錦列秋無聲扁舟載客向何處日暮還尋鷗鷺盟如此髙情復誰有煙雲空落丹青手卷圖三嘆意茫然淒風颯颯生林藪紀堂宋錢進士秋江待渡圖卷紙本髙八寸長三尺餘亦用金碧筆意沈著山色空濛翠欲流長江清徹一天秋茅茨落日寒煙外久立行人待渡舟吳興錢選舜舉畫并題暝色生津樹船開莫放遲白頭何處客沙上立多時慈溪陳恭烏絲四行作八分書芙蓉插天金陸離白波倒影搖參差江南西風渡船小山下落日行人遲楓林遙起漢陽思茆屋久負滄洲期漁竿老我底須老歸待白髮歸何時會稽胡惟仁四山回合暝雲多嫋嫋秋風吹白波猶有江頭未歸客荒涼落日奈愁何蛟川朱庸青山植圭璧崇崖耀金紫澄江靜無波明霞爛如綺歸人望茅茨獨立江之涘杖拿來何遲暮色已如此豈不念安居無乃天所俾薄田入幾何科差殊未已懷哉鹿門翁足不履城市胡敦山路幽深日易西有人持蓋欲何之眼前渺渺秋江濶隔岸扁舟發棹遲倪可與野日欲低江樹寒洪濤捲風吹白菅魚龍掀舞小舟逺行人目斷東南山東南自是神仙窟紫翠含輝凍山骨璚華瑤草長闌干翠羽金衣共飄忽土囊深處開白扉溪流照席寒光微正宜八月粳稻熟豈可一點埃塵飛少待夜涼風浪急五色綵霞團曉色從容歸去主雲林歌激青冥卧磐石至正二十六年冬十二月既望烏斯道題家茅屋未江上青山如一髮宛轉林巒翠光滑幾開門野渡扁舟遲明發蕭蕭木葉動秋颸隔江有人歌竹枝江天空濶波浪惡也應待渡來多時正如獨客螺江上身作孤雲心浩蕩擬從雙闕覲清光路梗蓬萊不能往倪君置我白玉壺篝燈促迫題畫圖眼中見此三歎息却憶榕窗聞鷓鴣此豫自閩浮海為阻風還抵四明倪君有助出示卷索豫陪春草先生同賦因得以寓其意焉劉中臨安神仙洞府何清寒芝蘭長處無茅菅燦爛煙霞隔風雨四明遙映天台山滄波隱現潛龍窟六鼇戴空山作骨方壺員嶠自相通一見心親非倐忽朝京曽覲黃金扉雙闕岧嶤雲影微萬里歸來海風健片帆一路天南飛江梅已報春消息空翠霑衣舊山色渡頭吟客待多時還坐林間蒼蘚石余自京師南還航海至鄞倪君有助以秋江待渡圖見示因有所感就次繼善烏先生韻以見意云時至正丁未春正月臨沂王魯水長停橈切莫歌秋江已平秋樹黃有客待渡秋白苧白苧歌成秋露涼鴻飛冥冥白日晚客心茫茫愁欲斷微波只尺不可通何况精靈隔霄漢臨川逸民鄧宇之比璆琳越羅重襲象為首一展將軍有名畫愛滿目秋蕭森羣峰如鸞舞霄漢無奈金碧迷寒林長江流波渺千頃湛徹獨喜同吾心移舟數叟不足惜偶爾遇濟江之潯沖間把釣者誰子永謝塵俗忘纓簮幾間茅棟隔潨塢欲與此輩來幽尋戴將軍竒瑛所藏錢舜舉丹青索余題余見卷中前輩諸作皆遒麗新竒如金聲玉應非後進竊窮櫩寸晷之功而可比哉雖間有一二不快人意蓋無鍾離春之醜則不足以成西施之美質也洪武癸酉夏四月晦日西河池貞書客汀沙薄暮風大江東西路南北輕舟日送勞生滿林未渡支笻看山色山色無古今行人幾來往錢公咫尺間寫盡江天足幽賞青華子丹楓映江潮落早斜陽影裏鳬鷖小白雲飛盡碧天空江鴻一聲波渺渺行人悵望來沙頭歸心如箭不少留眼前幸爾風浪靜舟渡遲遲且莫愁潁川陳琳大江微茫天未曉散綺餘霞出雲表亂山滴翠露華寒隔樹人家茅屋小行人欲發待渡舟垂綸獨釣磯上頭感時撫卷寄遺意蘆花楓葉瀟瀟秋昌節察伋開卷羣峰擁金碧萬木失翠凝秋色風波競渡往來人誰似蘆花釣漁客吳山雲林叟秋林日將下秋江水方深舟子不待招似識還家心鴉背見青山遙遙生夕隂浩然賦歸去利濟吾當任花吳門龔輔楊栁條疏見碧波莫謂到家天芙蓉落飛紅雨欲暮濟川舟在夕陽多長洲謝表宋趙彞齋水仙卷紙本髙一尺長一丈四尺松雪收藏元名人題詠之盛可以為逸品也余久不作此又方病目未愈子用徴索宿諾良急強起描寫轉益拙俗觀者求於形似之外可爾元貞二年正月草五日鮮于樞同餘杭盛元仁三衢鄭君舉觀于困學齋之水軒時將赴浙東僕夫束擔以雨少留屏小几剪葉移根經年後人重見玉潤金明記曲瘦影娉婷雨帶風襟零亂出雲冷鵝管吹春相逢舊京洛素靨塵緇仙掌霜凝國香流落恨正永銷翠薄誰念遺簪水空天逺應想樊弟梅兄渺魚波望極五十絃愁滿湘靈淒涼耿無語夢入東風雪盡江清右調夷則商國香慢襪辨陽老人周密情翠袖冰姿隔暮雲凌波微步生塵江空嵗晚無奈笑把明璫解贈人先西秦張楧戲題積雪揚仙子凌波珮陸離文魚乘殿馮夷鑿冰靈夜鼓瑟吹竽會舞時海上瑶池春不斷人間金碗事堪疑天寒日暮花無語清識蓬萊當問誰鼓瑟作縆瑟短巴西鄧文原逺隔湘湖誰留夜月羣氷薄沙昏草枯采香人仙佩絶勝秋風九畹圖白粲銅槃傾沆瀣青明寶玦碎珊瑚却憐不得同蘭蕙一識清醒楚大夫西湖仇逺人畫者罕見嘗見平原公子之筆清而水仙花前疏甚可愛也今此卷繁而不俗尤覺可觀蓋疏則易清繁則易俗然則此作其可草草觀耶東吳林鍾宫闕夜不閉仙子出遊凌素波何事低頭弄水精明月不知零露濕衣多天台李至剛元三名家書無逸篇紙本第一幅篆書計三十六行文不録款云大德己亥東魯楊桓書前後藏印二十方鈐縫印三方第二幅𨽻書計三十九行文不録款云大德辛丑中伏關中蕭㪺作漢𨽻附於楊武子古書後藏印計十一方鈐縫印三方第三幅小楷仿樂毅論書法每行二十餘字文不録款云吳興趙孟俯書錦春堂等藏印十二方篆𨽻真行細作行誰能一卷備三長莫徒點畫論書法試看周公輔嗣王揭徯斯元印共五方元趙文敏小楷書清淨經硬黃箋文不録延祐漆年孟秋七月朔日太上弟子吳興趙孟俯熏沐拜手書於松雪齋趙文敏書絶交書卷緑絹本烏絲欄文不録有趙字方印大雅等印延祐六年九月望日吳興趙孟俯書元何祕監歸去來圖卷紙本髙一尺二寸長二丈四尺紙凡七接以水墨作人物以焦筆作山水欵在卷尾瘦徑有致太中大夫何祕監筆無印記歸去來辭并序文不録長一丈一尺紙六接字徑寸全學李北海嶽麓碑筆墨飛動鈐縫處俱有疇齋印記至大己酉夏疇齋書疇齋之書出李北海而韻勝過之其於歸去來辭喜與人書是公不言人亦自知何也以疇名齋已取農人告仲春語矣寓舍至大己酉姚燧觀於神州圖畫總管燕人何澄年九十作此卷人物樹石一一皆有趣京師甚愛重其迹又得承旨張公書淵明歸去來於后遂成二絶吳興趙孟俯書延祐乙卯九月七日昔賢出處皆真不為矯情淵明歸去來敘引可見疇齋承旨喜書此以與人其亦有感也夫至大己酉八月一日古涪鄧文原書一卷出不惜千金京師人貴重何翁當其在時每爭售之官昭文館大學士年九十餘而終其畫益貴數倍張疇齋自尊重其書多藏古帖親見前朝內府故事所用研墨紙筆一一上品如法乃書官翰林學士承旨年幾八十而終姚牧菴先生意氣魁岸而樂道人善吳興趙松雪公鑒裁精嚴而不與物忤今皆不可復見獨鄧祭酒巋然書翰之美今惟此耳可不慨然書泰定乙丑二月既望虞集疇齋題辭復謂東坡先生嘗集歸去來辭意作五言詩十首殊不知坡翁和陶詩外亦有和歸去來兮一篇及子由謫居海康子瞻以和辭要潁濵同賦且謂淵明之放與子瞻之辨非人所及坡翁追和時乃謫居昌化所作也蓋以無何有之鄉為家雖在海外未嘗不歸云爾今書和篇與淵明作對謹書己酉中秋日南嶽老人菊里劉必大拜手右淵明歸去來圖及辭一卷乃何昭文畫張承旨書何昭文畫在當時即為人所愛重至今京師之人猶然張承旨書自謂當與趙吳興雁行然當時求之中貴之中已莫能及以趙吳興書畫皆當為天下第一二絶之評足為此書此畫之重李士𢎞平生好寫竹臨帖每作一紙必自求趙公跋然後與人政欲托不朽也况他人哉因并記于此元二年嵗丙子九月草七日夜揭傒斯跋至靖節樂天知命文章間雅此其去彭澤之辭也中朝名士圖而書之其亦可尚也夫太玄子何祕監以畫稱於北方張承旨以書自負於當時姚文公趙文敏公尤長者長者豈欺我哉惟有把玩健羡不已三丹丘柯九思題一月甲子國學諭至正二十有年嵗在癸卯十立武起宗張士明胡益王章嶽信同觀長十又一月六日辛未豫章王武聞而來觀于吳史紹謙發祥里寓舍之學古齋中貴皆不及見得覩其翰僕晚至京師何昭文張墨遺迹於五十餘年之後為之欣幸何敢置評議於其間哉至正草四年八月甲寅臨川危素識國子博士武君孝隆同觀何祕監此作取捨萬殊動歸去來圖作者甚多惟定不一非他所可比者因歎美之遂成一絶云清彭澤休官未足竒文章千載去來辭寄奴橫劍夷夏惟有陶潛醉不知載吳勉題靈山人戴良集何祕監澄圖繪寶鑑不其人九中有題何監丞山水歌云至政以來畫山水祕監何侯擅專美帝御宣文數召見抽毫幾動天顔喜又云海內畫工亦無數才似何侯豈多遇權門貴戚虛左迎往往髙堂起煙霧今以卷內諸君跋語證之即其人也圖繪寶鑑前後錯亂遺失頗多如朱晦翁集中有題祝生畫長句云問君何處得此竒和璧隋珠未為敵答云衢州老祝翁胸次自有隂陽工又有觀祝孝友畫卷二斷句云天邉雲繞山江上煙迷樹不向曉來看詎知重疊數草閣臨無地江空秋月寒亦知竒絶景未必要人看又有祝孝友作枕屏小景以霜餘茂樹名之因題此詩祝生何人致煩晦翁吟咏至再至三則其畫必佳矣考之圖繪寶鑑亦未之載此書之不足據可知因跋何祕監歸莊圖并記之江村髙士竒元趙魏公草書千字文卷紙本烏絲欄文不録末行有趙孟俯印一方跋尾字行書吾甥張景亮以此紙求書千文屬吾有京師之行趣迎上道不能作楷乃為書行草二本時至元丙戌十二月也次年三月馳驛至崇德陳君養民持以見示始知景亮蓋為陳君求也陳君又必欲書識其後就館中借筆墨記而歸之開封趙孟俯題趙學士自號松雪道人書千文何啻千百篇未有如此篇之著意者也宗海自庚戌年間從子昂翁筆硯之側知其下筆處顔筋栁骨銀鈎鐵畫果是也今之學者多有傳授學書者天下衆非止一人然則子昂翁本從二王羲獻法帖出蓋不在山谷諸公之體以求之矣眉目千里可謂無窮董仲舒千百載之後獨仁卿先生耶此延祐庚申十月既望會稽山人劉宗海因筆書行草君謨誇第一東坡云自小楷出未能楷正先行草本末顛倒今人失君謨逺矣不可問欲問趙侯未可得試將坡語作心法不枉臨池費筆墨心囟潘庭玉疥卷趙文敏書法遍宇宙雖田夫野老亦知宗尚片楮隻字人爭寶之此卷草書千文筆法師右軍特為徑健良可寶愛鮮于伯機所謂源深而流長者是也好事者能刻而傳之以為學書之指南亦嘉惠後學之篤也袁後學袁尊尼謹識伯余過海上每此卷為吳門氏世藏後歸潘方請一觀如觀索靖碑知名下無虛士吳興千文行世者甚多未有瀟灑緊遒若此者惜無石本以廣其傳耳董其昌觀因題辛丑暮春稧日趙文敏書法華經七卷小楷書極端嚴文不録末卷題云三寶弟子趙孟俯謹手書大乘妙法蓮華經一部奉本師中峰大和尚尊者披閲所願聞此經見此經誦此經持此經者不墮邪見得清淨覺願一切人圓成佛果大元延祐二年嵗在乙卯秋九月三寶弟子集賢學士資政大夫趙孟俯志趙文敏公為本師中峰書法華經七卷傳之嵗逺矣第二卷海虞令郭君世南得之既久求之弗獲正統壬戌再三徴余書補之余書與文敏固相徑庭不足以續然欲足是經不可不續也不可續而續之觀者無議其妍媸也齋賜進士承德郎行在吏部考功主事東吳夏昶沐拜書趙文敏春遊圖絹本立軸重設色楷書款一行在右方至大庚戌春日子昂為心之作開元少年意氣雄任俠不數陳孟公文犀帶束鵠袍小驕馬颯沓如遊龍側身仰望目瞿瞿為有流鶯在髙樹兩騎聨翩未敢前目送金丸落飛羽白頭烏啄延秋門漁陽塵起天地昏珊瑚寶玦散原野空令野客哀王孫平原公子五色筆俗史庸工俱辟易寫成圖畫監興衰未必奢淫不亡國鐵笛道人以上作十五行青絲轉首看日暮香隄遊珍禽欲語避雕鞍已勒冶子却從芳草得金丸立句曲外史少年行樂不紫陌香塵沒繡鞍青山馬晚猶看知老日月東西似擲丸人倪瓚冶裘馬蹁躚宛有此趙文敏公春遊圖也物都東風芳草馳逐之態而松株石澗蕭間野逸又不為町畦所縛信矣筆力能扛鼎乎老鐵歌辭雄麗杜公哀江頭之遺響哉伯雨元鎮寄興不一而各極其致吾獨慨趙王孫者畫成絶代而無黍離麥秀之感何耶太原王稚登題趙文敏公古木散馬圖卷紙本大德四年十二月草八日為彥遠作古木散馬圖子昂詩人有言入為君王駕鼓車出與將軍靜邊野此馬遭竒遇馬之獲騰驤馬之光輝也趙文敏戲筆乃闕以數行於蕭疏古木之下從平原而息力就野草自秣鞭䇿之弗加控勒之無施文敏之意殆有所喻而然邪士大夫鞅掌之餘寧無休逸之思邪鍚鸞和鈴韅靷鞅靽充飫乎菽粟而雍容於康莊之上視此知物各有其時又奚可齊耶樂王賔題長趙文敏公飲馬圖卷紙本髙八寸長二尺白描作奚官汲水馬作就飲狀神駿可觀起止無迹即伯時當為之俯首也引首止庵篆書飲馬圖三字𨽻書款子昂宋學士小楷書題于畫之左方紙必畫而後棄去趙魏公自云幼好畫馬每得片故公壯年筆意極精絶郭佑之作詩至以出曹韓之上為言公聞之微笑不答蓋亦自負也此圖用篆籕法寫成精神如生誠可寶玩也宋濂記史官金華圉人扈從溫泉宫曉汲清波浮落紅驊騮解語意相得肉騣振動嘶春風天子臨軒催羯鼓繡茵檀板登牀舞美人眄睞相輝光那復臨邊思報主潼關夜半烽火明錦綳兒來坐大廷此馬棄捐何足道顧影長城厭水腥飢丹丘柯九思賦媒八尺千奚官小臣職奚為馬則秣渴飲之龍里姿雪花被身雲陸離往往異種來天池乘輿重惜間驅馳河清海宴無盤嬉壯士老死不得騎御栁春深白日遲寒甃淨汲氷花漪目光注電吻沫脂振迅欲掣青絡絲奚官小臣謹厥司猶恐若後訶譴施不必前身作馬通馬語人心物性在善推嗚呼奚官小臣身賤卑馬不如人愚亦知奈何為人牧重爵厚祿不恤民渴飢􅀈刮膏血剔肉肌坐令溝壑轉老羸今之龔黃卓魯誰雲林藂社時所師為出馬圖陳馬詩馬天台丁復焚䇿勳脫鞚瀉將軍西征過崑崙戰渴死心如汗血一飲瑤池三尺雪身如飛龍首渴烏白光照夜瞳流月長城凍合霜草乾駿骨削立天風寒木牛沈江絶糧道中軍餓守函谷關太平此馬惜遺棄往往駑駘歸一間區區芻粟豈足豢忠節所盡人尤難摩挲畫圖不忍看萬古志士空長歎門唐珙雷龍性難馴萬里姿駸駸只欲望風馳奚官毋惜斗升水要載君王問具茨松陵釋祖瑛天廄馬神龍姿目如明星耳如錐拳花鬃毛雲陸離揚鬐掉尾頳虹飛天廄馬間且驕縶以青絲勒以鑣渴不得飲瑤池泉飢不得食瓊田苗豆粟不滿腸胃枵口不能語足屢蹻天廄馬壯且武食主之食須報主莝秣失時罪在牧圉無如宋牂怨不得嚼咀棄其國人仇敵是與天廄馬爾不聞趙時廉將軍一飯斗米肉十斤被甲踞鞍走若雲破斬栗腹殺劇辛北摧燕胡西却秦亘百萬古稱良臣又不聞漢季劉荆州有牛千斤角曲觩啖食十倍於常牛負重不若一牝麀老瞞渡江俘楚囚骨肉解割庖刃遊天廄馬飽爾食草間豺狼逭誅殛威弧撥剌矢未直嗟爾神駿須盡力他年定遇田子方櫪上優遊感恩德若栝蒼劉基尺秋風嘶雨入漢家天馬來西域項啼雞身八昭陵舊苑空餘煙草碧當年逐虜向沙場千里萬里行氷霜百戰歸來汗溝血斗水安足充枯腸食君之祿為君死背義偷生真可恥臨川老客獨傷心把卷看詩淚如水長干沙門守仁松雪公作飲馬圖贈元泰以遺别峰而余為之作歌五花雲散紫電光縶維未許飛龍驤垂頭欲就圉人飲渴烏作勢吞銀潢集賢學士擅筆力萬里猛氣收毫芒羽人乘風倦鞍勒一笑收拾藏巾箱世人不識真驌驦顧影尚爾分驪黃放鶴峰前有遺意神駿政可誇支郎韓性掉尾玉驄金絡頭驕嘶騰踏吸寒流莫教重過長城窟水月光中漾髑髏張大可子昂作字如作畫畫中有字字有筆眼明見此飲馬圖乃知矩度不可軼定嫌昔日徐浩體渴驥奔泉超法律韓公畫馬稱神筆矯首昂藏山鬼泣騏驎驊騮志千里屹立天間甘伏櫪氣勢相宜適操縱肉骨兼勻稱肥瘠世人但以驪黃求翠駁玉花煩剪剔若論右軍愛鵝趣知公愛馬應成癖山隂道士不換經已悟黃庭養生術持將此卷參馬祖待須一口西江吸稽陽胡一中渴鹿逐陽焰其渴何由止不如遮吒邉斯須未忘水驥雖兀無語圉人心自知文園促四壁蹙斷文君眉神佛陀恩紙雙瞳墨濕電光紫烏首昂昂渴龍媒飛影在奔水青鬃迎風拂不起逸氣難居皂櫪底勢欲陪龍走千里月支真馬有如此落筆一與韓生似云是吾州趙學士間吳興凌説非金日磾不忝張景圉人唐衣冠天畜神駿雖順飽食無嫌身賤卑時其渴燥能飲之長年牧養瘠者肥龍鬐鳯臆誇權竒松雪仙翁揮翰手毫端幻出渴烏首氣不凋喪骨肉勻藝精端繼曹韓後遙想騰驤析木津銜勒難拘自在身斗水底用求他人渌波沄沄易水春黃天姥山人潘嚞爛隅目何年玉堂仙寫此真乘矯矯天骨起爛光豈無萬里姿御者非王良青衫老奚官肉眼空倀倀飲秣不以時羈􅎗無繇驤昂首思渥窪浩蕩充虛腸何來斗斛水似是出尚方雖霑金井恩未效和鸞鏘蹭蹬十二間何異古道傍回首萬駑駘飽食馳康莊朝飲華清流暮垂紫遊韁此馬獨棄捐物理良可傷君王倘惠養請試苜蓿長四明姚安道間靜格物若有龍種空天間渴且奔泉如玉堂晝此筆士未霑祿紛兩間求南湖沙門本無牽來向渴烏項領紫駝峰跑地泉鬛上衝不敢江水預防踴躍學蛟龍持永嘉李孝光公畫馬得蕭君學道龍瑞宫此圖贈寶林翁魏馬趣落筆宛有韓曹風腯肥不見筋骨露騰驤始知氣力雄朝逢圉人汲秋水精神炯炯方雙瞳卷中題詩十四客唯有栝蒼留古色卷舒雪涕憶前修太息後來那可識越城戰鬭白日昏故物紛披橫道側清涼衣鉢與馬圖似有神明常護惜法師未老傾槖囊古書名畫門徒將道初持來慰愁寂如造吳興大雅堂前年沙漠射黃羊我馬飛行雲雪岡誰挽天河洗兵甲但騎款段還家鄉上二字獨大林危素為道初上人題與黃天機入神即揮趙翰畫馬如相馬不在驪灑氣脫毫素光騰驤昔年曽畫穆王遊八極八龍之駿雲五色越影超光脫丹碧後來又寫漢武窮渥窪復見神駒來漢家勢走滅沒開風沙壯哉此馬健且雄玉花遍身雲滿􅐢首如渴烏眼如電皎如匹練橫晴空使之陷陳當破敵萬馬不敢先秋風如何解鞍脫其􅎗縱爾俶儻如遊龍君不見四海罷征戰九夷盡梯航方將却爾宛水之西歸爾華山之陽幸逢曹將軍寫爾神杜拾遺歌爾良贈爾方支道林愛爾神駿懸髙堂便臨安錢宰興間龍眠畫馬入神妙一見法雲心降何似吳試筆洗空薊北世無雙意中吳釋𢎞道騣剪花蹄當時四十萬匹中出羣氣偏豪雄三削玉拳毛一團如旋風飛騰射獵南山下踏雪歸來汗猶赭奚官乍卸紫馱韉解渴汲與華清泉鳯頭青絲掣欲斷一口擬吸天池乾日奔千里如電走飲秣翻落駑駘後東家蹇驢鈍莫驅熱浴冷水飢齕芻賢愚否泰亦如此撫膺歎息良馬圖稽鄭嘉會左輔周垣隱白沙龍媒絶種進天家驕嘶玉勒憐豐草渴飲氷泉帶落花西狩還經千里棧東巡曽駕五雲車權竒滅沒猶驚電謾許拳毛世特誇山隂王誼宛國來廷日滎河貢篚年赤墀騰紫電金埒護非煙表自殊方進恩從上國宣雄姿韓幹識神駿九皋憐蜀錦新裁韂秋金旋鑄鞭步應先八駿羣許壓三千試處岐王躍看時太僕牽清泉來碧甃瑤草獻瓊田弄影春芳裏驕嘶御栁邉聽歌長踴躍教舞每蹁躚羯鼓聲逾壯鑾輿勢欲遷腥風搖太液烽火逼溫泉幸蜀謀非晚殲胡計失先潼關寧赴敵渭水肻遊畋殺氣橫西苑房星隱舊躔王孫悲汗血仍為寫真傳得河南李勗駒曽為岐王天王孫能畫復能書寫天間八尺上賜不隨都護雪中驅霜蹄奮迅追飛電鳯首昂藏似渴烏春草青青華山曲三邉今日已無虞山隂王懌雪馬圖後題趙松豫觀唐人畫馬開元中獨稱江都王緒曹髦之父子得骨肉勻停法於戲筆處稱裴絳州天寶間雖陳閎擅名一時而韓不肻師謂其徒摹寫形似唯曹家沈著神采生動有自然風格所謂竒也宋宗室趙松雪深得曹韓之法故於人馬花石魚鳥悉造其微識者謂其書法二王畫過晉唐然惜其才名頗為畫所掩斯確論也今觀此圖蓋盡得唐人風格其縱橫隨意所如自然神情生動不直骨肉勻停戲筆而已又當為諸畫之第一者且題識盈卷極一時名公巨儒珠玉錦繡雲蒸霧蓊誠為世之所重也蒼峽巡司山隂李彥政氏出以示豫遂書其覽觀嵗月于上永樂丁酉仲秋月朔廬陵周岐鳯題元黃子久富春山圖卷紙本髙一尺餘長二丈一尺凡六接俱有吳之矩鈐印水墨畫董文敏跋在畫前隔水綾上書法秀美幅中有揚州季氏藏印按張清甫云尚有李范菴跋今無之矣至正七年僕歸富春山居無用師偕往暇日於南樓援筆寫成此卷興之所至不覺亹亹布置如許逐旋填劄閲三四載未得完備蓋因留在山中而雲遊在外故爾今特取回行李中早晚得暇當為著筆無用過慮有巧取豪敓者得俾先識卷末庶幾知其成就之難也十年青龍在庚寅歜節前一日大癡學人書於雲間夏氏知止堂大癡畫卷豫所見若檇李項氏家藏沙磧圖長不及三尺婁江王氏江山萬里圖可盈文筆意頺然不似真迹唯此卷規摹董巨天真爛漫復極精能展之得三丈許應接不暇是子久生平最得意筆憶在長安每朝參之隙徴逐周臺幕請此卷一觀如詣寶所虛往實歸自謂一日清福心脾俱暢頃奉使三湘取道涇里友人華中翰為豫和會獲購此圖藏之畫禪室中與摩詰雪江共相映發吾師乎吾師乎一丘五嶽都具是矣書於龍華浦舟中董其昌丙申十月七日大癡黃翁在勝國時以山水馳聲東南其博學惜為畫所掩所至三教之人雜然問難翁論辨其間風神竦逸口如懸河今觀其畫亦可想見其標致筆法墨法深得董巨之妙此卷全在巨然風韻中來後尚有一時名輩題跋嵗久脫去獨此卷無恙豈翁在天之靈而有所護持耶舊在余所既失之今節推樊公重購而得又豈翁擇人而隂授之耶節推蒞吾蘇文章政事著為名流雅好翁筆特因其人品可尚不然時豈無塗朱抹緑者其水墨淡淡安足致節推之重如此初翁之畫亦未必期後世之識後世自不無楊子雲也噫以畫名家者亦須看人品何如耳人品髙則畫亦髙古人論書法亦然癡𢎞治新元立夏日長洲後學沈周題像為右大長卷昔在石田先生處既失去乃想之遂還舊觀為吾蘇節推樊公得之是成化丁未嵗也至𢎞治改元節推公復得此本誠可謂之合璧矣今又為吾思重所得豈石田所謂擇其人而授之者耶思重來南京出二卷相示為題其後隆慶庚午四月後學文彭記於梁溪談氏澄懷閣隆慶辛未中秋後三日敬觀籟太原王稚登百谷閲後四十二日周天球在天堂得併觀二卷者彌日余生平喜畫師子久每對知者論子久畫書中之右軍也聖矣至若富春山圖筆端變化鼓舞又右軍之蘭亭也聖而神矣海內賞鑒家願望一見不可得余辱問卿知凡再三見竊幸之矣問卿何緣乃與之周旋數十載置之枕藉以卧以起陳之座右以食以飲倦為之爽悶為之歡醉為之醒家有雲起樓山有秋水庵夫以據一邑之勝矣溪山之外别具溪山圖畫之中更添圖畫且也名花繞屋名酒盈樽名書名畫名玉名銅環而拱一富春圖嘗聞天上有富貴神仙豈勝是耶又聞子久當年元是仙人故遺此迹與問卿遊戲耶國變時問卿一無所問獨徒跣而攜此卷嗟乎此不苐情好寄之直性命徇之矣彼五嶽有真形圖而亦有之可異也當年此圖畫與僧無用追隨問卿護持此卷者亦是一僧可異也庚寅畫畫題畫人來又適庚寅可異雖然余欲加一轉語焉繪畫小道耳巧取豪敓何必蚤計載之記中也東坡不云乎氷上偶然留指爪鴻飛那復記東西問卿目空一世胸絶纖塵乃時移事遷感慨係之豈愛根猶未割耶龎居士不云乎但願空諸所有不欲實諸所無嗟乎豫言亦太饒舌矣野老鄒之麟元髙尚書春雲曉靄圖紙本立軸長四尺濶一尺七寸楷書款在左方嵗在庚子九月草為伯圭畫春雲曉靄圖房山道人疊疊春山擁髻螺白雲如絮冒巖阿要知暖意江南早曉靄蘢蔥上樹多江村題元王孤雲墨幻角抵圖卷絹本髙一尺餘長六尺人物用墨積成鬼怪百戲曲盡其幻樹石簡雅有北宋人意款在右方振鵬年來鬼弄人獪狡出幻戲崖公亦兒嬉隊伍連鼓吹獸吻魑魅頥顛倒垂舞袂擎梯旋注碗駭汗增妙意跳躑向虛空渾如履平地生蛇縛樊籠鱗鬛尚黏綴獵圍鏖虎貙賈勇雷電沸戈旗誇戰鬭獰卒彌膽氣最後大將麾胡牀擅尊貴代間鐵門限失笑誆玩世罔兩曽問景莊周語言繼幽冥一理耳分别自愚智百齡千萬齡伸詘時不易懸知碧桃花長戀老仙轡五窮莫移檄文字安敢祟前集賢待制馮子振奉皇姊大長公主命題本自間鬼物冥冥莫可知人為還似鬼奔馳畫師遊戲笑我題詩却是癡濱集賢大學士王約謹題東坡題石氏畫苑舉潁語云鬼神賴畫而識蓋畫龍易畫人物難難者貴其似也此圖展卷不覺目恍神怵昔韓昌黎作文送窮滿七除二尚不堪其揶揄怪狀纍百顧可把玩耶李源道敬題翰林侍讀學士王生灑墨戲成圖比似牛蠅意不殊鬼態從教百巇嶮幽人胸次自愈愈中書平章政事張圭敬題天白日其呈怪獻醜乃敢如是昔人嘗云有錢青鬼可使無錢鬼揶揄作斯圖者其無乃逆旅燈下見其情狀抑亦貂裘珠帽視窶人子類以此目之耶神翰林直學士袁桷敬題姦入山林川澤不逢昔禹鑄鼎象物使民知神不若然則鬼物可得見耶神怪聖所不語此殆畫工欲使觀者知幽明理殊同一戲劇耳集賢直學士鄧文原敬書乘濤被荔果何如殊形怪狀齊席上傳芭問楚巫軒露豈止睽弧載一車且國子博士栁贊王君作鬼物戲人經傳備載夫戲人寧不自戲此圖其自戲耶戲人耶觀是圖者觀其戲無所戲乃得之鑒書博士柯九思敬題十朋抵角魚龍戲百怪躑躅獅豹跧題評無足起新意徒費舒卷筆硯間集賢侍講學士中奉大夫致仕魏必復跋海濤作水仙撡是知物移神情伯牙援琴寫風林而心得其趣也今是卷抵戲戰鬭眩晃萬狀亦可謂深入其趣矣或曰反是則仙至治三年季春草有三日監修國史長史李泂奉皇姊大長公主教拜手稽首敬書墨鬼不勝竒胸中生百戲參差有鬼頭人鬼元無二前集賢大學士陳皓敬題狐鳴梟嘯何須怪神降童謡不足云鬼戲圖中供一笑昌黎漫作送窮文儒學提舉陳庭實謹書竒形詭狀惡何獰也似蝸蠻有戰爭不必治安言政事如今宣室問蒼生趙巖鬼神本無形所可見者精怪耳王生作此圖蓋世間真有是戲豈欲見夫幽明之一致也耶前通事舍人王觀敬題技而舞縆髙擎足踏梯竿甕釡魚龍百戲角抵之又吞刀弄丸等極為巇嶮艱難其餘諸技流莫能及也故目之為鬼百戲是技也方之精絶唯鬼物可以能之畫工因其名稱繪為斯圖蓋有取之也至於山海有經楚辭天問所著又燬犀牛渚朱衣異類之迹皆稱其形貌未嘗言其機巧也國史院編修官杜禧翰林元俞紫芝臨十七帖紙本髙六寸八分濶三寸四分計三十八頁小楷書五段計二十五行又草書三行書類吳興前有吳郡徐霖題紫芝法古四字每頁有紫芝生印俞􅛱印項氏藏印具備真完璧也十七帖凡草七條逸少書中龍也張彥遠以為王草書中烜赫著名帖信然自昔相傳之周益州者蓋其中問蜀事為多玩味帖語類多晚年所作政在會稽時也第十六條云胡母氏從妹平安故在永興居去此七十也按吳志永興縣其地為今之蕭山云右跋語載會稽志右王逸少十七帖乃先唐正刻本今世間有二於􅗡尾有十七帖草書晉右軍真迹貞觀中裴業進上太宗詔下使能拓書僧智辨橅之親賜智辨一本將令出外使人間流傳之從此本出之後年深智辨既沒其本遂入法海僧曇昉極寶之不輕出余知之遂竊就昉求之出萬計方獲太宗以草書卷頭有十七日以此呼之十七帖其下實有草五帖一百二十行一千一百二十四字鍾紹京記唐中書令封越公有敕字本及褚遂良校定解元畏勒者人家或得之其一即此本也洛陽李邯鄲家所蓄舊本頗與此相近其餘世傳别本蓋南唐後主煜得賀知章臨寫本勒石置諸澄心堂者而本朝侍書王著又將勒石勢殊疏拙又有一版本亦似南唐刻者苐敘次顛舛文為十七帖而誤目為十八帖撫刻瘦弱失真獨敕字及此本乃先唐所刻右軍筆法具存世殊囏得誠可喜也按張彥逺法書要録與余所著法帖刋誤論此帖本末頗完今並列於左方云政和二年五月初吉黃伯思長睿父書右見雲林東觀餘論以上小楷書翰林侍書王著有寫本驗其數蓋二十七帖與鍾紹京所記異矣今本除真書果子名盡一百二十九行李建中續記以下俱草書帖文不録至政草又一年仲夏初吉紫芝生臨於黃岡之竹軒明墨林山人項元汴真賞元俞和子中手臨唐摹十七帖其值三十兩萬厯己卯秋日重裝墨林項元汴識其字號元饒介之倣四家書卷紙本髙七寸三分長一丈餘初臨右軍後更章草書諸葛武侯隆中對與史中微有不同故全録之又草書前出師表全篇文不録末仿顔平原正書陳夀武侯傳贊至雖微必戮止字大徑寸作八行卷中項氏收藏圖記三十餘方雲門印鈐縫漢室傾頺姦臣竊命孤不度德量力欲信大義於天下而智術淺短遂至猖獗然於今日志猶不息君謂計將安出亮曰董卓已來豪傑並起跨州連郡不可勝數操比袁紹則名微而衆寡故能剋紹以弱為強今日擁百萬之衆挾天子而令諸侯誠不可與爭鋒也孫權據有江東以歷三世國險而民附賢能為用斯可與為援而不可圖也荆州北據漢沔利盡南海東連吳會西通巴蜀此用武之國而其主不能治天所以資將軍也將軍既是帝室之胄信義著於天下若跨有荆益保其巖阻撫和戎越結好孫權內修政治外觀時變則霸業可成漢室可興矣至正二十又一年秋九月一日書芥叟右帖吾友淮南行省參知政事饒介字介之所臨後二十年偶見此卷筆意儘有風度觀者未可以工拙論也樓乙丑冬至前二日齊郡張紳題於浙江之紫薇丙寅再觀於浙江官居之真實不欺室十日紳在告觀之欲益神耳冬至前元趙仲穆越山圖卷絹本髙七寸長三尺三寸作小山平逺空鈎白雲渾厚韻致逸出家法之上者引首篆越山圖三字畫之左方周鄱陽題小楷九行浙江春水滿東岸盡青山旭日明旌棨晴雲擁髻鬟柯亭林倚塔秦望石迷關一曲何時遂開圖漫破顔趙仲穆作越山圖玉雪老人鄱陽周伯溫題藏圖書前後有項氏收髙尚書越山圖魏趙雍臨江盡正分吳山多繞越都一望中還見重湖昔日伯圖何在者空雲樹煙蕪遙指廢臺孤論興亡一軌逮如今仍似始蘇剩與後人傳作畫王孫曽有傷無右填糖多令長洲沈周浙江東岸是越王句踐舊時封國嘗膽卧薪成底事惟有荒臺凝碧萬壑爭流千峰競秀宛宛無今昔兔葵燕麥中間多少遺迹遙想東晉風流蘭亭修禊空自留殘墨何用登臨傷往事堪嘆衰毛垂白且覓扁舟賀家湖上載酒尋春色季真歸後四明還有狂客右調念奴嬌溪張鈇愛此山隂道春林幕逺天便嬛浮翠靄淡冶散芳煙水市溪通屋農家花滿田鑑湖無限好離緒又今年士竒康熙己巳四月望江村髙元王叔明夏日山居圖紙本立軸髙三尺八寸濶一尺二寸首題夏日山居四字戊申二月黃鶴山人王叔明為同玄髙士畫於青村陶氏之嘉樹軒黃鶴山人標格清胸中丘壑何縱橫興來捉筆一揮灑蒼崖翠石煙雲生人家住在山之麓隱映門牆蔽林木橫經讀罷鼓瑶琴薰風微動窗前竹司業先生最愛山無緣長得青山看時張此圖向髙壁仿佛楊子江天寬生題三山林瀚為少司成費先元楊竹西草亭圖卷紙本髙七寸八分長二尺三寸引首長三尺五寸八分趙仲穆篆書竹西二字中作墨竹一枝題云籬外涓涓澗水流竹西花草弄春柔茅簷相對坐終日一鳥不鳴山更幽仲穆圖用水墨蒼松翠竹掩映軒窗其間一人踞牀盤礴尺幅中有瀟湘風致無款止有貞期印一方遊心藝圃印一方項子京家藏前後收藏鈐印共計八十餘方贉紙末後有題識一行首尾有小嘉字乃子京家編號也畫左小楷四行為楊元誠題揚翠玉蕭蕭在屋東主人號作竹西翁品題莫説州夢好寫間雲入卷中二山居道人竹西志有騷一章章十句客有二三子持竹西楊公子卷來見鐵崖道人者一辨曰大夏之西有嶰谷之竹斷兩節而吹之協夫鳯凰此吾公子之所以取號也一辨曰首陽之西孤竹之二子居焉清風可以師表百世此吾公子之所以取號也一辨曰江都之境有竹西之歌吹騷人醉客之所歌咏此吾公子之所以取號也道人莞爾而笑曰求竹西者何其逺也哉伶人協律於嶰竹未既竹之用也孤竹二子餓終於首陽亦未適乎中庸道也廣陵歌吹又淫哇之靡竹之所嫌也地無往而無竹不必在淇在渭在少室在長石羅浮慈姥文竹之所也公子居雲之隩篠簜之所敷箘簵䇢之所蕞結亭一所在竹之右即吾竹西也奚求諸逺哉雖然東家之西乃西家之東也竹又何分於東西界哉吾想夕陽下舂新月在庚閶闔從兑至公子鼓琴亭之所歌商聲若出金石不知協律之有嶰谷餓隱之有西山騷人醉客之有平山堂也推其亭於兔園莫非吾植推其西於東南莫非吾美二三子何求西之隘哉三子者矍然失容惵然下意逡巡而退道人復為之歌明日公子來請曰先生之言善言余竹西者乞書諸亭為志歌曰易望便娟兮雲之篁結氤氲兮共成堂百草棼而蘦兮孰與玩斯遺芳曰美人之好修兮辟氛垢而清涼豈大東之無所兮若稽首乎西皇虛中以象道兮體圓以用方又烏知吾之所兮為西為東鐵崖道人為李黼榜第二甲進士會稽楊維楨也問訊揚雄宅深居在竹西風林宜月影春日聽鶯啼東老應同樂南鄰憶舊題東風又花草相與及幽栖詩方外張雨君子賦之備矣金華邵衷效白竹西文前之諸樂天歌以贈翟君彥林一笑歌曰君不見古來愛竹知幾人幾人愛之能逼真請君為我側耳聽我今作歌歌具陳唐人愛竹誰第一精妙獨數王摩詰作亭在東得竹法却對篔簹咏蕭瑟後來復出蕭協律瘦莖竦節稱絶筆香山居士欣得之常作長歌更飄逸蕭後愛者絶不聞賴有湖州文使君使君相與數百載繼與此竹傳其神自言平生少知者惟有蘇子嗟云云東坡得意下筆親筆底葉葉皆凌雲當時好事刻諸石雪堂之墨今猶存其餘諸子不暇論載之畫譜何紛紛元朝豈亦無作者國初以來誰復寫尚書髙公生古燕風致不在蘇文下吳興復出松雪翁飛白之石猶瀟灑息齋父子俱解畫籍籍聲名在朝野丹丘先生典祕閣閲盡古迹天所假嗚呼數子各枯稿我欲從之生不蚤清風散落天地間遺墨蕭條已如寶楊君愛竹隱竹西竹西之名人共知卷中題咏豈易得價重不減珊瑚枝翟君彥林今得之座中篋笥生風漪昨朝邀我觀此卷清風滿地歌竹詞感君此意何以報索紙為作長歌詩報以雙南金南金非我有報以錦繡段繡段不可久贈君相交期白首此卷此詩傳不朽竹應看萬箇碧交加薰風滿簟吹楊子宅前好修蒼雪春雨充庖盡玉芽茶臼或聞來北牖籜龍未許過東家時時倣像揚州去拄杖尋君日又斜扶風馬琬淇澳詩作知所貴重晉唐以來愛竹若竹之清自子猷元卿輩不知其幾矣其為人類皆如瑶林玉樹灑然風塵之表所謂淟汩迂疏塵胸垢面者弗愛也至正乙未春余來浦東張溪楊君平山愛之植竹數百竿於西林結亭蒼翠間扁曰竹西因以為號焉一日出示手軸展觀友人楊廉夫作三辨以志之奇甚索余詩僭賦長句愧不工也紅紫紛紛眩凡目子獨深居嗜修竹西林培植造化功閲嵗亭亭立蒼玉稜稜老節霜雪餘灑灑數竿煙雨足髙標徑節君子貞孤堅雅韻幽人獨炎氛一點飛不到滿地濃隂清肅肅生平不侔千户侯直欲逺繼王子猷元卿三徑亦蕭散七賢六逸真天遊結亭松下臨清流竹西名扁志所求春波蕩漾曳文縠山風戛擊鳴蒼球朱簷亂拂翡翠羽湘簾半捲珊瑚鈎平山家住張溪側髣佛當時草玄宅貞期寫作畫圖看箇箇崢嶸掃空碧舊栽雨露今滿林新長琅玕過百尺嵗寒尚友雙髯松枝幹相依如鐵石緑窗沈沈几席潤日對此君成莫逆松江水滑清漣漪漣漪瀉入青玻璃玻璃竹色光陸離醉呼美人歌竹枝竹枝辭古知音稀廣陵鼓吹作者誰廉夫三辨尤崛竒中涵妙趣吾不如竹西竹西細論之臨風朗誦淇澳詩如月樓趙橚滑機為竹移家亦苦辛我如東道竹賔石頭路鋒峻峴首碑沈感慨新淡月半窗金弄影清風一徑玉傳神明當拄杖敲門去愛汝草玄亭上人至正十五年嵗在乙未臘月草八日曲江錢惟善在胥浦義孰題峴首借喻廣陵今昔之不同溪上人家多種竹林西清意屬詩翁湘靈鼓瑟風來巽鳯鳥銜圖月在東一室蕭間淇澳似此君貞節嵗寒同何當徑造談玄處靜日敲茶試小童涿郡陶宗儀鐵崖平生以文字為遊戲如竹西題最枯觀其落筆層層疊疊乃能發許多議論亦可謂宏且肆矣余嘗評應酬未嘗為文之病此良驗也楊公子得諸公品題今日姓名賴以巋然不亡文固天地間最夀之物孰謂儒生終日弄筆墨為不急事哉袁𢎞治七年六月望日前進士吳郡楊循吉觀於君養正樓居題為之品題者皆有元一代名家彼楊氏竹西之號後人既魯玉之失而養正復趙璧之得可以永傳矣昆山黃雲元楊竹西草堂景趙雍竹枝墨林山人項元汴清玩用價念兩購於吳中元倪髙士墨竹紙本立軸髙二尺濶一尺餘題計八行四角有張氏藏印馬跋居左以中每愛余畫竹余之竹聊以寫胸中逸興耳豈復較其似與非葉之繁與疏枝之斜與直哉或塗抹久之它人視以為麻為蘆僕亦不能強辨為竹真沒奈覽者何但不知以中視為何物耳戊申十月七日倪瓚坡翁畫竹維畫意倪老得詩如得仙今古相望三百載只應詩畫出心傳馬治倪髙士小幅紙本立軸髙一尺三寸濶七寸紙光如玉江渚暮潮初落風林霜葉渾稀倚杖柴門閴寂懷人山色依微至正癸卯九月望日戲為勝伯徴君寫此并賦小詩倪瓚倪髙士紫芝山房圖紙本立軸髙二尺四寸濶一尺紙色微黃山房臨碧海闕紫芝榮雲上飛鳬舄月中聞珮聲术煙生石竈竹雪灑前楹誰見陳髙士希夷善養生八月草日為叔平畫紫芝山房圖并賦五言瓚倪髙士秋林野興圖紙本立軸長三尺二寸濶二尺畫法董源中畫一亭亭中一人兀坐傍一小僮運筆渾圓林木鬱潤林際數峰出沒在目真元鎮第一傑作也惜乎題字少損不無有駿骨之歎余既與小山作秋林野興圖九月中小山攜以索題適八月望日經鉏齋前木樨盛開因賦下章今年自春徂秋無一日有好興味僅賦此一長句于左方政喜秋生研席涼卷簾微露淨衣裳林扉洞户發新興翠雨黃雲籠逺牀竹粉因風晴靡靡杉幢承月夜蒼蒼焚香底用添金鴨落蘂仍宜副枕囊己卯秋九月十四日雲林生倪瓚十年嵗在甲午冬十一月余旅泊甫里南渚陸益德自吳松歸攜以相示蓋藏於其友人黃君允中家余一時戲寫此圖距今十有六年矣對之悵然如隔世也瓚重題其左而還十九日暗靄生清輝空冥照秋影遐眺修亭虛一覽心已領陸繼善經鉏堂前木犀黃何人晏坐聞天香迂翁胸中有清癖欲掃繁花歸枕囊秋林野興圖親寫百年落落燕都下市門不遇杜長垣殘墨誰將手重把真𢎞治壬子臘月子開至京偶見此圖識為雲林筆也因購得之重加裱飾請豫題其上蓋此圖破暗已甚知好者少其亦可謂遭矣吳寬百年遺墨尚精神鑒賞還歸杜老真今日長垣傳法眼固知少嫩亦如人頃豫讀東原先生遺藁其論雲林畫品云世率以其書辨真贋不知早嵗作尤少嫩如其人故豫詩云然先生知畫之深者也王鏊元梅道人為佛奴作墨竹譜卷絹本髙七寸餘凡三接長一丈六尺餘作竹八種各有題識東坡先生守湖州日遊何道兩山遇風雨回憩賈耘老溪上澄暉亭中令官奴執燭畫風雨竹一枝于壁上題詩云更將掀舞勢秉燭畫風篠美人為破顔恰似腰肢裊後好事者剜于石今置郡庠豫遊至霅上摩挲久之歸而每筆為之不能倣佛萬一為可愧耳梅雨初歇清和可人佛奴索作墨竹譜遂因而畫此枝以識嵗月至正十年夏五月一日梅道人年已七十一矣試貂鼠毫筆潘衝舊墨擬與可筆意梅道人戲墨我亦有亭深竹裏也思歸去聽秋聲隨意山肴酒一樽藤牀石枕睡昏昏醒來管爾成間笑修竹千竿緑在門梅道人戲墨梅道人戲墨于橡林下四月二日未出土時先有節便凌雲去也無心唐人可謂能詠者耶梅道人戲墨鮮于伯機題髙房山墨竹有詩最工余故不能忘詩云添隂生研池葉葉秋可數京華客夢醒一片江南雨世人但知鮮于善書而不能知其吟咏之工故録而出之以示人云耳落落不對俗涓涓淨無塵緬維湘渭中嵗寒時相親梅道人戲墨于雨窗文與可竹以尺許而具千尋之勢子瞻所謂有成竹於胸者也梅道人不專以畫竹名而此卷為道人最得意筆題竹書法駸駸入晉室豫不知繪事而目有真竹但覺斯卷得真竹趣而已宜乎瑞光齋主人珍為三益之至友也李長焜元陸季𢎞小幅紙本長一尺八寸濶七寸五分水墨左有陳氏珍藏味間書印右有西村草堂琴書玩樂等印丹臺春曉圖天遊為伯顒畫十年客邸絶塵紛江上歸來思不羣玉氣浮空春不雨丹光出井曉成雲風前龍杖時堪倚月下鸞笙久不聞幸對仙翁逺孫子坐中觀畫又論文右作小楷五行俱在右方元方方壺雲林鍾秀卷紙本髙七寸長僅三尺全用水墨筆法尖秀布景周密千峰屏列雲樹蒸氲首行隸書題雲林鍾秀下用墨池清興圖書字畫纎徑中間石上又署方方壺畫四字後款云洪武丁巳方壺子作贈鄧止菴還朝俱𨽻書上清仙子本天仙下謫來修水墨緣聞道琵琶嶺頭月照歸黃鶴又千年此圖方壺先生所作用米氏之法將化而入神矣觀之正不知何為筆何為墨必也心與天遊者始可詣此先生觀化已久遺迹在人間如可想見其風骨敬題是絶少寄仰止云後學沈周自昔愛名山歸來倦登歷當湖乃水鄉岑岫杳難覿舊迹見方壺下筆興清激層峰亂㟏岈荒溪倚蘆荻滃浡雲煙生蒼翠渾欲滴雪窗時卷舒道路恍可適因之悟靜理萬事如破的江花開遲遲山鳥啼寂寂聊此豁心胸無勞圖素壁闔户本寡營塵襟安用滌康熙辛未正月草日抱甕翁髙士竒題明王孟端墨竹卷紙本髙七寸五分長二丈四尺紙十接引首陸深題萬竹秋深四字僕厭倦作畫久矣一日俞君行篋攜此卷適豫徴墨君時小酌微醉即欣然一揮不覺紙盡其韻度雖不能盡合古人繩墨然一種林野散逸之氣出自家意思者似亦可取俞君天趣甚髙鑒賞之餘其必舍形似而得於驪黃牝牡之外矣永樂庚寅仲夏望前三日九龍山中人王孟端識楷書作六行寫竹之法何人起乃自唐時吳道子窗間寫影李夫人筆意源流無出此世稱絶品文湖州清風萬古誰同流眉山學士能知識八法縱橫氣味投數公之下鳴者少吳興松雪獨通曉丹丘博士老入神後世相承光皎皎九龍山人王中書當時寫竹多名譽醉來為作溪園趣一掃千竿興有餘枝枝瀟灑凌雲氣轉側低昂出新意長汀斷浦草離離怪石巔崖真竒異淋漓千畝雲煙濕晝雨霏霏風飁飁寒光閃爍虬龍升翠色婆娑鸞鳯集時時只見春滿林嵗寒那得雪霜侵瀟湘渭水同為俗都是悠悠君子心竹翼雲生妙趣誰能識貞心自不中書醉灑墨寫意無窮同嬋娟凝翠靄蕭颯響清風幾度瞻淇澳悠悠興轉濃丹陽張衡馮外史有詩題墨君因次其韻仲子璚室翠館不丹霞曉雜文光起尋訪元都馮易到俗緣脫盡來過此此中宛似小瀛洲颯颯松風天際流呼童洗鼎瀹新茗促席忘言清味投品題重見王逸少文章翰墨兼通曉醉揮古墨成琅玕淇澳風清湘月皎縱橫枝幹備法書未讓老可專名譽渭川千畝目不盡嶰谷萬箇春無餘汀葭沙草含霧氣懸崖竇石殊適意長波浩蕩渺天涯籜龍吐蟄尤驚異雨飛數點蒼苔濕鳯凰欲下祥風飁俞君得此足祕玩騷人墨客時交集今歸將門橫劍林髙標徑節無塵侵凌霜傲雪色不改共期嵗晏堅貞心金華周旻淇園春曉春風暖翡翠初鳴晴光滿琅玕箇箇拂雲長秀色娟娟露新浣繁隂蔽地莓苔深荒荆叢棘無相侵春雷一夜忽霹靂犢角突迸何森森九龍山人金閨彥簪筆晚下金鑾殿興來寫此緑玉圖葉葉梢梢誠堪羡我嘗見寫多瀟灑今見斯圖尤異者雲氣冥濛虬忽升月影徘徊鳯欲下青原之陽有草居别來久住東華隅居前萬竿亦如此卷圖還客生長吁廬陵傅岫我本山野人素抱煙霞疾何處慣經行松篁與泉石晴窗偶看琅玕圖淋漓醉墨傾金壺崇岡怪石相髙下冷雨疏煙半有無數竿晴渭川日暖春風輕數竿老嶰谷千年霜雪飽數竿欹楚江嵗晚寒風吹數竿側淇澳秋深雨蕭瑟千竿萬竿難盡名林巒倣佛清風生交枝直幹平安態徑節虛心君子情對此怡然樂清賞撫卷無言發遐想煙雨濛濛語鷓鴣詩懷常在湘江上東軒數竿忠心朝日月雨露天恩萬古新篩金日影江上麗蒸紅霞霰闕星貫日長虹氣牛斗彩雪闕園披露全指日萬馬歸明淨數竿掃却平清闕東谷菴石坡子劉焜題中書逸興寫琅玕墨蘸金壺濕未乾漠漠縈紆森緑玉亭亭綽約下青鸞髙風貞士心猶徑薄暮佳人袖欲寒從此卷舒清眼底不須鄰舍扣門看沈真坡翁論畫竹獨推文湖州與可謂有成竹具於胸中此可謂得其勢矣而未及於神國朝畫竹王中祕為開山手此卷余得之玄池家先賢題跋甚多一展卷而含煙噴霧拔石迸天颯颯然真不翅鮫龍起而風雪集也畫皮畫骨兼畫神坡翁亦必以余言為知言矣董其昌此卷為豫同年夏駕部雲間陸渭陽攜長安時出觀豫者因豫甚賞愛遂輟以贈聞渭陽用善價得之陳子有太僕一旦捐所嗜贈知好較諸昔賢以仇池石易韓幹馬往來商復多有吝色則渭陽之為誼遠矣繇戊辰迄今忽忽二十餘稔愧未有以報稱敬識嵗月以俟把手笑樂再觀云戊寅三月禊日如園宋獻題於賜貂樓玉樓主人余十年來收藏善護之者為余內友纖出入患難死生之際屢矣今得展玩并為書其寶惜之勤云是日如翁又識徑尺疏疏竹籠霄勢數尋篔簹千畝緑淇澳萬竿隂湘簟宜清暑蕭齋恍在林披圖常獨坐無限故山心尾康熙己巳六月題於苑西餘蔭軒未及書之卷庚午仲冬草七日觀於瓶廬因書其後今嵗已過長至天氣未寒是日方覺微隂變冷齋中蠟梅將破蘂矣江村抱甕翁髙士竒沈啓南巒容川色圖紙本立軸水墨畫長五尺三寸濶二尺二寸紙雙接左方篆書巒容川色四字細楷書題款計十六行國初金華宋學士每見巒容川色謂是上古精華不忍舍去其好古之心為何如哉豫居荒僻無可目擊其勝但以毫楮私想像之搰搰塗抹又不能探繪事之旨惟徒勞於心爾然繪事必以山水為難南唐時稱董北苑獨能之誠士夫家之最後嗣其法者惟僧巨然一人而已逮元氏則有吳仲圭之筆非直軼其代之人而追巨然幾及之是三人若論其布意立趣髙間清曠之妙不能無少優劣焉以巨然之於北苑仲圭之於巨然可第而見矣近求北苑巨然真迹世逺兵餘已不可得如仲圭者亦漸淪散間覩一二未嘗不感士夫之脈僅若一線屬旒也亦未嘗不歎其繼之難於今日也此幅豫從劉完庵所臨中間妄有損益處終自生澀於其所好弗以為煩譬之盲者不擲埴無以得途也他日挾之以遊金華見學士之所不舍者然後更加潤色之未知果能否耶成化十年二月念四日石田生沈周題沈啓南九段錦畫册紙本第一頁鏡面箋髙八寸長尺許款在左方覆以啓南字印以後八頁俱髙五寸長尺餘一倣趙吳興青緑山水古松三株紅葉一樹前有瘦竹三竿兩竿一紅衣人觀書茅亭中置琴其側草縈細路意象都雅一倣黃鶴山樵長松三株上裊藤蘿枝柯四蔭一人攜琴緩步將度溪橋隔岸青回景物間暢一倣吳仲圭水墨蒼山細樹微徑逶迤樵子越嶺將歸筆氣清潤一倣趙千里作田疇數畝傍有村落緑樹三五層板屋七八家晴天長夏時方當午農夫荷鋤􅳸水婦子擔盒餉耕又有曳杖間行青簾林外雞犬間間大得田家况味如讀儲光羲詩不覺名利之心頓盡一倣惠崇青山紅樹溪路沿崖兩山缺處略見柴門風動葉鳴山犬驚吠細栁疏松方亭臨水逺山微抹叢竹籠煙獨往何人當是子真谷口畫史稱惠崇小景絶佳此殆得其奧理一倣王孟端野客溪橋古樹五六各自成林筆法圓秀全幅用墨忽於樹下作蜀葵數科紅葩緑葉點綴有情畫家見之必嗤為脫格然其用意蕭逺正非凡流所及一倣趙仲穆作土垣草舍寂寂孤村野竹蕭森寒林淡逺栖鴉未定晚靄滿天一人短艇初歸船頭獨立飄飄然有遺世登仙意一倣李成雪山巃嵸東西對峙深林積雪野水凝氷旅客緣崖騾網路滑長橋過客拄杖生愁儼然風雪打頭當暑展觀心神皆冷一倣趙大年蘆汀菱汊淺水空明髙栁垂隂下多亭館採菱小艇或三或五蕩漾隨波艷態明粧略從毫末點染便有無限風情至其逺山橫黛返照銜紅天機活潑又豈學力所能哉杜東原小楷題其上已老菱生角紅裙緑髻誰苕溪秋髙水初落菱花家娘小艇如梭不停泊三三五五共採菱纎纎十指寒如氷不怕手寒并刺損只恐歸來無斗升湖州人家風俗美男解耕田女絲枲採菱即是採桑人又與夫家助生理日落青山起暮煙湖波十里鏡中天清歌一曲循歸路不似耶溪唱採蓮繼南出其兄石田生所畫採菱圖求詩一時不能即就因書舊作如上然圖景與詩意頗合亦云可也七成化七年辛卯陽月望鹿冠老人杜瓊書時年十又六間仲齋頭縱觀太常公所藏名迹惟白石往在王翁畫未見竒絶間仲又借子顒沈册曰九段錦乃兼元季四大家及趙吳興莆陽惠崇諸體真快心洞目之觀如北朝人見庾信詩不勝歎服今落季鸞手余甚妒之季鸞亦有約待筆端收拾石田一片雲仍以與余換古畫是可以嵗月計耳夏五月董其昌庚午文太史仙山圖卷絹本髙七寸餘長三尺學趙千里青緑山細界畫樹木秀麗人物精雅真太史生平得意之筆與王瞻近所藏太史倣右丞關山積雪長卷不相上下前有小玉蘭堂文徴明二印後有徴明文璧二印絲四十七行小楷精妙祝京兆仙山賦藏經紙烏在曹娥樂毅之間前有枝山朱文印一方後跋云履約昆仲既得此圖邀余作賦余訝其景意不凡持難至今雪後將赴南都氷堅不解乃呵凍撚鬚上林子虛洋洋盈耳其敢在下風枝山祝允明識仙山圖先君蓋為履約兄弟所作始於癸卯初右秋迄於甲辰仲春凡八閲月而後成余侍大人見其圖此慎重不輕動筆非明窗淨几髙朋良友相對輒藏笥中每下筆必以宋元諸公名畫摹倣故卷中樹石人馬皆法趙松雪屋宇則全學宋人履約得此以陳希哲先生先生慨然作賦無論其雄才大略傾服當世觀其書法之妙亦一時未有履約寶之不啻天球琬琰孰意不能世守流落人間後歸周侍御今又為石壁所得余覩此卷當日相與之盛宛然在目感慨不勝聊識數語於末厯甲戌九月仲子嘉謹跋萬余家有趙伯駒畫後赤壁賦圖及趙子昂鵲華秋色圖兩卷並觀覺伯駒稍遜子昂蓋精工不如蕭逺是為神品妙品之辨今觀文太史此卷全學子昂鵲華秋色圖筆意子昂雖學吾家北苑至鵲華圖出入王右丞李將軍文太史悉力血戰故當獨步文休承所云時用宋元人粉本採取正是漏泄家風十日董其昌觀於京兆署中因題壬申四月南宗霞起北苑風髙吾黨推尊轉相刻畫而其後遂以煙雲淡漠雕氣鏤虛之勝誣罔前人輞川以後似輞川者何不爾耶嘗見襄陽水飛墨濺而半幅剪松削石丹緑熠然使虞山以下諸君子見之豈不折膝階下乃我朝闡揚宗繪羽翼吳興推轂長洲實稱肖子吳門猶有存者流至燕山大半為劉松年李營丘優孟玄黃嘵嘵而去似如吾鄉一木一石不免歸憶平泉子孫而不意敬仲家珍忽然顧我蓋將遲徊夏雲秋水之變使得展焉筆墨以當千日卧遊乃敬仲未之許也家有吳興一本歸當作仙山鐵劵而且以此奉趙神仙縹眇杳然去矣敬仲其如之何丙子冬至中江劉若宰識紹丁丑七月虞山錢居士觀芳觀丙子冬日舊吳申衡翁畫迹人知其多倣趙松雪而不知其本領淵源俱從王右丞李將軍脫胎即趙千里不難方駕奚止松雪乎此卷人物樹石各極精妙經營點染出聖入神余目中所見未嘗覩也枝山墨迹小楷最難余家藏止家園十景記夢遊鶯花洞天記是此翁楷書得意筆並此為三簡翁何處得此雙絶令人生妒題丁丑七月虞山愧林居士瞿式耜敬唐子畏墨竹紙本立軸一林寒竹護山家秋夜來聽雨似麻嘈雜欲疑蠶上葉蕭森更比蟹爬沙唐寅畫唐子畏仿李唐五湖風月圖立軸長四尺餘濶一尺六寸檇李項氏故物四隅有藏印數方風月何須遍五湖一方溪水便堪娛秋蓴肥毳堪更鯉春浪浮沈看浴鳬吳趨唐寅為成器宋君畫仇實父前赤壁圖卷四名家各書蘇長公前赤壁賦一篇附後吳門仇英製右蘇長公前赤壁賦文不録蓮先生書隆池山樵嘉靖戊申蠟月初一日為近彭年己酉仲夏望文彭嘉靖己酉八月書於蕭間齋文嘉吳門周天球書於棐几齋仇實父十六羅漢卷紙本髙一尺長一丈五尺有餘白描人物遒徑古怪極得李伯時番王禮佛圓法後署楷書一行云貫休羅漢吳門仇英實父臨仇實父玉樓春色圖絹本立軸髙一尺八寸濶尺許仿趙伯駒青緑款在左方石上吳門仇英實父製仇生負俊才善得丹青理盛年遂凋落遺筆空山水至今藝苑名清風滿人耳偶見實父此圖不覺生感乃題數字於上覽者尚當寶之寅仲春茂苑文嘉記萬厯戊一帶樓臺萬疊山仇郎畫法出荆關間窗試展神飛越千里風煙指掌間周天球唐子畏水墨山水圖紙本立軸欵在右首楷字如錢亂山雜霧曉蔥巃遙見懸魚是梵宫倚杖漫行行復坐一聲啄木在林中唐寅畫唐子畏梅枝紙本立軸長二尺二寸五分濶八寸欵在右行書東風吹動看梅期簫鼓聨船發恐遲斜日僧房怕歸去還攜紅袖繞南枝右作一長行乙亥嵗二月中旬遊錦峰上人山房戲寫梅枝并絶句為贈唐寅記右亦作一行低一字唐子畏西湖釣艇圖絹本立軸長四尺一寸濶一尺七寸七分水墨畫清逺山倣李唐筆法纖秀欵在右方楷書作四行三十年來一釣竿幾曽義手揖髙官茅柴白酒蘆花被明月西湖何處灘唐寅畫并題江村銷夏録卷一
