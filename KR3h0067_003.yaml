body:
  text: 江村銷夏録卷三詹事府詹事髙士竒撰唐褚河南蘭亭卷絹本髙七寸長二尺餘文不録王弇州家藏鈐縫有貞元等印右唐中書令河南公褚遂良字登善臨晉右將軍王羲之蘭亭宴集序本朝丞相王文惠公故物辛未嵗見於朝美叔齊云借於公孫辛巳嵗購於公孫瓛黃絹幅至欣字合縫用證摹刻僧字果徐僧權合縫書也雖臨王書全是褚法其狀若岧岧竒峰之峻英英穠秀之華翩翩自得如飛舉之仙爽爽孤鶱類逸羣之鶴蕙若振和風之麗霧露擢秋幹之鮮蕭蕭慶雲之映霄矯矯龍章之動彩九奏萬舞鵷鷺充庭鏘玉鳴璫窈窕合度宜其拜章帝備所留賞羣仙也至於永和字克全其雅韻九觴字著其真標浪字無異於書名由字益彰其楷則若夫臨倣莫稱於薛魏賞别不聞於歐虞信百代之秀規一時之清鑒也壬午八月草六日寶晉齊舫手裝襄陽米芾審定真跡祕玩褚河南書得右軍髓昔人已有定鑒當時賜摹本褉帖惟褚法最重於世今觀此書不獨優孟殆欲奪真米襄陽題語絶勝宛然完璧真希世物也余鄉有褚公雙鈎蘭亭未辨的出名手况此筆神妙倣佛數百餘載略無損敝當有鬼神護持非偶然也丁丑仲夏與徐天祐同觀於黃熊徴士舟中多幸多幸良華亭莫是龍雲卿甫記故物米襄陽欲右褚遂摹蘭亭即書史稱薛氏以五十千得之者也樂毅論正書第一此帖行書第一逮今千二百餘年絹素宛然又元章公麟二跋歷歷可據昭陵永閟便應奪嫡矣黃仲威毋以貧故輕失亦毋以慳故不授賞鑒家庶為不負此寶人莫雲卿載題自湯普徹馮承素趙模諸葛貞唐臨右軍禊帖外其嚴整者歐陽率更而佻險者咸屬褚河南河南跡尤多米襄陽既於書史稱得蘇沂家第二本以為出他本上然考之是雙鈎廓填耳襄陽又云右軍筆精大令日寒二帖薛丞相居正故物後歸王文惠家文惠孫居髙郵并收得褚遂良黃絹上臨蘭亭一本乏資之官約以五十千質之後王以二帖質沈存中而攜褚書見過請售因謝不復取後十年王君卒其子居髙郵欲成姻事因賀鑄持至髙郵以二十千得之此本藏深山民間落黃拾遺熊手以百三十金售余後有襄陽題署備極推與且云是王文惠公故物辛巳嵗購之公孫瓛與書史語合按蘇家本於崇寧壬午閏六月手裝此則壬午之八月手裝耳書法翩翩逸秀㸃畫之間真有異趣襄陽所稱慶雲麗霄龍章動彩庶幾近之蓋山隂之詰嗣而蘇本則其仍孫何得甲彼而乙此耶今年萬厯丁丑上距裝裱之嵗蓋七甲子少三正朔耳安得不六倍其直也又有李伯時一跋雖真蹟而似非題此卷者故剔之以戒蛇足後學王世貞跋陌上帝依然閟真蹟欲窺日表少溫奴誤躪驪山傳神但覓雲仍便災石河南急利射雕手除却率更誰徑敵隻字寧輸永師貴八法寧從白雲獲縱令學步太嬋娟為炊肯作重儓依俗格顛米何勞據船取王孫已玉易對展雙疑雕鶚翻别看總是雲霞色未從道士換鵝羣已與君王留馬式小儒豈解襄陽狡偶然弓失偶然得枯樹支屏未為重定武經鑱亦非匹即容懷瓘中下估試與紹京千萬直笑殺蕭家一字蕭少室先生為賣宅禊右用定武蘭亭原韻刻世貞一刻其筆褚河南帖宋刻後吳中有二鄞有法種種差異因知當時摹本不一也王大理弇山公捐重資得褚書黃絹本此又書史中最稱者公舊藏哀冊藁傳是希寶恐不能過之前此二年余與客嘗見於黃氏舟中客訝其與定武刻不類是不然馮趙歐陽輩雙鈎填廓良用逼真而神韻索然無復生意此出河南之筆結體取其似用意率其真所謂克肖右軍正不在㸃畫間也弇山公考訂已確聊書以記所見吳郡周天球題蘭亭真本已入昭陵今所見者惟唐人臨摹本耳然摹本雖得其位置而乏氣韻臨本於位置不無少異而氣韻奕奕有非摹本可及此褚河南黃絹所臨真跡米海嶽謂其絹幅合縫處不書僧字可以證摹刻僧字果徐僧權也大中丞鳯洲先生以厚價購得令人持至吳中命豫題識豫於唐摹惟見宜興吳氏本有宋初諸名公所題及蘇公璠字韻詩者最為精妙而神龍蘭亭有郭祐之鮮于太常二詩跋亦是竒物然以臨本較之神韻相去逺甚况此又有米書跋贊之勝耶按桑世昌蘭亭考載蘇耆家蘭亭一絹本在蔣長源處而王文惠孫居髙郵收遂良黃絹上蘭亭此豈即二卷中之一觀者能以心會其妙處自當知其出摹本之上矣遂書此以復萬厯五年嵗在丁丑閏八月十日米茂苑文嘉云唐摹蘭亭有二其一為王文惠家元章書史褚遂良黃絹上臨本其一為劉涇家唐絹臨本今此本是元章所題手裝審定真蹟以為褚法之妙薛魏歐虞所不能及殆即黃絹本也大理公以百三十千購得之遂詳訂始末復以示余已無能贊歎聊補書其未備云同河間俞允文海徐益孫識萬厯辛卯於爾雅樓陳仲醇觀東往嵗從朱太傅家見褚河南雙鈎枯樹賦歎其佳絶今日過能嬰齊頭閲此褉帖摹本神彩飛越令人魄悸所謂下真蹟一等蓋絶代竒琛也視昔所見直虎豹之鞟耳丙申十月十九日王稚登書蘭亭真本已失世之傳訛僅存形似若不覩此卷終如說夢又非得米襄陽題識極其推重猶未可據愚謂二公真右軍忠臣也其巔末考訂諸名賢已詳盡余何敢贅惟有作難遭難遇之想而已稚圭其寶諸記萬厯三十一年三月四日長洲沈咸唐王右丞萬峰積雪圖卷絹本髙九寸長七尺上有御前之印內合同印文淵閣印奉華堂印揭徯斯印項子京天籟閣中物也藏印俱備城中十日暑如炙頭目眩花塵土塞僧樓今日見此卷雪意茫茫寒欲逼古栟修栁枝裊矯下有幽篁厠叢碧隔溪膠艇不受呼平地貫渚無人跡西風翻鴉忽零亂逺雁迷雲猶嚦嚦筆疏墨淡精神在收閲千年若完璧宛然一段小江南三遠備全能事畢維名依稀半未漶老眼再摩初認得所存只是天假借名手當時重唐室吳中人家寶古跡自宋及元髙爾直若教見此風斯下倒橐定應無吝嗇錦標內帑固自有人間間出鳯五色老余尺素見雪渡草樹凌競人局蹐僅有盈尺不盡意何如此圖長數尺太丘孫子具法眼鑿壁收藏皆襲百我將拙語敢印證聊寫心知并目識右丞之筆神妙非常時代久逺見亦罕矣余少於沙溪陳氏獲觀雪渡圖盈尺而已今又於嚴氏閲此修卷深幸老年擊此於目又題𢎞治壬戌中秋日沈周多古之髙人逸士往往喜弄筆作山水以自娛然寫雪景者蓋欲假此以寄其孤髙絶俗之意耳若李成之萬山飛雪李唐之雪山樓閻郭忠恕之九峰雪霽王叔明之劒閣沈石田之關山積雪圖皆種種臻妙而豫皆及見之但恨未覩王維雪景何如耳𢎞治乙卯春偶於都下錢太常處閲此萬峰積雪卷賞鑒竟日覺寒氣逼人真摩詰平生得意筆也始知李成輩皆宗摩詰傳為世寶此卷不啻今之鳯毛麟角矣枝山道人祝允明跋詩中有畫畫有詩摩詰落筆秀且竒閻相吳生那足道象外能將造化師藍田輞川僅臨本開元東塔跡已隳山居圖識宣和字今藏御府人難窺我居京師頗留意日尋斷幀收殘碑琉璃厰西得兹卷敗篋零亂縈蛛絲長江峻嶺互合沓叢竹古樹蔽嶮巇山腰巍巍置層閣橋根㶁㶁流冰澌西風凝寒雪意徑一天黯淡彤雲垂斜行飛鴻失沙渚犯冷孤客望酒旗或棹扁舟或輕䇿神理曲盡毫無遺晴窗細觀拭病目小字漶漫書王維石田沈翁跋長句謂如彩鳯輝朝曦重裝錦標紫鸞鵲草堂珍祕怡老資炎天往往布几案滿簾飛霰吹涼颸右丞胸中自瀟灑汪汪如有千頃陂松針石脈藴靈異雨晴寒暑隨形施東坡生平頗崛強亦於維也無間辭江村髙士竒題唐僧懷素草書自敘帖紙本髙九寸長二丈二尺文不録凡十五接合縫處有建業文房之印四代相印許國後裔隔水綾上有羣玉中祕秋壑圖書項氏各印引首李東陽篆藏真自序四大字符三年九月五日前進士蘇耆題大中祥四年嘉平月十有八日直集賢院李建中看畢題升元四年二月日文房副使銀青光祿大夫兼御史中丞臣邵周重裝事兼文房官檢校工部尚崇英殿副使知崇英院書臣王紹顔以上四跋在本卷紙尾題懷素自敘卷後狂僧草聖繼張顛卷後兼題大厯年堪與儒門為至寶武功家世久相傳太子太師致仕杜衍記時至和甲午中夏在南都得之草書有妙理惟懷素為元豐六年十一月草五日蔣之竒書若此完者紹興三年三月豫謫世傳懷素書未有居髙安前新昌宰邵君出以相示豫雖知其竒然不能盡識其妙豫兄和仲特善行草時亦謫惠州恨不令一見也月眉山蘇轍同叔記崇寧二年十二十五日觀邵䶵辨老方艱難時流離轉徙江湖間猶能致意於此可見志尚又獲觀伯考少師品題併以嘉歎紹興二年仲春草三日陽羡蔣璨石揚休家黃魯直藏真自敘世傳有三一在蜀中以魚箋臨數本者是也一在馮當世家後歸上方一在蘇子美家此本是也元祐庚午蘇液攜至東都與米元章觀於天清寺舊有元章及薛道祖劉巨濟諸公題識皆不復見蘇黃門題字乃在八年之後遂昌邵宰疑是興宗諸孫則蘇氏皆丹陽里巷也今歸吕辨老辨老父子皆喜學書故於兵火之間能終有之曽紆公卷題紹興二年三月癸巳空青老人藏真草聖所閲多矣未有如自敘之精妙筆法走龍蛇悉具於此壬子閏夏五日保之行父景晉同觀夏日與劉延仲吕辨老過都統太尉王公觀令畤法書名畫如行山隂道上映照人目殆不可言遂知兵火之餘珍竒多失莫此若也因見辨老素師自敘一洗纍年胸中塵土是真幸㑹五月十二日趙令畤德麟題紹興二年辨老藏懷素自敘後有先人題字蓋紹聖三年謫居髙安時為邵叶稽仲書也不知流傳幾家以至於辨老之紹興癸丑三月九日遲觀於婺女馬軍橋潘氏第紹興癸丑三月草七日洛陽富直柔觀三氏流傳素師自敘初為南唐李氏物厯蘇邵吕轉徙又不知幾家今為宫傅謙齊先生徐公所藏寬聞昔黃山谷作字蘇長公從旁贊之錢穆父云惜不見懷素自敘長公不以為然後山谷復見之始深歎服而書遂進今卷後云藏於蜀中石揚休家以魚箋臨數本者是也潁濵題字時尚恨其兄不及一見顧寬何人乃得預此榮觀賞玩之際豈勝欣幸及觀序內有擔笈杖錫西游上國等語知書雖學之一節欲造微處其精勤若此則學之大於此者可以小得而自足乎然則豫之欣幸又不在此驚蛇走虺驟雨旋風間而已也𢎞治六年七月既望長洲吳寬題家物前六行乃舜欽所補懷素自敘帖本蘇舜欽見於書譜而此卷正合其為真蹟無疑然具眼者觀之固不待此也舊聞祕閣有石本今不及見見此卷於少師謙齊徐公者再往復披玩不能釋手敬識而歸之𢎞治十一年九月三日長沙李東陽唐僧懷素論書帖卷紙本髙八寸餘長一尺一寸八分前有宣和政和雙龍諸小璽御書數印後有宣和政和紹興四小璽項氏收藏為其山不髙地亦無靈為其泉不深水亦不清為其書不精亦無令名後來足可深戒藏真自風廢近來已四嵗近䝉蕩減今亦為其顛逸全勝往年所顛形異不知從何而來常自不知耳奉二謝書聞知山中有事也唐釋懷素字藏真俗姓錢長沙人徙家京兆𤣥奘三藏之門人也初勵律法晚精意於翰墨追倣不輟秃筆成塜一夕觀夏雲隨風頓悟筆意自謂得草書三昧斯亦見其用志不分乃凝於神也當時名流如李白戴叔倫竇臮錢起之徒舉皆有詩美之狀其勢以謂若驚蛇走虺驟雨狂風人不為過論又評者謂張長史為顛懷素為狂以狂繼顛孰為不可及其晚年益進則復評其與張芝逐鹿兹亦有加無已故其譽之者亦若是耶考其平日得酒發興要欲字字飛動圓轉之妙宛若有神是可尚者此論書一帖出規入矩絶狂怪之形要其合作處若契二王無一筆無來源不知其肘下有神皆以狂稱之殆亦非心㑹者豫昔購自敘帖雖行草不倫其筆法與此帖一同但有肥瘦之異正不解春草各有態執而論書鮮不失矣汴也何幸覩此竒觀千百載下吾謂君子有三樂此帖與存焉後人其寶之墨林項元汴在雙樹敬題五代楊凝式韭花帖卷紙本髙八寸上有紹興并內府印記趙松雪藏印項墨林氏收藏諸印俱全陳眉公跋尾晝寢乍興調飢正甚忽蒙簡翰猥賜盤餐當一葉報秋之初乃韭花逞味之始助其肥羜實謂珍羞充腹之餘銘肌載切謹修狀陳謝鑒察謹狀七月十一日凝式狀大德壬寅忠宣後人張晏嘗收帖紹興以厚價購宣和書譜載楊凝式正書韭花得之傳於江南可與參政自浙西回攜以相惠議大德八年嵗在甲辰三月初十日集賢學士嘉大夫兼樞密院判張晏敬書與封巨鹿王時公元此帖元奎章閣舊畜也頒賜社屋時王弟某攜避通許盧氏國初希朱髙祖文稿中有此題跋決唐物無疑也今其孫瑭與其壻崔應奎秀才始售之聞其被賜時有蘇武牧羊圖一玉壺印一今止存此帖云正德壬申夏通許人賈希朱記宋董北苑江山髙隱圖雙幅絹本立軸長三尺二寸濶二尺上有宣和明昌御覽稽察司等印峰巒水樹俱淡設色中間人物意致夷猶有隱君子風誠神品也唐宋畫家多磊落前有荆關後李郭就中超邁誰稱最董源山水真竒作意致淋漓法度存煙雲變幻精神拓不數三王筆力工翻嫌二李天機薄我藏江山平逺圖縑素古淡氣韻殊峰巒回互境深隱林木蔥蒨雲有無初開一徑入崖谷板橋低接幽人屋石磴柴門宛轉通層樓復閣憑空矗漠漠荒煙合野榛濛濛積靄籠江竹積靄荒煙望不窮平沙逺水看難足谷口何人曳藜杖翛然獨恣林泉賞閣上何人靜倚闌澄懷天地任俯仰胸襟貴欲羅五嶽下筆乃可圖方丈不然何以尺幅間天真爛漫意蒼莽神物從來不可留寒林雪棧徒增想慨此風霜歷幾多明昌璽字猶清朗長安六月炎氣蒸黃埃赤日時侵凌拂拭小齊挂素壁對之颯颯疑秋澄憶在江村舊茅舍頗無修簷與廣厦古栁髙槐夾路垂大溪日夜流其下飯後隨意追凉風那知塵世有車馬狂來帝都十年餘跛驢破帽屢上書才疏空愧排閶闔性野終願歸樵漁吁嗟人生不能乘風破巨浪亦當著書深山自怡曠胡為僕僕紅塵中春水秋山日惆悵披圖不覺鄉心生何時濯足滄浪上江村髙士竒董北苑重巒閣道圖絹本立軸長四尺一寸餘濶一尺六寸用墨重而設色甚淡上有御書之寶宣和祕府中物也宋范寬重山復嶺圖卷絹本髙一尺三寸長一丈三尺餘全作礬頭山頂蔥鬱渾厚敷文稱其不假雕巧為美洵然隔水綾上有題字三行為敷文之筆華源范中立善作重山復嶺古木瀑泉近世鮮及皆若真山不以雕細巧為美宋蘇文忠公篔簹圖卷絹本髙七寸長五尺石室先生清興動落筆縱橫飛小鳯借君妙意寫篔簹留與詩人發吟咏石室先生戲墨蘇軾臨是日試廷圭墨元祐元年十月草三日東坡天資超邁故其所作輒與人殊不獨詩文為然其墨竹之在人間如至珍也觀此卷風韻可見矣竹攻愧樓鑰游戲寄興者然而造妙者不多見墨儒者所以唐王右丞維皋平石本既經重刻甚不足觀而文石室獨能超絶今古東坡謂此枝乃推廣其意者雖曰推廣或者過之後有樓米二公跋語益可重矣余生也後恨不得趨函丈試問其訣也右雖無欵印定為趙魏公書無疑米跋亦未之見惜哉宋米南宫雲山圖絹本髙七寸長丈餘水墨無欵老樹筆間生竒石筆下出濃淡髙低逺近山隂晴一半雲間沒漠漠江天杳杳空不勞施力自然中若於沙際尋歸路來看霜林葉紅枯士𢎞枿溼冥冥濛濛方寸天不知所以然而然槎老風煙霾雲懵董栖蒼𤣥晴窗開卷作三叫看得米家神氣小塗揩濃墨幻東西汙我瀟湘山色曉延陵邵亨貞水筆墨簡古非他畫工所及卷後兼右米海嶽山有李河東士𢎞邵復孺亨貞二題詩字皆精妙誠可寶玩也萬厯庚辰二月十七日雨窗展玩因書其尾見茂苑文嘉村圖與此卷甚相類信乎家學余嘗敷文大姚之有自也河東李公云濃淡髙低逺近山隂晴一半雲中沒殆得之矣考米氏父子本襄陽人而寓居京口亦嘗寓蘇與朱樂圃輩同游故吳中時有真蹟留存修宋史者直云吳人而後之論者皆曰吳縣人非也細衡郡文肇祉有流宕如北苑者不米元暉畫有謹如營丘者顓以突兀冥蒙為竒而後人失之乃信手㸃抹自謂米家山此如倣顛張之草聖而不從郎官壁記入門真無本之學也此卷全寫景至其規矩法度於山頭勾法見之乃楚山清曉圖之一變大姚村圖在余家又復狂怪與此不同文基聖以為絶類非也雲間董其昌跋宋黃文節公行書梅花賦卷紙本髙九寸長一丈五尺層城之宫靈苑之中竒木萬品庶草千叢光分影雜條繁幹通寒圭變節冬灰徙筒並皆枯悴色落摧風年歸氣新搖藝動塵梅花特早偏能識春或承陽而發金乍雜雪而披銀吐豔四照之林舒榮五衢之路既玉綴而珠離且冰懸而雹布葉嫩出而未成枝抽心而插故標半落而飛空香隨風而遠度挂靡靡之遊絲雜霏霏之晨霧爭樓上之落粉奪機中之織素乍開花而傍巘或含影而臨池向玉階而結彩拂網户而低枝七言表柏梁之詠三軍傳魏武之竒於是重閨佳麗貌婉心㛠憐早花之驚節訝春光之追寒夾衣始薄羅袖初單折此芳花舉兹羅袖或插鬢而問人或殘枝而相授恨鬟前之嫌金鈿之轉舊顧影丹墀弄此嬌姿洞開春牖四卷羅帷春風吹梅畏落盡賤妾為此斂蛾眉花色持相比恆愁恐失時黃庭堅書宋李龍眠洛神賦卷紙本髙八寸白描作草五段每段用楷書標出本文於上前後有項氏收藏圖記鈐縫後隔水上有永嘉陳達家藏徐僧權滿鶱湯法象丁道矜搖崇朱异天嘉二年十月草三日宋林和靖詩卷紙本髙九寸二分長八尺七寸凡六接俱有濟陽文府鈐印制誥李舍人以松扇二柄并詩為遺亦次來韻編松為箑寄山中兼得紫微詩一通入手涼生殊自慰可煩長聽隱居風孤山雪中寫望片山兼水繞晴雪復漫漫一徑何人到中林盡日看遠分樵載昨蓋切重斜壓葦叢乾樓閣嚴城寺疏鐘動晚寒孤山從上人林亭寫望林表秋山白鳥飛此中幽致世還稀誰家岸口人煙晚坐見漁舟兩兩歸送史殿省典封川炎方將命選朝倫治行何嘗下古人擁斾肯辭臨逺郡登艫還喜奉慈親水連芳草江南地煙隔寒梅嶺上春若過中途值歸雁慰懷能與致音塵春日齊中偶成空階重疊上垣衣白晝初長社燕歸落盡海棠人卧病春風時復動齊扉殿直丁君自沂適閩艤舟惠顧晤語未幾且以拙詩為索病中援筆勉書數章少塞好事之意耳時皇上登寶位嵗夏五月孤山北齊手書林逋記吳書和靖林處士詩後湖蘇軾山緑不論世外隱儂生長湖山曲呼吸光飲君子傭兒販婦皆氷玉先生可是絶俗人神清骨冷無由俗我不識君曽夢見眸子瞭然光可燭遺篇妙字處處有步繞西湖看不足詩如東野不言寒書似留臺差少肉平生髙節已難繼將死微言吳人不好事好作祠堂傍修竹不然配食水仙王一盞寒泉薦秋菊右十四行小行楷書在本帖紙尾士君復手書七言近體五首其語冲右和靖林處彞可詠而結體尤峭徑然有韻態不作嵓嵓骨立也蘇長公一歌其推許此君至矣然至詩如東野不言寒書似留臺差少肉二語便是汝南月旦何嘗少屈狐筆也留臺者李建中也嘗分司御史臺考之集稱西臺以偶東野尤當更稱耳長公書法勻穩妍妙風神在波拂間而麗句層出尤刺人眼始錢唐人即孤山故廬以祀和靖游者病其湫隘因長公詩後有我笑吳人不好事好作祠堂傍修竹遂徙置白香山祠與長公配逮於今香火不絶乃其遺蹟與長公同卷價踊貴十倍太史公有云伯夷叔齊得夫子而名益彰若君復者抑何其多幸也歟萬歷壬午嘉平月吳郡王世貞謹題世言林和靖先生字不如詩詩不如人然觀此卷亦自瘦徑有法杜襄陽詩云書貴瘦硬方通神豈先生謂耶世人貴耳若無坡翁詩此卷當無以重價售者苐蘇長公去先生時代無幾為長歌題其卷後推重至此吾輩固當以坡翁增重詎使重末而忘其本耶若蘇書則又是其平生合作余兄謂君復多幸誠然誠然世懋書於奉常齊中萬歷丁亥春正月吳郡王宋蘇文忠公書李太白詩卷紙本髙尺許長三尺餘砑花箋二幅字各十行前有松雪齊墨印喬中山收藏鈐記前後八方楊仲曦收藏鈐記共數十方後有笑狂半印謙字印喬字九疊文圖書問不知齊墨印跋尾紙六接計九尺餘朝披夢澤雲笠釣清茫茫尋絲得雙鯉中中字㸃去內有三元章篆字若丹蛇逸勢如飛翔還家問天老奧義不可量金刀割青素靈文爛煌煌咽服十二環奄見仙人房莫跨紫鱗去海氣侵肌涼龍子善變化化作梅花粧贈我纍纍珠靡靡明月光勸我穿絳縷繫作裙間璫挹子以攜去談笑聞遺香人生燭上華光滅巧妍盡春風繞樹頭日與化工進只知雨露貪不聞零落近我昔飛骨時慘見當塗墳青松靄朝霞縹眇山下村既死明月魄無復玻璃魂念此一脫灑長嘯登崑崙醉著鸞皇衣星斗俯可捫元祐八年七月十日丹元復傳此二詩老坡平生多與異人遇此詩帖云傳於丹元丹元者道人姚安世自號也先生將赴定武前兩月與姚相會於京師出南嶽典寶東華李真人像及所作二詩言近有人於海上見之蓋太白云雖事涉荒怪然決非火食肉人所能贋作嗟夫二公未遺世時世皆以謫仙目之今當相從於閬風弱水之上醉笑調歌靈音相答皆九霞空洞中語衆不可蓋後復有神游八表者傳誦而來洗空萬古俗氣吾老矣尚或見之年題正隆四年閏六月西山蔡松頌太白此語則人間無詩觀東坡此筆則人間無字今有丞相蔡衛公所題則人間無所啓其喙縱復妄發適為滓穢清虛此卷當有神物護持自非夙緣留名十洲三島者未易得見矧擅有而藏之者豈陸行人哉二公仙去已久衛公且謂復有傳九霞空洞中語而來僕敢言蕭閒住世今此身是何謂尚或見之耶不施宜生謹書帖清竒超妙蔡孔子作春秋游夏能措一辭此衛公首發明之施先生繼品題之顧如晚進安敢措辭於其後哉姑記姓名以見榮觀之幸焉劉沂謹書竒出塵之詩老泉飄逸絶倫之字非衛公太白清品題無以發明施老以謂二公仙去已久蕭閒今此身是誠非虛語正隆己卯立秋前一日髙衎題局傳東華之詩蕭閒題玉局之字三住老仙發玉揚之金闕侍郎祕藏之雖至寶所在有物護持終恐六丁持去如圭輩薄福之人或不得時見之也此所以捧玩再四遲遲其還是月中休書蔡圭謹此東坡書李太白詩金相蔡松年跋之詳矣正隆乃金主亮之年號施宜生即桯史所記奔金使宋泄機而被戮者松年而下用筆皆稍似蘇者當時程學行於南蘇學行於北金之尊蘇與孔子並故習其餘風皆有類耳宜生輩於松年辭極推重書必提頭此當時諛佞之風也然而由此亦可以觀其人覘國之脈矣松年與宋京卞同姓同時又云西山故觀者誤以為宋人非京卞鼠輩即季通諸大君子故不敢輕議也然其言之當雖京卞輩亦不以人廢言松年雖略過稱其所見以是為的耳何怪哉鄉貢進士南海梁克載得而珍藏之吾三兒𢎞至與之同舟來南安因出觀之遂書以復大明成化十九年癸卯郡之吟風弄月臺書月晦華亭張弼在南安蘇文忠公行書真蹟惟寒食詩與此卷流傳名重筆墨蒼竒紙色完好然寒食詩止黃文節公一跋此則金朝諸老所題凡五多一時名輩金人筆墨世尤罕見當與蘇公所書並傳按蔡松年字伯堅仕金由行臺尚書省令史至尚書右丞相加儀同三司封衛國公鎮陽别業有蕭聞堂自號蕭閒老人諡文簡當時樂府推伯堅與吳彥髙號吳蔡體有集行於世其自序云王夷甫神情髙秀宅心物外為天下稱自言少無宦情使其雅詠𤣥虛不經世務超然遂終其身則亦何減嵇阮而當衰世頽俗力不可為之時不能逺引髙蹈顛危之禍卒與晉俱為千古名士之恨讀此序則其生平可見施宜生字明望浦城人宣和末為潁州教官仕金至翰林學士自號三住老人其在潁州日從趙德麟遊頗得蘇門沾丐劉沂史不載味其跋語亦蔡施同時人髙衎字穆仲遼陽渤海人敏而好學自少有能賦名同舍生欲試其才使一日賦十題戲之衎執筆怡然未暮皆就彬然可觀年二十六登進士第乞歸養逾二年調漷隂丞歷官尚書省令史前後三為吏部銓事修舉選人便之大定五年為宋生日使中途以病告歸蔡圭字正甫松年長子七嵗賦菊花詩語意驚人日授數千言天德三年進士擢第後赴選調求未見書讀之其辨博為天下第一歷澄州軍事判官三河主簿正隆三年銅禁行官得三代以來鼎鐘彝器以正甫博物且識古文奇字辟為類編官後為翰林修撰同知制誥改户部員外郎太常丞朝廷稽古禮文之事取其議論為多其續歐陽公集古録六十卷古器編三十卷補南北史志書六十卷水經補亡四十篇晉陽志十二卷今之傳世宋元人墨蹟尚可得金人墨跡甚少此不僅坡公書法髙妙諸跋字跡皆佳故各書大略後之覽者當并跋寶而藏之江村抱甕翁髙士竒宋郭河陽溪山秋霽圖卷絹本髙六寸八分長五尺八寸淡設色宋箋覃尾右郭熙溪山秋霽圖乃真筆也原有倪雲林籖題并柯九思印章今籖題已失而柯印猶存蓋倪柯二君所藏也舊在豫友杜君處嘗求先太史題而未果今二十年矣其子于始持來求跋按熙之出稍後於營丘故當時以李成郭熙並稱則固已崇重之矣當時山谷詩云玉堂坐對郭熙畫發興已在青林端又云郭熙官書但荒逺短渚曲折開秋晚而石田先生論營丘云丹青隱墨墨隱水其妙貴淡不貴濃今觀此圖脫去筆墨畦徑而専趨於平淡古雅雖層巒疊嶂縈灘曲瀨略無痕跡信乎非熙不能而真足為營丘之亞也九月三日茂苑文嘉萬厯己卯秋李成郭熙並宋名手一時畫院諸人爭效其法遂往往魚目混淆大抵二君能以丹青水墨合為一體不少露痕跡信乎繪家三昧也此圖為溪山秋霽長巖曲嶺逺樹平蕪與浮嵐暮靄相映森沈茂潤無纖微不愜以此視營丘真當並驅爭先矣太原王稚登書豫友莫廷韓嗜畫畫亦逼真子久此卷蓋其所藏以為珍賞甲科後歸潘光祿流傳入余手每一展之不勝人琴之歎廷萬厯己亥首夏三日董其昌是日前一宿夢韓及曉起題河陽繪事妙絶寰中四百年來真蹟頗少豫生所見亦不數數此卷精美入神綿密秀潤殆非逺與松年和之輩所能倣佛而况其他乎觀者珤之丙申孟夏望後三日蜀陳盟書於真州旅舍宋李龍眠蕃王禮佛圖卷紙本髙一尺長三尺八寸水墨描海氣蒼茫水雲天接佛在巨浪中手指放白毫相光袒裼趺坐蕃王虬鬚袴褶長跪受記從者殊形詭狀延頸遙瞻或合掌或拱立為態不一計三十一人人長四寸有餘其維西列萬國有土此有人孰是無繼立而能治民佛化大無外萬有入彌綸衣冠雜誕譎莫不悉來賔東方九州地治教亦具陳豈知五經表復自敘彝倫斥鷃譏南運舜英疑大椿擴充固有道一視歸同仁東皋釋妙聲佛身充滿大千界蓮座𤣥談海水翻融攝羣修證圓覺靈通虛徹卓然存玉笥李簡玉峰善士唐漢卿攜蕃王禮佛圖請贊為之贊曰九彝八蠻聲教罕至惟見佛容必恭敬止維王在前載拜稽首羣從咸集嚴列左右峩峩其冠楚楚其服虬髯螺髮穹鼻深目伊昔宋代鮮有其人方今聖朝來往日新曩迦辣藏孕囉賽因撒藍嘛哩名動搢紳言不雅馴訓義無别粵有象胥善為解說式觀此卷畫手非常裝潢藏之有耿餘光城時至正十年上章攝提格孟陬已立春六日郡天台老學沙門餘澤七十四嵗書於寶馬寺東廡如山重公之暖閣香水海中傳直指碧蓮華上結跏趺方今象教行中國况爾蕃王部落俱八十五翁易偉雕題朱髮紛重趼竺國西來聽梵音仰止孔壇羣弟從杏花春雨坐彈琴吳下周備華雨繽紛寶樹重戎王卑俯近慈容從來禮樂行中國幾度鑾輿下辟雍雁山戴寧金繩鹿苑四花香沙界蓮臺法雨長蕃落左齊膜拜皈依始信有空王嘉禾彭冲溪李龍眠維摩演教圖卷紙本髙尺有五分長六尺一寸中畫文殊法衣鬘髻端坐於牀足躡蓮臺虛其獅座對設一榻維摩趺坐幅巾長髯指顧生動參謁者大小各一一人拈花斜立牀側應真六人或坐或立俱倚牀前後一女持鉢一天王帶劒猙獰擁衛後有綰鬘髻者五比丘一老叟一俱合掌諦聽又天王一人屹立與前帶劒者相望後有沈民則楷書心經及董文敏公等跋可稱完璧不録心經文永樂丙戌嵗豫客燕臺真如寺老僧元覺出示李龍眼演教圖真蹟隨索豫書心經附後自愧玉石難並固辭再三老僧索之甚篤勉强淨手謹書一通是夕上元日也雲間沈度宋李公麟演教圖精工之極蓋學陸探微平視閻右相者後為吾鄉沈學士補書心經其楷法端徑亦與畫相抗衡本為長安古寺常住舊藏大都為有力者豪奪轉入飛鳬手遂成世諦流布非法門皈奉之故矣公麟從秀鐵面游秀師訶其畫馬因改而畫菩薩變相雖得畫家三昧實以畫作佛事者也元時惟吳興趙文敏庶幾不愧之觀因題董其昌舊觀於長安苑西邸中丙寅二月望重觀於吳門官舫二紀餘矣其昌李伯時人品畫法名重當世故一時效之者衆魚目夜光慧眼自辨余所見最多然惟袁氏白蓮社王孫匡南草堂王敬美伏生授書項子京女孝經朱少傅髙士余家蘇長公笠屐像與此卷維摩演教圖乃真蹟其餘贋本亂真雖工奚取觀其所作摩詰文殊二像飄飄有天人相細入微茫而髙古超越非塵凡面目聽經法侣皆皈心合掌若羣石㸃頭真神來之筆視後世丹青手直土苴耳白描畫易纎弱柔媚最難遒徑髙逸今觀此圖如屈鐵絲唐有閻令宋有伯時元有趙文敏可稱鼎足矣沈學士書莊嚴整肅如程不識用兵亦也太原王稚登書於快雪亭時之傑宋楊補之雪梅卷絹本髙七寸七分長四尺二寸氷花墨幹雜以琅玕真得孤山籬落之致筆端造化出天巧寫出江南雪壓枝誰道春歸無覓處橫斜全似越溪時楊補之得墨梅三昧山谷道人歎曰如嫩寒清曉行孤山籬落間但缺香耳則筆端春色之妙此言盡矣石海野老農香影亭前放鶴時今見畫圖疑水邊上竹林西是夢南枝雪壓得春遲橫止止道人書憶羅浮山嫩寒清曉竹邊吟淺水橋澗外尋夢下路玉龍半樹偃瓊林看玉龍半樹偃瓊林抱鶴攜琴雪霽尋水畔橫斜不厭被渠香影釣清吟為被渠香影釣清吟水竹居中月夜尋願託嵗寒伴侣一琴一鶴老丘林余性愛梅夢寐想見故家園水竹之居多種梅花玩其清也每雪霽月明衝寒獨往心與景會則悠然吟哦以自樂恍若孤山雲水間噫梅産江南標且尚矣然非近水傍石映竹橫枝則其神不麗非雪曉月宵攜琴抱鶴則其清不足故廣平感叢棘而作賦和靖樂水月以搜吟亦猶君子小人之各有黨類焉其趣深矣此卷乃士安御史見贈雅愜素懷披圖增慨想見其人因題小詩以紀之時屆至正癸巳季夏之五日書於海律寓過茂林家出揚補之手卷因觀前洪武之八年秋賢所詠者不過一時之興僕敢不作詩以紀其後云進士唐幼明梅花自是神仙骨不許凡人肉眼看雪壓江南春滿屋玉堂瀟灑月光寒天生鐵幹出塵標誰植孤根傍野橋疏影屈盤香滿地素心凝露骨昂霄折枝寄驛懷人逺索笑題詩待雪消移向玉堂魁衆卉實和金鼎在明朝紫篔生誰寫江南氷雪姿疏花冷蕊更清竒欲留貞白同髙節故著琅玕玉一枝補之寫梅真絶品涪翁猶惜不聞香水邉籬落天然趣清賞何須白玉堂匡山吳勤一枝鐵幹如龍角幾箇氷華傍玉臺疑是孤山晴雪夜美人和月折歸來李澄之竹外斜枝凍雪乾揚翁風度亦酸寒扁舟穩繫吳山麓須向石湖深處看匏菴溪橋近日行遊懶來未減曉坐對橫斜竹外枝饒舌誰云香氣少風行時何日條風野岸回嵗寒未放塢邉梅逃禪老子真能事探取東君消息來兩冬常苦雪漫漫小圃荒亭擁褐寒翻是今年花信晚亂瓊冷蕊此中看藜杖椰瓢久不攜間披翠軸遣單栖非同和靖多情思唐突清標號逸妻農髙士奇淵同為建王宋曽覿字純甫號海野老與龍大內知客孝宗以二人皆潛邸舊人觴詠唱酬字而不名一夕進月詞西興共聞天樂賞賚甚渥所著有海野詞又記宋燕文貴秋山蕭寺圖卷絹本髙九寸五分長九尺一寸五分用墨濃潤鉤勒古徑林木筆意全仿郭熙山巒屋宇人物舟騎稍加工細雖傅色簡淡而蒼秀之妙令人眼明心爽款在末尾小楷書燕文貴畫四字跋語俱名筆信可寶也前後宋元人收藏印記數方項墨林家故物前有小治字編號及收藏諸印憶往年柿葉霜黃秋潯陽江上山如繡挾䇿追遊滿壑芙蓉波冷月臨川釣舟箇箇來沙曲梵宇層層倚樹顛白髮田園歸計晚斷腸西望夕暉邉鍾陵余復八分書憶舊遊醉騎支遁馬閒覓海翁為愛前朝寺披圖鷗落澗松林月懸崖瀑布秋愧無棲隱地吟咏到滄洲樗菴屠文野棠花落過清明春事匆匆夢裏驚倚棹幽吟沙際路半江煙雨暮潮生己酉二月草一日為清明日風雨淒然舟泊東林西滸步過伯璇徴君髙齊焚香瀹茗出示燕文貴秋山蕭寺圖展玩既久因寫是日所賦絶句於上絶倪瓚雲煙眼明仿識圖漫浪遨遊五十年髙崖巘出中意江峽曽乘萬里船遊天游生陸廣萬木聳髙忽見燕侯畫令人憶舊千巖開太古秋石路驅輕騎江風送逺舟人間無此境舒卷不能休驅曲江居士錢惟譱己酉嵗僕客沈隱君伯璿家觀燕文貴精妙入神畫不敢綴辭沈君索詩書卷後勉賦四語後二載復觀斯卷諸公沛然吟長篇沈君復索鄙詩故有是作長風吹船過彭蠡縹眇雲巒矗天際天柱峯回玉筍遙金掌芙蓉半空起汴宋後先多畫師回斡天機誰比擬燕侯文貴世罕得㸃染清妍才擅美斯圖拂拭雙眼明幽討直須論萬里簫槮絡石虧雲根鐵壁蒼崖徹澗沚紺殿珠樓佛寺中丹臺玉室仙境裏水邊沙際市橋通野店人家茆屋底令我憶舊游心跡追冥搜華星耀丹壑綵杖凌𤣥洲安期羡門子招邀指蓬丘回視句吳山培塿一土壞載復觀斯圖慷慨興歌謳天游生陸廣蕭寺久寥落燕侯為發揚山橫江樹晚殿鎖碧雲涼杖䇿情仍在乘舟意不忘獨懷前代事撫景暗悲傷令右蕭寺圖乃燕侯文貴所作按梁武帝造佛寺蕭子雲飛白大書蕭寺二字故名今覽此圖不勝感慨漫賦是詩書識於後恂環中老人鮑野性樂山水廛居違素心薾然困疲役胡能遂幽尋恆思愜所適勝槩恣登臨秋清景尤曠蒼翠列遙岑霜餘委蔓草孤秀愛雲林畸人寡諧俗結宇丹崖隂浮念不煩遣寂寞契冲襟况復邇蕭寺禪誦有遺音簞瓢足自老簪組知難任披圖憶所歷閲嵗兹已深景物匪殊昔但傷華髮侵何當脫塵躅歸休期自今寺河南髙㢲志題於秀水隱居水秋山望不盡蕭意無窮巖壑飛霜月樓臺落風待船茅屋近乘騎野橋通神㑹燕侯得當時孰與同前東塔住山若允長江浩蕩秋波碧待渡行人立沙側望中煙樹翠糢糊夾岸層巒幾千尺禪宫梵剎出逺林林間曲徑歸僧尋也知畫史真善幻一幅生綃傳至今吟嘯生羅紘六月閒居塵事寡故人相訪衡門下示我秋山蕭寺圖云是燕侯之所寫燕侯畫癖人共知苦心毫素鬢成絲江山楚越曽遍覽援筆絶境移於斯千巖萬壑氣森爽木落天虛百泉響翠碧含風薜荔懸青林積雨莓苔長澗谷金銀佛寺開五雲樓殿影崔嵬聽經鶴繞多羅樹衛法龍趨七寶臺秋濤江上兼天湧浦漵聨綿山縱􅑨幽人乘暇喚舟航逋客還尋躡坡隴野騎冥搜度小橋水邊林下逢漁樵煙岑猿嘯清裊裊蘆洲雁起輕飄飄乃知異境不可得汩沒人間看遺墨布襪青鞋興浩然塵容白首歸猶惑依稀雲氣上衣襟動我登山臨水心山中故人儻招隱結茆擬傍蒼崖隂長沙蕭規輿酌清泉步自山南陲躋攀得幽勝超攄遂忘下疲依巖結淨宇面海啓髙扉振衣虛臺迥窺竇隂雲迷佛鐙晝熒熒翻經唯老緇竟日無嘯語適聞林鳥啼謂非隔人世靜趣寧若兹久思脫塵網負纍勢莫遺所遇愜遐想何能即幽棲射利念已絶徇名心更違終尋煙霞侣同赴滄洲期題八月十三日過顧子羽東溪小隱羽為伯璇求蕭寺圖時豫匆促理櫂不得思索遂寫題海雲蘭若詩於其右彭城劉堪識回崖列岫鬱相連兜率樓臺際碧天飛鳥已還秋色裏疏鐘猶在夕陽邉溪橋緩轡官人馬野飯維稍客子船記得宦遊逢此景披圖不覺思茫然莆田黃守燕文貴吳興人初師河東郝惠往來京師市畫於天門道上待詔髙益見而竒之聞於宋太宗命寫相國寺樹石端拱中敕畫臣面進紈扇上賞其精筆曽畫舶船渡海像七夕夜市圖工麗無比神廟時又有燕文季畫院謂之燕家景終不及文貴此卷蕭寺圖也張無竒出示於白石山房客有謂其南宋者余故拈此題於卷後望日呵凍書陳繼儒題天啓二年十二月李龍眠蓮社圖卷絹本水墨畫髙八寸餘長一丈三尺四寸後有李元中書記一通絹本長三尺四寸髙不及九寸用頽筆懸腕書自始至終無一弱筆秀徑挺拔與停雲刻本大有不同飯字作飰字魚字作鯨字敬字俱諱筆刻本否也字校刻略大止五十一行豈文本另一本耶卷中收藏元印二方陳緝熙家叢書堂文籍印引首泥金藍宫箋李西涯篆龍眠蓮社圖五字龍眠李伯時為余作蓮社十八賢圖追寫當時事按十八賢行狀沙門惠逺初為儒因聽道安講般若經豁然大悟乃與其弟惠持俱棄儒落髮太元中至廬山時沙門惠永先居香谷逺欲駐錫是山一夕山神見夢稽首留師忽於後夜雷電大震平旦地皆坦夷材木委積江州刺史桓伊表奏其異為師建寺是為東林因號其殿為神運時有彭城遺民劉程之豫章雷次宗雁門周續之南陽宗炳張詮張野凡六人皆名重一時棄官捨緣來依逺師復有沙門道昺曇常惠睿曇詵道敬道生曇順凡七人又有梵僧佛䭾跋陀羅佛䭾耶舍二尊者相結為社號廬山十八賢時陳郡謝靈運以才自負少所推與及來社中見逺師心悅誠服乃為開池種白蓮求預淨社逺師以其心亂拒而不納陶潛時棄官居栗里每來社中或時才至便攢眉回去逺師愛之欲留不可得道士陸修靜居簡寂觀亦常來社中與逺相善逺自居東林足不越虎溪一日送陸道士忽行過溪相持而笑又嘗令人沽酒引淵明來故詩人有愛陶長官醉兀兀送陸道士行遲遲沽酒過溪俱破戒彼何人斯師如斯又云陶令醉多招不得謝公心亂去還來者皆其事也此圖初為石路與清流激湍縈帶曲折踰石橋溪回路轉石巖一又繚而上石巖一二巖之間有方石池種白蓮花巖之傍有石梯度山迤邐而去不知所窮當圖窮處橫為長雲蔽覆樹腰巖頂其髙深逺近蓋莫得而見也傍石池有髙崖懸泉下瀦為潭支流貫池下注大溪激石而湍浪者虎溪也巖之外遊行而來者二人一人登嶺出半身者宗炳也一人躡石磴而下者曇順也巖中為經筵會講者六人一人踞牀憑几揮麈而講說者道生也一人持羽扇目注懸猿而意在深聽者雷次宗也一人合掌坐於牀下者道敬也一人相向而坐者曇詵也一人執經卷跪聽於其後童子一舒足搔首有倦聽之意蓮池之上環石臺坐而箋經校義者五人石上列香爐筆研之具一人憑石而坐者劉程之也一人手開經軸倚石而回視者張詮也一人正坐俯而閲經者惠睿也一人回坐拱手傍視而沈思者惠持也一人持如意而指經者惠永也一人捧經笈與童子持如意立其後又童子跪而司火持鋏向爐而吹一人俯爐而方烹捧茶盤而立者一人傍有石置茶器又一巖中有文殊金像環坐其下為佛事者三人一執爐跪而歌唄者曇常也一人坐而擎拳者道昺也一人執經卷而坐者周續之也臨溪偶坐者二人皆梵僧一人袒肩持短錫跋陀羅也一人舉如意據膝而坐者耶舍也童子一卷髮胡面持羽扇立其後一人露頂坦腹仰觀懸泉坐而濯足者張野也童子持巾立其側又蹲而汲者一人石橋之傍峭壁崛起前有僧與道士相捉而笑者逺公送陸道士過虎溪也一人貌怪雄視捉巾瓶而立者捕蛇翁也童子負杖却立而待一人乘籃輿者淵明之回去也淵明有足疾嘗以竹籃為輿其子與門生肩之前者若欲憩而不得後者若甘負而忘倦蓋門人與其子也童子負酒瓢從之一人持貝葉騎而方來者謝靈運也傍一人持曲笠童子負笈前騎而行凡為人三十有八馬一猿一鹿一器用草木不復以數計人物灑落泉石秀潤追千載於筆下萃羣賢於掌中開圖恍然若與之接揮麈而談者如欲懸河吐屑肆辨而未停默坐而聽者如欲屏息杜意審諦而冥冥沈思者如欲鈎深味逺叩𤣥關宅靈府而遊乎恍惚之廷梵唄者如欲轉㗋鼓舌而有雲雷之響與海潮之聲行往來如御風而遐舉坐臨水者如騎魚而將去笑執手者軒渠絶倒達於衣冠蓋其心手相忘筆與神㑹而妙出意表故能奴𨽻顧陸童僕張吳跨千載而獨步非十八人者不足以發伯時之筆非伯時不足以寫十八人之趣豈非泉石膏肓煙霞痼疾其臭味相似故形容之工若同時而共處者也伯時於豫為從兄實山林莫逆之友為此圖凡三十八日而成余得之遊居寢飯其下客來觀者或未知蓮社事因記其後覽者當自得之也圖成於元豐庚申十二月二十五日越明年辛酉正月二十六日龍眠李冲元元中記廬山十八賢白頭居士老龍眠藥囊經卷隨誰寫行杖如在香爐瀑布前誰蓮社風流逺市朝幾人身跡混漁樵陶翁心事能識惟有攢眉似折腰精右龍眠蓮社圖卷兵侍陸公全卿得之全卿素賞鑒以為真跡間以視豫為題二絶嘗疑典午不競幽人竒士多有託意而逃者蓋於陶翁見之而翁於此又有所不屑也因漫及之長沙李東陽賔之識宋劉松年沈李浮瓜圖絹本立軸長三尺五寸濶一尺九寸二栁樹下設椅案石上列冰盤二中纍冰浮瓜果一童子疈瓜其傍兩人對奕一人背立反袖執拂沈想一人左手執扇掩口右手撫樹而觀一童子捧果盤倚欄立案上陳設鼎彝文石精妙絶倫宋馬麟西湖十景册絹本元班恕齊𨽻書標目四大字骨肉停勻有夏承碑遺意明瞿宗吉楷書十景詩亦精謹有法惜內缺兩峰插漢一葉庚午六月江村銷夏漫為補書遂成三十冊付之裝池宋夏禹玉長江萬里圖卷絹本髙七寸許長三丈三尺餘水墨畫欵在起首石上臣夏圭三小字前後有天厯璽印六年立冬日柯九夏禹玉長江萬里圖至元後思觀於復古齊待詔夏圭山水師李唐用墨如傅宋寧宗朝畫院粉今觀長江萬里圖往往潑墨縱筆濃淡醖釀出於自然真竒筆也夫大江發源於岷山而圭畫泉流回互跳珠噴雲可駭可愕至於濫觴之後直下一瀉舟楫縱橫旅店隱見渡口漁舠林邊鴉㸃煙巒雲樹戍樓城郭無不極其精妙所謂李唐之下無出其右者非耶唐宋以來君臣俱游心藝文皆具畫院以延攬名士良工宋之南渡馬夏稱首若禹玉者其可多得哉覽閲既畢為題其後成化三年仲春五日太原王汝玉敬題公物後歸天府夏圭長江萬里橫卷乃分宜嚴相償武臣俸朱太傅得之寶若琛貝近韓敬塘學士購歸其水勢欲濺壁石欲出雲樹欲含霧人物舟楫樓櫓室廬種種悉具氣韻但用水墨而神采燦爛如五色莊嚴可與李唐並驅爭先馬逺諸人皆當北面往時屢閲於朱公緑䕃亭上今復見之因誦舊時王謝堂前燕飛入尋常百姓家唾壺幾缺太原王稚登題宋錢舜舉戲嬰圖卷紙本髙七寸餘長三尺人物學周文矩一美人翠鈿衣緋抱兒坐杌上左手執花一枝兒作攀躍狀一雲環執紈扇侍立柄長齊身傍設緑蕉墨石後繫一詩通身有項氏藏印乂字號殿閣森森氣自清不知人世有蓬瀛日長無事宫中樂閒與諸姬伴戲嬰吳興錢選舜舉綵扇風生月殿秋內家新樣玉搔頭侍兒折得宫花看笑弄嬌雛不自由伯恭小殿南薰扇影涼鳯雛嬌語倚新妝手中折得宜男草雨露深恩到北堂林伯庸金屋春閒午漏遲寧王玉笛罷愁吹嬰兒還自可人意索乳看花嬌更癡匡山李潤日長别院停針線瑜珥瑤環引一雙風靜緑蕉交燕尾新涼分得到紗窗王渙宋趙子固墨蘭卷絹本一尺五寸長五尺餘寫蕙蘭數本此是子固醉餘之筆與規之仿像不侔也若老來無意利祿遇事輒發奮平生忠義亦或如之戊午孟冬再為趙令君作勿為他人取元趙文敏公書望江南淨土詞十二首白雲法師撰松雪道人書文不録至大二年秋七月八日重書一過趙文敏公所書白雲法師淨土詞筆法妍媚結體淳古且紙墨完好精神煥發尤為寶愛按公於古人書無不臨學近見其千文謂時方師沈馥魏定鼎碑以其有鍾法則於他書臨習者多矣故能㑹萃衆美書法大成至謂虞褚而下又謂上下一千年縱橫二萬里無有與並者豈虛語哉豫又嘗見公所書金剛經自題其後云欲延答祥慶俾有得之士解說奧義增衍福德則宜乎淨土詞為公用意書之矣凡一十二首調寄望江南云子九月七日茂苑文嘉萬歷丙趙文敏公蘭竹絹本立軸長二尺五寸濶一尺五寸餘光風泛崇蘭芳氣美無度誰能與桃李開落爭遲暮子昂幽蘭生石間光風泛修竹老樹亦含滋新葉萋以緑大化無偏私君子抱貞獨懷古松雪翁揮灑脫拘束髙情毫素外誰能繼遐躅豫章胡儼元髙尚書臨米元暉畫冊十頁紙本水墨大德乙巳孟秋上吉房山道人髙克恭彥敬畫辨章榮祿公平日樂山水既得髙侯彥敬所臨元暉墨本總為巨袠以便閲玩每幅為圖圖目草各繫小詩字如圖數峰巒林莽煙雲洲渚樓觀舟梁髙下逺邇如示指掌信乎其能鳴於今昔也於戲自聖人以動靜樂夀取喻仁知公卿士夫肆以斯鳴多矣辨章心聖學必當獨得於圖畫之表至正辛巳日端午葵軒文禮愷謹識閲神醫終弗能烏乎泉石膏肓纒綿豫身甚久遍差及聞江南山水甲天下恨未一到厥疾轉劇今貢士孟仁致雲南平章相國公命懇跋家藏房山家寶草題并圖試為一披倣佛歷歷如躬到其處閲其勝槩江之南山與水弗勞足力盡墮吾目中矣披覽既周脫然不覺沈疴之去體也或言陳琳檄愈頭風杜甫詩愈瘧疾而今而後始知前言信不誣矣詩律之深嚴模寫之竒偉鄧翰林文員外自有成說豫何容置喙然謹志觀畫之嵗月以塞諈諉雅意至正新元月屆㽔賔蓂生十有五葉西都小儒李克敏拜手書於楮箬亭筆架山邊濛鴻有聲圖畫無聲雲元暉家法妙通神更可人京兆王辨題妙傳心妙居然老更成煙雲無盡藏泉石有餘墨清雅意形新帙前修益舊名相君常寶此時一快髙情張冲頓首敬書元馬文璧幽居圖紙本髙八寸長三尺餘筆致幽秀項氏家藏圖記文璧兩衲閒尋竹裏棊清風掃石午隂移不知若個疏林外行過溪橋細詠詩曲江居士元髙尚書墨竹卷紙本髙一尺餘長三尺三寸前作風竹一枝後作雨竹一枝題詩二行居左有合同振之張伯雨等鈐印紫陽仙生無心君子寫竹郎中長生不死淨業清風披灑老竿元氣琳琅要並墨君髙節唯許房山侍郎句曲外史張天雨謹題以上三行在隔水綾上文不録小行書計二十八行後跋云墨君堂記僕至元間為郎兵曹秩滿彥敬與僕為代情好至篤是時猶未甚作畫後乃愛米氏山水専意模倣久而自成一家遂能名世傳後蓋其人品髙胸次磊落故其見於筆墨間者亦異於流俗耳至於墨竹樹石又其游戲不經意者因見此二紙使人緬想不能己巳書東坡墨君堂記於其後至治元年六月二日吳興趙孟俯書恰見工欲識髙侯三人才有我難忘物畫到無心昧手都緣意與此君同作鄧文原石雖法米元暉僕嘗與彥敬遊愛其所山水竹文與可而又有出於胸次之妙者今觀此紙緬懷其人不能不興感慨也至治元年九月望日薊丘廉希貢書覽八分書吳郡陵友曽兩賢自是神仙侣冰雪襟懷鐵石腸坡可當時政如此千年風致墨君堂曲江錢惟善大名之下無虛士便似洋州授雪堂甚欲一顰愧鄰女謾將醉墨學吳妝後學班惟志頓首書庚寅上已後二日吳郡姚廣孝敬觀於夀椿堂金輞川昔畫鐵鉤鎖滿幅縱橫鳯毛墮澄心初作錯刀煙梢數葉風蕭蕭房山挺出文蘇後近代誰能出其右綵毫揮成玉兩枝弄晴帶雨清猗猗此君真遇寫神手宛然空谷相逢時吳興灑翰飛霜雪名畫名書稱二絶風流一代屬伊家什襲珍藏宜飽閲竹青城山人王汝玉妙入神二美合成希房山寫真無敵松雪為書世寶萬年光彩照青春髙華亭沈度遺墨未乾人煙梢初長拂雲端露葉垂不可攀去逺獨留清節在人間竹葵丘謝縉能然始造精古人作字用八法而寫亦用八法妙不能此則畫沙之字傳神之竹耳今觀房山之竹松雪之書咸得八法之妙世所艱得矧一卷而具二美尤世之所艱得者氏其寶諸張肯浚儀房山寫山水多宗米元暉而清潤過之其墨竹尤絶倫此作雖不經意葉葉蕭灑自有天然生意蓋其人品之髙故得天趣之妙如此時松雪翁復以墨君堂記書之於後一代之法書名畫猶隋珠趙璧聨映光粲為世之希者今為所藏宜其寶之也永樂辛卯清明前一日錫山王孟端題昔文湖州以書法寫竹元祐諸老若長公涪翁咸謂其用筆甚妙深加賞識迄今僅三百年而其遺蹟已不多見獨幸墨君之名因長公文以傳不朽則後世欲求君於湖州者不待見諸豪素讀公之文亦可以想見其妙矣松雪翁才識超卓特書兹文於房山墨竹後豈非能繼武湖州者其在房山歟不然模寫之功比之武事其文可以敓槊矣日吳郡金問書於鳯城官舍時永樂壬辰正月八也慶己巳四月草又一日吳郡王稚登觀於談氏隆平林館丑九日新都汪道㑹謝升汪一渭吳門戚萬厯己伯堅同觀於金陵鷲峰寺元吳仲圭四友圖卷紙本髙尺許長一丈三尺五寸紙計六接項氏藏印前後五十餘方墨梅一枝至正六年冬至日來見古泉出此卷俾畫梅花一枝以續嵗寒相對之意也梅花老戲墨小草書計三行在梅之左懸崖古松一本研池漠漠墨吐汁蒼髯呼風山鬼泣濤聲破夢鐵骨冷露影漙空翠毛溼徂徠百畝繞雲煙湖山九里甘蕭瑟何當置此明窗前長對詩人弄寒碧古泉講師索畫松遂書此塞請也梅花道人戲墨墨竹一枝野竹野竹風可愛枝葉扶疏有真態生平素守逺荆榛走壁懸崖虛心抱節山之阿清風白月聊婆娑寒梢千尺將如何渭川淇澳風煙多至正五年乙酉嵗冬十月四日梅花道人為古泉老師戲作野竹於橡林舊隱夢復窗下墨蘭一叢舶棹風下東吳舟杯土移入漳泉秋初疑紫莛橫翠鳯恍如緑綬蒙青虬猗猗九畹易消歇奕奕百畝多淹留軒窗相逢與一笑交結三友成風流梅花道人戲墨風篠一枝與可畫竹不見竹東坡作詩忘此詩髙麗老繭冰雪古戲成嵗寒巖壑姿紛紛暮雪落碧篠謖謖好風扶舊枝猙獰頭角易變化細聽夜深雷雨時梅花道人游戲墨池間僅五十年伎止於此古泉老師每以紙索作墨戲勉而為之一日出此卷屬之欲補於後以供清玩遂作以補之古泉呼童汲幽瀾泉瀹鳯髓茶延之於明碧軒焚香對坐終日略無半㸃俗塵涴人聊書此以識嵗月也至正五年冬十月四日梅花道人書梅花道人嘗賣卜於春波里所謂笑俗陋室者倣佛在我家左右也余有小詩以志企慕云先生風格在林丘鶴去雲沈幾百秋欲識君平曽隱處至今虹月射溪樓此四友圖乃作於武水景德教寺幽瀾泉畔而又為吾里項氏所藏以及於余得不謂梅花道人清夢猶時時在我春波耶我家舊藏道人為子佛奴寫竹譜萬玉叢冊草四幀又為行可寫竹石譜長卷又為葛可久作中山圖卷又寫一葉竹又散軸山水十餘幀可謂夥矣近復得此於項氏道人與吾家有緣洵不誣耳李肇亨題吳仲圭仿蘇文忠墨竹圖紙本立軸長三尺餘濶九寸凡二小竿枝葉俱向右左方草書三長行到底東坡先生守湖州日遊何道兩山遇風雨回憩賈耘老溪上澄暉亭命官奴執燭畫風竹一枝於壁間後好事者刻於石置郡庠豫遊霅上因摩挲斷碑不忍捨去常憶此本每臨池輒為摹畫而成仿佛萬一遂為作此枝以識嵗月也梅道人時年七十一至正十年庚寅嵗夏五月十三日竹醉日書也元趙文敏公八札一古色箋髙八寸四分長一尺九寸計草一行家書拜上直夫提舉宣除姨丈眷末趙孟俯謹封孟俯再拜直夫提舉宣除姨丈坐右孟俯為小兒勉强定盛宅之親緣俗務不可動身専凂力師舅一行賫鈔二拾錠去所有禮物一切所須並於鈔內買辦數內金叉一雙重二兩望姨丈親自看視那換打造發去其餘有可於南潯辦者併望用情區處南潯不必辦者已囑師舅往平江辦矣非恃親誼不敢如此切告加意就有竹絲圓食籮一擔白魚干二尾野雞臘四枚寄納輕微皇恐笑留幸甚拙婦附致姨姨安人敬問上下眷輯同此致意不宣孟俯再拜二月草九日又古色箋二幅髙八寸長一尺二寸計十四行都運相公琴軒吾兄閣下因松澗便嘗具記承動履未審得達左右否新嵗計惟台候勝常孟俯恃過愛有白剡中王吉甫與不肖三十年之舊今將走京師而乏裹糧之資求為言晉見兼聞舊嘗趨下風倘辱進而惠顧之幸甚幸甚猶寒惟善護興息前迓寵光不宣正月十七日孟俯頓首再拜又古色箋三幅髙八寸四分長一尺九寸五分計十八行孟俯書致望為催夏教諭處鈔疾發來為祝二哥總管賢聲小童來得書封至李都運記事且可免今年一行甚好邊照磨卷軸已為作記兩日前付阿還將去訖想亦已到彼矣又王與之將賢聲書來欲寫都運碑文緣碑文大故鄙俚決不可寫渠云與孟總管有舊連日將去求改削未見再將來若將來可寫便寫去也半月來痔瘡大發痛楚無聊小童便還草草作答丈母同傳語不一一八日孟俯書致又古色箋髙八寸一分長一尺五寸五分計草行家書頓首再拜萬户相公尊親家忝眷趙孟俯謹封孟俯頓首再拜萬户相公尊親家坐前孟俯近陸總管便曽附尺書此當必達所寄鈔想䝉不阻今有餘鈔草錠附李千户便納上內見鈔六定九兩內紵絲二十匹計價鈔一十三定四十一兩望親家特為變鈔通前所寄共五十定附帶發船為幸但是所得皆惠及也孟俯明後日便還德清適王吉甫自越上來相㑹云因户門事到海上望親家以門牆舊客凡百照管為大幸也寒燠不常唯厚加珍愛不宣十一月十日孟俯頓首再拜又牙色箋二幅髙七寸八分長一尺四寸二分計十四行清真鑒義真人侍者孟俯半嵗卧病不得奉記想不怪也劉漢臣來乃知雅候亦苦瘡癤甚喜平復菩提奴一病幾死至今未甚愈近劉漢臣來與之祈禱服所降藥有效望清真為達此意仍望轉凂漢臣為解呪咀等早得平安不勝幸荷専此奉記老婦不及作書附此致意清溪鑒義會間併望道問信不宣十一月三日孟俯稽首又藍色箋髙八寸四分長一尺九寸計十三行家書拜上親家太夫人尊前眷趙孟俯謹封孟俯拜覆親家太夫人坐前孟俯頃蒙惠書冗擾未得拜答即日伏惟淑履安勝兹承四令郎舍人榮締良姻喜盈吉席輒有紵絲一端錦荔一柈蜜橘百五十栗子十斤􅀈蛄三十片綿羊一牽拜納聊見賀意得辱笑留幸甚令郎來侍冀通下情老婦同此意不宣孟俯拜覆又藍色箋髙八寸五分長一尺五寸計十三行孟俯稽首師聖提㸃法師侍者孟俯近蒙惠書先師老真人遽爾仙遊聞之哀痛傷悼南望涕零而不肖之蹤竊祿於朝欲一慟而無因輒有薄奠折鈔一定致於几筵伏冀香白外蒙遣留之寄舉室感激之至且此奉唁唯節哀順變不宣孟俯稽首上記師聖提㸃法師侍者又月白箋髙九寸長一尺八寸三分計十七行孟俯記事再拜廉訪相公子淵契友閣下頃附便奉記計猶未達正月望日得所惠書知體候勝常深以為慰令弟子山時時相過屢商略先太師碑文孟俯不揆愚鄙輒欲有所述其大意則子山當能言之或髙明以為然便當趣為之也黃庭至今未能臨寫不至見責不淮右無事官府清靜必稍安也因便草草具答時中唯為相業自重不宣草二日孟俯記事再拜廉訪相公子淵契友閣下趙文敏書取法右軍推其意大令即所不屑近見宗米南宫者妄肆譏評嗟嗟文敏與南宫並法右軍政如禪宗南北徒衆紛紜甚至相戕實出一本設南宫共文敏同堂論書不如大庾嶺能明共證乎何學者之惑因家弟道普藏此并南宫柬各八俱極精妙而筆意相通全是右軍趨步特表此意後學嚴澄書元吳仲圭松泉圖紙本立軸裝作橫卷水墨畫長三尺濶九寸餘長松兮亭亭流泉兮泠泠瀨白石兮散晴雪舞天風兮吟秋聲景幽佳兮足靜賞中有人兮眉常青松兮泉兮何所擬研池隂隂兮清徹底挂君髙堂兮素壁間夜半風雲兮忽飛起至元四年夏至日奉為子淵戲作松泉圖梅花道人書吳仲圭一代髙士繞屋植梅隱居讀易知元之將亂也自稱梅花和尚喜畫竹而松尤妙備見孤髙特立之致松泉圖嚮見沈石田臨本今見廬山真面目矣退谷八十一老人記家有小室入冬則居之其中致楊補之所畫竹枝趙子固水仙王元章梅花三卷繼得吳仲圭古松泉石小幅長條倣宣和裝法改而為卷余以八十之老婆娑其間名曰嵗寒五友四賢皆竒特之士余不得見其人數百年後撫其遺墨以為友嗚呼嵗寒之友豈易得哉退道人再記元徐幼文石澗書隱圖卷紙本水墨髙八寸長三尺洪武二十六年四月二日徐賁補圖僕往過采蓮里石澗書隱瞻拜俞先生遺像曽賦五言詩一首有立校書見示陳子牙先生所作記文謹再拜書於後里生孟俯頓首深密躡曲歷幽清秋風日好一往南園廬穿紆愛虛羣木既羅户流泉亦通渠締搆繚芳蘅灌溉成佳蔬著述懷昔人所樂山林居子孫繼先志復築此丘墟升堂拜遺像入室讀其書先生里中賢安敢有稱譽恨靡從杖履承訓理荒疏采菊薦秋水肅敬歷階除德澤諒不泯霑潤有其餘題俞先生讀易處石澗書隱先生注易隱西城激石松風答澗聲式玉式金王度在一寒一暑嵗功成要參未畫須心悟洞釋羣疑貴理明蔀屋見心元是晝寰瀛捩柂可無程義精詎忍辭捫舌樂大何妨枕曲肱雨露每滋庭草緑雲煙不礙晚山橫成林詎捨千章木求友難忘百囀鶯嵗月推遷陳迹在啓蒙長憶酒同傾至正二十四年甲辰夏四月十七日遂昌鄭元祐謹題漸來中吳聞宋石澗俞先生著易說藏於家心甚慕之及永嘉陳君文昭以易講授吳下暇日過陳君所見先生之孫楨復以易受業陳君為弟子因得謁先生之子子玉父於石澗書隱子玉色溫而貌腴粹然古君子也書隱在城西偏蕭散夷曠居城市而有山林之趣然後知先生之傳有在是能世其家者也昔种明逸以易學名而其子孫以名將顯先達謂其有専於易者蓋易無所不備善用易者惟其時而已种氏顯於時故其用行子玉遁於世故其迹隱其致一也夫孝莫大於繼志述事若子玉之賢父子可謂善繼述矣易以消息盈虛為道觀先生之學詘於前安知不信於後者乎後十有五年楨以亡友子平陳君所為記徴豫言噫文昭以易經入官而終致明夷之傷子平以易道自晦而卒遇無妄之過獨子玉當四海無虞利祿不以入於心及天下多事世故不以煩其慮益知賢父子之於易得處困之道矣仰先躅之髙風感故舊之淪謝因識卷末以致其景慕之意云元年秋九月易㑹稽姜漸書而今重有兒最喜采蓮還西山讀人何處堂構舊里尤憐薦藻樹新祠花邉拂石春垂釣竹下焚香晝奕棊總說傳家風致盛梧桐隂滿鳯凰枝番陽董朝宗八分書書處蓋徐幼文筆也幼文在此圖圖石澗書隱讀國初以詩名與髙楊張三君稱四大家不以畫稱而其畫特秀潤古雅今亦不多見此乃因趙文敏鄭明德諸詩而補作者故尤為用意計當時更有陳子平記惜無考之不得名筆為補書也長洲張鳯翼識詩名勝國之季與髙太史諸君齊名所徐幼文以謂髙楊張徐者也徐張皆善畫而徐尤出張右此圖俞石澗讀書處用筆造境清森鬱茂當與王叔明陸天游二三君稱雁行非趙善長諸人所得夢見也石澗先生世善易若漢韋氏之於詩今其遺墟漫不可識猶幸趙承㫖鄭明德之咏歌與徐君之繪事流傳人間庶幾俞先生髙風尚可想見耳太原王稚登元倪雲林清逸圖紙本立軸髙二尺五寸濶一尺二寸吳市隱者傅古民世為金華之義門去鄉居吳三十載針砭療病窮淵源只今年已七十四生子在乳如曽孫養生有道祕神訣烹鍊服食身常存去年暫歸舊鄉縣悲如歸鶴返故村宴坐初平叱羊處起餐霞氣觀晨暾日行百里不困頓今復來吳棲水雲居然孤鳯止榛棘蔚彼衆蕭蒙芷蓀家徒四壁集風雨古木幽筠隈石根固窮好義明取與邀我對月開清尊吳宫越館走麋鹿殘山剩水惟煙雲酒酣長歌踏筵舞荷花落羽何繽紛感今懷古意悽惻髙義非子吾誰論濡毫擘紙寫清逸醉語駭俗抒煩寃何當與子橘中隱坐玩清景窮朝昏七月十日寫此圖并為長歌贈古民先生瓚倪髙士新雁題詩圖十月江南未隕霜青楓欲赤碧梧黃停橈坐對西山晚新雁題詩小著行己酉嵗倪瓚雲林君所愛故號倪雲林雲林嗟已矣對畫勞苦吟雲兮何冉冉林兮何隂隂茅亭鎮虛敞苔徑空幽深石既長緑髮水還鳴瑶琴豈無好事者一尊重登臨不惟今視昔亦猶古視今而我闤闠客雲林有風生欲免山靈笑杖履時逺尋雲林同我采吳蓴回首仙遊隔幾塵畫裏題詩報新雁銀小院暗移春嵗庚申王逢題於雪竹村之故第倪髙士晴陽芳草圖春渚芹蒲秋郊梨棗西風沃野收紅稻檐前炙背媚晴陽天涯轉瞬萋芳草魯望漁村陶朱闕島髙風峻節今如掃黃雞啄黍濁醪香開門迎笑東鄰老曲全叟倪瓚至正甲辰八月草三日書元張子正桃花春鳥圖水墨紙本立軸長三尺二寸寬九寸海上張守中為景初先生畫葉底小紅肥春禽語夕暉養成毛羽好去向上林飛見泰閒窗緑樹夏隂隂看畫焚香寓賞心宛似江南寒食後桃花春雨喚春禽天台林右題幾年不見張公子忽見𤣥都觀裏春却憶雲間同作客杏花吟􅐟喚真真老鐵醉筆畫中題品淺堪憐只愛風流老鐵仙可惜貞魂呼不起鳥啼花落自年年吳郡顧謹中八分書東風掃紅雨春滿桃源洞山禽啼一聲喚醒劉郎夢東吳余季約張公落筆最風流憶向梨花寫鵓鳩十載都門重見畫忽聽鄰笛使人愁雲間顧文昭春光堂上午燻微清簟疏簾映晚暉憶得臨軒寫幽趣野花山鳥總依依崑山杜宗一老仙遺墨健如龍笑破朱脣幾㸃紅留取桃花與幽鳥不教人恨五更風胡生同文新構此圖求題為書其上范公亮使韶光眼底生倣出一場春境畫師筆力挽天成坐界花無顔色鳥無聲老花倫最擅名一自樽前歌鐵仙詩句張公畫二風流板歇春風花鳥總含情年伯誠與春鳥相對共凄不見張公子於今又幾春花然翮海叟凱依栖且暫時上林羅綺樹待汝發髙斂花間鳥枝桃樗散生紅錦繡羽飛來依玉柯禁城春色年露新雨開年好相對其如十里何驚匡山迂生自啓幌窗吹鵲聲初報碧桃春洞口傳有晉人鐵笛一聲清唱為誰新題丁子木人老去風流渾十年不見故園春畫裏詩半古減盡東風花鳥易傷神飛華亭管時敏今見畫生記得桃花破暖紅山禽下語春風而惆悵忽憶家園似夢中紗雲霄青鳥信開遍小桃上日迎春早晴窗啓碧忽傳花禽廬陵朱京枝獨立東風喜報誰翠幌日髙人山飛上碧桃未起分明池館記當時南貝翔羽翰雲路乍飛終東風未放碧桃殘山鵲來息萬里暫時聊借一枝安公祐張子正林亭秋曉圖紙本立軸長二尺五寸濶九寸欵在右方中間楷書張子正學井西道人筆作兩行秋曉四字左角貞節堂印栁道傳右方篆書林亭印空禽鳥樂地僻松竹秀茅屋是誰家柴門掩永山畫山果育老人題見歸鳥秋風滿空庭日落人來逺有飛雲近山少堂永嘉陳允明山色水光相與清鷗鳥不來魚草只在南湖上不起落花風揚讀書聲梢如一道人題𨽻書擬絶小橋橫水口矮屋露林想見山中客書成交山全思誠關心亭外遙岑入望深却憶浪遊江故何處最海上漫教猿鶴守空林汀曽烜蕭蕭仙家應在雲煙溼空林翠欲飄渚花草共深處秖許人行到石橋徑仲孚不逢人斜陽淡秋雲開見山髙木落知風亭下影卞同樵隱笳拍卷紙本一拍一幅水墨作人物雖筆法粗略而曲盡塞外風景及離情悲慘之狀地用淡墨滃成各書其詞於上筆法亦瀟灑可觀類何祕監澄筆每幅各有南山樵隱印識而無名氏可據録之以俟博覽者來心事總堪傷至今千載胡漠漠平沙萬里長去笳曲一拍聲中一斷腸太原王越明謝葵丘溪隱圖紙本立軸水墨長二尺八寸濶二尺一寸一身蕭散寸心閒勢利奔趨總不關白眼看人成一笑水邊林下對青山葵丘自號溪隱有所取焉復寫是圖徴余詩余觀此圖置景空濶無纎麗筆有古淡趣可羡可羡遂題一絶以歸之工拙弗暇計也生時宣德六年秋七月上吉尚素老人識山上雲春雨後樹頭花落午風餘道人兀坐碧溪石下有流泉應讀書沈周金本清雙鈎竹紙本立軸長四尺二寸濶一尺八寸生在湘江溪水邊此心曽與玉爭堅自從學得雙鈎寫世上丹青不直錢太瘦生平生性僻愛篔簹特下湖南泛楚航解組歸來頭未白清風應自滿瀟湘甬上張邦竒沈啓南清修圖紙本髙七寸本色作叢竹坡阜宇舍中一人攤書坐觀一童子攜琴至畫長二尺五寸即劃斷題詩云君子偏驕食肉侯清羸只欲事清修也須待拄紫玉杖如不能勝青鳯裘到處問醫非俗病從前刻苦是詩愁枵然一箇琅玕腹那著渭川千頃秋長洲沈周畫并題亭中竹樹何娟娟憶昔風流清可憐秋雨不勝孤鳯泣愁心夜夜緑雲邊周山顧問蔣徑凌風翠嵇林拂雨寒瞻雲應不寐豈是渭川竿徐伯虬湘水隂隂竹葉開有人中散立莓苔谷風夜發長條舞寂寞山鳴珮玉來臨頓里陸芝山人種竹當清軒攀弄修篁心灑然春搖紅日醉芳醑夜掃銀河橫素絃冷風蕭瑟聽來好翠影嬋娟對可憐平生製得𤣥洲曲借爾吹簫秦女邊汝南黃升丘沈啓南芝田圖紙本作本色山水髙九寸餘長五尺董家報德人栽杏天報君家芝滿田借氣生成本無種散人服食便長年新松拔玉朝擎雨髙蓋敷春暖護煙十畝霞腴不征稅但聞寄藉與神仙長洲沈周野田非秫亦非瓜靈光映日華醉後歌聲商皓作山中道士許君家盈筐自採含朝露山鹿偷銜落澗沙本與齊房同瑞草幽棲不願漢庭誇九柏山人德士心仁布靈田土氣和分畦呈翠羽接畝盛朱柯資食商顔久含華漢殿多齊房曽有作吾欲為君歌不句溪陳鑑無根草草豈無根生瑞芝自天有田種秫獨種造神仙服食餘黃帝嘗不到不然鼎湖弓肯遣羣臣抱知君室有丹瓊芝服不老我歸尋耦耕寸田共昏曉芝華亭錢福术田醫家能積纍和氣在生忽見華秀何妨種全曲薦朱絃調香霏碧澗泉活人隂德盛更覩肉芝仙七十二翁和方州作種德心田那有期西溪俄見産瓊芝能醫人世皆難老不比商山只療飢和氣自能深護養神功元不費耘耔山中道士真堪與還乞人間長史書嘉興朱綬沈啓南水墨花卉卷紙本髙八寸餘長二丈一尺凡六幅花八種後仿山谷書跋十五行秋軒前雜植凡數種花開時輒弄筆象之于紙次第得十翻蓋散人弄飽飯之活計也觀者勿以工拙為誚八十一翁沈周識宋人寫生有氣骨而無風姿元人寫生饒風姿而乏氣骨此皆所謂偏長能兼之者惟沈啓南先生觀此卷數花雖率意㸃染而蒼然之質翩然之容楮墨之間鬱有生色非筆端具造化者不能八十老翁神王若此覩其遺跡猶有天際真人想也太原王稚登題寫生之法大與繪畫異妙在用筆之遒徑用墨之濃淡得化工之巧具生意之全不計纎拙形似也宋自黃崔而下鮮有擅長者至我明得沈石田老蒼而秀潤備筆法與墨法令人不能窺其窔􅀢真獨步藝苑試閲其一二佳本真能使眼明不可易視為識卷末周天球沈啓南倣大癡道人靈隱山圖卷紙本湖上風光說靈隱風光獨在冷泉間酒隨遊客無虛日雲伴詩僧住好山松閣夜談燈火寂竹牀春卧鳥聲閒佛前不作逃禪計丘壑宜人久未還劉公僉憲史君明古偕余及繼南弟為湖山之游至飛來峰不忍去者纍日夜宿詳上人所索紙墨圖此以為兹山寫真因系以詩云成化辛卯春仲望日長洲沈周沈啓南湖中落雁小景紙本長三尺九寸濶一尺一寸五分下作岸栁歸舟水面兩峰出沒落雁一行數筆間具無窮境界矣縱目極遐曠水嬉湖中央青山載白波上下相低昂俯首愛雲霞零亂隨蘭槳悠悠遡空明忽忽超景光宛宛漢皋女落雁懸微芒可望不可即相思如水長近自東崑還湖中雜言録似味雪親家較其然不然也沈周文待詔南宫水墨卷紙本畫長二丈二尺髙九寸四接俱有徴明印鈐縫字長三尺餘前有徴明印停雲館方印後有徴明徴仲長印一雨垂垂春欲徂弱雲狼藉草紛敷盆池水滿魚爭躍竹徑泥深鳥亂呼暝色排檐失昏旦涼吹入枕夢江湖山齊十日經過斷搨得南宫水墨圖徴明大行書落筆揮灑亦如風雨之驟至所謂興與景㑹者耶直懶逸張孝思識忽見飛濤杳靄間却似曉煙春廬茗碗校讎閒雨後湖干日對米家山潑乙丑十月直題內廷觀淡人先生所藏文衡山墨山水圖并龍眠學圃張英野意閒紅欄緑浪五湖間誰知水墨蕭供奉歸來森物畫出荆關著色山萬髙都陳廷敬次韻業今待詔當年迥擅名煙雲壑墨濤生多君勳如畫霖雨蒼茫滿太清題乙丑冬日雲間王鴻緒筆墨翛然意致閒煙雲縹眇有無間流連卷尾思藍本逺勝南宫雨後山靜海勵杜訥題文待詔袁安卧雪圖紙本立軸長三尺四寸濶一尺三寸項子京家藏趙松雪為袁安卧雪圖老屋疏林意象蕭然自謂頗盡其能事而龔子敬題其後乃以不畫芭蕉為缺事豫為袁君與之臨此遂於牆角著敗蕉似有生意又益以崇山峻嶺蒼松茂林庶以見其孤髙拔俗之氣故不厭於贅也壬辰六月草日徴明識文待詔西苑詩卷藏經紙髙九寸長一丈一尺烏絲行計詩十首各有小序文不録行草書停雲刻中有此暇日偶一校之頗有不同石搨本云余乙酉嵗作此詩及今壬子二十有八年矣夏夜被酒不寐重録一過四月九日也卷中則云嘉靖戊申七月五日書於是去遊之嵗二十有四年而余年七十有九矣因知此卷在刻本之前其所書蓋不止於斯也文待詔和陶詩卷藏經紙髙九寸計八幅文不録狂草書筆墨神妙丙申長至後二日為體之書徴明唐解元墨花卷紙本髙八寸長丈餘計花卉六種各繫以詩牡丹沈香亭下春光好白玉闌干圍鼠姑賞罷三郎已沈醉太真嬌顫不勝扶萱花墨汁淋漓映袖寒濫圖赤棘傍闌干憑君懸向閒亭館解却眉尖仔細看百合洛花開日端陽近海燕來時華屋深勝賞莫教孤負却春宵自古值千金蜀葵五月庭前挺此枝向陽心事有誰知暖風昨夜輕吹破朵朵鮮霞始出奇枇杷輕暖輕寒初夏時枇杷將熟我堪思蜜漿止渴添詩意一樹金丸晚翠枝桃子蓬萊弱水三千里王母蟠桃一萬年鳯鳥自歌鸞自舞直教銜到夀杯前吳趨唐寅子畏寫并題姚雲東松風管絃圖紙本立軸白雲漫山蒙絮然碧水出澗流涓涓道心空虛無物在滿耳松風來管絃雲東逸史仇實父仙山樓閣圖紙本立軸長二尺二寸濶一尺二寸淡青緑仿小李將軍界劃精工峰巒層疊蒼松數株離立成林溪畔梅花如雪亭臺之內舞袖揚芬吹檀流韻對之恍然身躋於三山十洲矣真近代之二李也欵著左方上有陸五湖細楷書祝京兆仙山賦一篇精妙異常仇英實父製仙山賦兮河間關構圖繪兮非人間將神遊之恍馳藻思惚兮惜倒景之曽攀山莫妙於九疊屏風又九九而無窮水莫妙於三十六曲又曲曲而愈通示白雲之懸路兮叩靈關而莫從但見山産不凋之木地茂長青之草桃李榮萬年之春羽毛翔不死之鳥巖幽幽兮葉飛洞聒聒兮泉鳴非金膏之餘液則瓊樹之弱英雙朱楣以為門忽青林之隱隱覽黃金之髙榜因碧霞以發軔磴乍升而乍降徑或棧浮而或沈非鸞驂而鶴跨抑步虛而躡清白玉為兮往來自易青雲為襪兮出入自輕秀木疏而復密石壁起而復合樹交柯結蒼鼯飛越積雪為膏碧火明滅鑒寒潭兮心空拂水光兮情悅靈猿䕃於寒條珍鳥宿於貝葉白鹿引偓佺之車玉兔開仙城之闕或蹈翡翠之巢或載虹霓之轍雲悠悠兮路長岸縈縈兮屨絶或懸飛空之梁或設平步之杠神惚恍於水簾載晏息於玉房桂叢蒙密蘭薄芬芳金堤曲逆竹林清凉煙廊霧閣雲帳翠牀冒碧瓦於山椒牽朱欄於水傍飛泉出於檐末紅葩煥於幽窗於是安期羡門之徒乘紫鸞駕白鶴拾瑤草採翠華拂煙光而容與步明月於金沙既邅回於漵浦遂釋近而即逺望白雲之層觀兮凌沓嶂兮宛轉峰嵯峨兮疊青蓮樹菁蔥兮生紫煙三神山兮起空濛十二樓兮懸朱簾日未出兮珊瑚明涉冬春兮花木妍䇿神駟兮躡光景放靈槳兮花間船入閬苑即仙居憩靈宮臨瑤池於是素女開牖宓妃上樓鈞天奏於别館神籟發乎中洲載雲旗以往來乘清風以遨遊水閣則金屧蹣跚雲闥則綺疏綢繆蘭堂兮貝室蓀壁兮蕙􅀈金鋪陸離璇廊洞修屏比玉几之光球鳴甲帳之勾出入歡護仙侣道儔鳯皇銜燈於元夜蟾蜍納月於中秋冬居則光風轉凄夏處則瀑布為幕餐六氣兮飲沆瀣服元醴兮佩芍藥鼓金簧吁玉籥檀吹流霞光落纎阿舉兮椒芬楊玉汗生兮異香薄瓊漿徹兮回霓裳華燈陳兮歸洞房窺玉喬之靈竈啓赤松之丹牀愈入愈祕彌嗅彌芳始知元化之道無為之方冥冥􅓦􅓦其樂未央回視凡境杳而渺茫於戲非得仙風道骨奚為乎克躋其鄉嘉靖二十七年冬十月草又一日陸師道書仇實父項墨林小像絹本大斗方重青緑作桃花春景巖中兩人對奕墨林正面趺坐一童子掣古銅瓶汲溪中仰觀飛雀意態生動欵一行在右方小楷書為墨林小像寫玉洞桃花萬樹春仇英製文休承青緑米山袖卷髙五寸長丈餘繭紙凡五幅前有文嘉之印文氏休承文水道人後有悟言室印文嘉之印圖是石田臨本海嶽米氏雲山余所見者大姚村菴圖先待詔所藏後歸陳道復道復又歸石田陳氏又有大姚村妹家所作絹幅瀟湘圖是孫鳴岐物後在王林屋處苕溪春曉乃王酉室尊翁欵鶴所藏皆真蹟也最後見杭人一卷則青緑尤為精絶其餘所見雖多皆不能出此數本上矣己巳秋豫來苕溪所居正與道場山對所謂西塞山碧浪湖水晶宫無日不接況冷員散職居此真足以蕩滌胸中塵土暇時偶得繭紙漫用米法寫此遣興不覺滿卷嘉隆慶五年嵗在辛未夏四月草有四日茂苑文在碧湖齊中書此休承文邑博在烏城官舍作中寄歸君元爵者秀潤清逸宛然米氏筆法乃知江山之助不獨辭賦然也太壬申首夏黃姬水識家以為逼真海嶽先曽祖史公雲林一派鑒賞先叔祖學博公又妙得家傳此卷寫於烏程官舍溪山蒼翠日在簾几間閒官吏隱情境淡適筆端秀潤遂翛然若仙洵可玩也戊辰冬日於昭逺世兄自金沙來出以相示敬題於後去叔祖㸃筆時五十八年矣紙墨如新尤可珍重跋姪孫震孟謹豫又見一卷亦作雲山稍工緻紙本髙六寸餘長七尺餘前有蕭閒齊及休承鈐印延陵吳氏收藏書畫印引首王百谷𨽻書雲白山青四字其後題欵年月與此卷相同止於繭字易一此字而已豈同日作此二卷而題字亦不稍改者然其筆墨亦頗同類題字無一筆匠氣且有韓太史四維題云雲山圖雖出於米海嶽實宗北苑而衣鉢又自唐人自元諸名家趨於髙簡一路風氣略薄雖有方方壺髙房山其人終不能飲人以醇耳文水此卷猶見大雅未衰所云惟其有之是以似之不必論淺深也太史精於鑒者似無誤姑録之俟夫具眼者文休承梅竹小幅紙本立軸梅竹雙清文嘉休承寫鄭䖍今已老三絶興將闌梅竹蕭森意悠然共嵗寒周天球文休承溪山幽遠卷髙五寸許長二丈紙五接每接鈐休承印前有文嘉印文休承印歸來堂印本身小行書題欵溪山游目周天球漫題金陵紹岡王君雅喜豫拙筆每得小幅輒加愛玩萬厯戊寅以佳紙見寄請為長卷蓋欲盡豫之能事而不知豫之㸃染聊自適興耳豈暇計工拙哉況今老髦不惟精力不逮而興致亦非復往時勉為塗抹以復來意恐不足以入紹岡之精鑒也是嵗立秋後四日茂苑文嘉書於䕃白堂中紹岡好文文水畫致卷帙夥矣復觀此長卷爛然溪山悠逺之趣信是倪雲林方方壺儔匹觀者若求其筆意而其筆墨之迹則略之雖謂之不讓元之諸家亦可作此之年已逼釣璜之日神采目力與其先公太史無兩吁可勝羡哉觀畢記球周天把玩此卷不但見文水公筆意髙古而胸中丘壑亦可得矣前輩風流迥不可及文徴其寶之哉顧大典事尚能獨畫事一種以能品為下文氏父人間諸子之優劣正在是耳此卷能與不能分出大非平時伎倆可貴也鄒之麟陳白陽水墨蔬果卷紙本髙七寸餘長一丈四尺題云余舊嘗見石田翁有此卷今落在搖城金氏目中不接已數載矣戊戌春日偶坐閒窗漫有此思遂援筆效顰非敢與相角也用以見我企慕之私耳集道復志復作蔬香圖知其恬淡淡人學士名其曰蔬香味腴意有在也今適得陳白陽此卷畫果蔬十數事蕭疏簡逺無筆墨痕而生意具足兩美合矣為系以詩藿憶江城風味原同筍蕨清一卷蔬香詩頻年葵入畫負霜含露若為情春昔曽三月住湖干苦被山僧勸晚餐豆英筍香漸老紫菱碧藕又登盤春好營十畝護柴荆我亦從君抱瓮行同摘晚蔬雨後鮮香端勝五侯鯖龍眠學圃弟張英正是江天櫻筍初溪村風露摘園蔬春花開落看秋實老圃吾真愧不如肉食朱門客滿堂何人解愛菜根香季鷹大有江東思也為蓴絲味許長樊川陳廷敬陸包山玉簪花紙本立軸長三尺六寸濶一尺三寸八分湛湛娟娟白露漙折來纎手映俱寒斜依阿鬢千絲髻好傍芙蓉七葉冠擁坐金叉愁自失辟塵犀導懶同看佳人别有貞心托倚遍東風十二闌王世貞問花玉是何年種追琢簮頭總是誰曽共瑶姬秋海宴斜鑽寶髻緑雲垂本來皓魄齊叉燕秖可香奩照月規云是洗頭盆卸却乘風飛上碧霞枝勝余嘗與少虛張君賡賦玉簮花張君之作乃大余余推以為絶唱及見鳯洲王公題余畫扇則又大勝張作陸子歎曰凡物轉髙轉細理則固然不知繼王公而作者義當何如也暇日與鷗江沈君論學無止法因及題玉簮事沈君以為然命書以識余曰珠玉前圖之可也沈君曰春鳯喈喈秋蟲唧唧各性情耳君何讓焉遂並書以遺之觀者當一大捧腹也隆慶己巳新夏陸治識陸包山水墨水仙文石圖紙本長二尺一寸濶不及一尺紙色瑩潔筆法秀徑楷書題於左云靈雨濛濛幼態輕驚魂想像逝懷傾願將玉佩要相逐脫骨逍遙水上行包山陸治王子新蘭竹紙本長二尺七寸濶一尺一寸水墨竹石設色蘭花題云溪堂抱暍經過少閒寫幽蘭三兩叢天性本來便雅素未欣穠李與夭紅逢年文五峰臨天池圖紙本立軸髙二尺六寸濶九寸餘左角書天池石壁四字嘉靖戊午仲夏既望五峰文伯仁寫冰香室文德承印筆法渾厚樹石古徑不減真蹟即太史猶當少避世人恆見其板實一路遂忽之耳徐文長水墨寫生卷紙本髙九寸餘長一丈五尺每種各題其上牡丹俗牡丹難以墨用墨難以淺淡淡著胭脂聊以媚眼竹枝上日長苦難度墨君借以遣細葉莫生風風波世滿蘭花湘緑水惟應漾白蘋胭脂只念㸃朱唇自從畫得蘭後更不閒題與俗人荷花經若耶溪上好風光無人折取獻吳王西施一病三月數問荷花幾許長蒲萄無昨嵗中秋月倍圓海南蚌母不成眠明珠一夜人管逬向誰家紙上懸杏花竹石無太湖五尺石頭新勾勒寒梢已逼真杏花雖是情物遮却腰間怕見人菊花閒身世渾如拍海舟關門纍月不梳頭東鄰蝴蝶來往看寫黃花過一秋蟹魚鉗蘆何處去輸與海中神雙眸休射浪隔岸公子刳牛罷江寒風雨秋有漁舟丑夏六月隨錢塘學士同直康熙乙大內南書房積雨新晴潑禁庭初暑先生攜徐文長畫卷相示草樹蟲魚墨瀟灑逌爾而笑如在江湖因題此後方并識嵗月崑山徐乾學徐文長風鳶圖卷紙本驕養驕生驕性情紅衫雪鷂弄清明春郊盡買餳糖送多少騎牛看鴨人少師到老光頂門也著紅袍畫喜神生來便與抉龍手不是尋常放鷂人嘯道人作墨鴟夷已座客謂嘯道人爾能作謔語等滑稽自嘲曰墨鴟夷似矣乃不能作莊語有以窺嘯道人之終不值也故復謔以後作客笑曰爾力終一長老耳嘯道人不能答郭恕先作風鳶圖償富人子酒肉之餉而願謝絶意其圖必立毁世遂無傳而王元章有放鷂詩八首余嘗和之和詩可也郭圖豈余所可擬耶雖然來丹報黑卵必欲手握霄練不則不快矣栁條搓線絮搓綿搓夠千尋放紙鳶消得春風多少力帶將兒輩上青天春風語燕潑堤翻晚笛歸牛穩背眠此際不偷慈母線明朝孤負放鳶天鳶於兒女何相關苦要風髙九萬摶無限片帆當此際錢唐江上雪如山我亦曽經放鷂嬉今來不道老如斯那能更駐游春馬閒看兒童線斷時縛竹糊腔作鳥飛崩風墜雨爛成泥明朝又是清明節鬭買餳糖栁市西江北江南紙鷂齊線長絲短迥髙低春風自古無憑據一任騎牛弄笛兒剪楮披篁重幾分橫天直去攪風雲風雲自攪猶言可誤殺低頭看鴨人誤殺低頭看鴨人摩挲不信不鳶真攔街奪得神仙罐剛是茅山活水銀和篇一塊去飄綿不及三朝揚木鳶更有大風君紙鳶信否能翻磨扇上髙天飛空攪蝶眠試取紙鳶當我經南海颶風年屋瓦此際看他背去負青天吟鳶巧弄摶昨夜風餘收天台饒舌怪豐干何事墮篾喚為拾得為寒山誰能必得斯天半游絲花鳶長線短去何之萬丈正午我搓紙撚釘書時等是上龍泥東風自古西此物等為芻狗物此飛吹去不為吹儂合向西求低不得低渡海誰嫌儂風物欲上不可上風緊自渡可憐帶殺弄餳兒孤飛野鶴雲畫取此圖酬剡藤湘篾一片雪倣佛酒債未為輕薄有錢人紅雲過玉真何處鄰姑不馮添鴿籥與膏焚整隊停織細聽燈火理箏銀線於腰大風拔鷂向海兒海人云兒將啖餳寄竟墮死收骨餳尚膏掌中鵬飛處人錢叔寶水墨秋山髙隱小幅紙本子功甫題其上云之罘先生與先君子交最久最昵此畫在蕩口舟中所作忘記嵗月欵識今先生仲君養誠兄攜以示余乞識其真余小子敢於佛頭上著糞耶此畫細密初非潦草思致深逺步武衡翁全非本色苐今耳學輩動以無欵為歉百方覓倣佛贋書者補其名真本有之大為之㸃汙政不知唐宋名筆何嘗有欵南宋馬逺父子於竹根石隙細書小字俾快覩者一時不可得至於松雪大癡始濫觴云耳即先君子此畫摸索可知即無欵將屬之何人哉養誠兄幸善藏之勿輕示耳學俗子可也萬厯庚申仲秋草二日允治題吳門顧元方氏家藏文待詔山居圖絹本立軸長四尺三寸濶一尺九寸欵右角小行書二行嘉靖乙巳夏五月徴明臨黃鶴山樵山居圖文待詔水墨古木竒石圖紙本徑尺許嘉靖丁巳三月十三日夜坐發孫出此紙請余作古木竒石老眼眵昏不能工也右作小楷二行無欵印不必歎無媒一朝匠石來古木離奇山徑隈先容相顧便作明堂梁棟材香王穀祥差恍然一夕成老眼篝燈㸃筆時古槎葉影差龍去每見孫枝有所思起周天球禦空庭昨日動古木倚石狀何倨槎牙伏不可春雷直恐成龍夜飛去生陳鏐文翁握管永言貽空山虬枝孰云樗散莊寓言謀取材圭瓚孱袁褧奉題煙黯淡間夢憶燈前依偶然濡墨寫顔古木蒼戀處賞心無復到荆關虬許初共蟠一夜春雷驚神龍飛入兔毫端幻出枝石閉蟄玉蘭堂下駕風翰千陸安道崖何年倘化蛟白日晴巖長曀霾古藤尺掛蒼龍去偃蹇深山空霧埋燈黃姬水煙空山古木蛟銀海夜中流紫電管城下拂松龍影風雨孫枝勢欲鶱測彭年還乘雲借爾虬龍古木與石伴森蔚不可一旦翼瞻陸師道珉似太朴冲襟古木同珍重羹牆在具耆德堅貽燕願敦貞素劭家風袁尊尼文待詔梨花白燕紙本立軸長一尺八寸五分濶七寸五分水墨鈎染衡翁自題行書餘各細楷髙下翩翻雪羽齊江南春盡絮飛時夢回王謝烏衣盡舞罷昭陽縞袖垂簾外風輕銀翦翦叉頭春盡玉差差樓頭霜月傷心處只許張家盼盼知徴明驚見𤣥禽故態非雪翎玉骨世應稀越裳雉尾姬周化瀚海烏頭漢使歸誤入梨花惟聽語輕沾栁絮似添衣朱簾不隔凉州路任爾差池上下飛文彭瑤星散彩射昭陽雪羽差池繞柏梁臺上舞酣垂縞袂掌中仙去拂霓裳梨雲漠漠迷香夢花霧冥冥破曉妝似妒宫中白紈扇故穿珠箔弄輝光陸師道雙燕翩然下竹扉曉簷霜羽弄輝輝誰言白鳥非𤣥鳥肯信烏衣是雪衣小院風輕迷蝶去滄江日落亂鷗歸也知自惜竒毛羽不向朱門汗漫飛文嘉社後差池素影非荆門春盡雪初稀王孫陵闕當年見天女祠庭昨夜歸綵勝風翻銀作縷湘簾雲礙玉為衣尋常不逐銜泥伴遙憶攜書海上飛彭年瑶光一㸃散江潭乙鳥歸來雪羽毶騎雲中飛欲沒霓裳月下舞初酣定棲珠箔輝相射迷入楊花路未諳符瑞豈因靈媛降太平天子正宜男周天球周東村長江萬里圖卷絹本髙一尺三寸長六丈一尺餘首作李成寒林漸見城郭另起一山煙雲縹眇下集萬廛署曰常熟縣山水全法大癡過此則崇山峻嶺廣陌通途不復作吳鄉景色矣山盡見閘閘下水勢湍急環抱一城民居稠密城外是為大江金焦對峙山水又為一變在思訓元章之間古木千章車馬如織城池雄麗樓觀巍峩石城而北江帆集處署曰蕪湖舟楫往來有瞬息千里之勢陡起一峰用麻皮皴法蒸雲上湧冉冉騰空雲中更逗一峰絶似房山筆法兩峰之下署九江城霜林煙靄取法元暉而淡岫平坡孤城逺樹則晉卿也山盡水分飛閣臨江回城抱山者嶽陽也江心二洲漁磯板屋筆法簡雅稍過又作重青緑竒峰峭立嵐氣欲浮一閣虛敞在寧峰之下層巖之上逺黛重重凍雲漠漠漸為雪景右丞河陽兼擅其美譙樓屋宇泊艘行舫奔車走馬水陸接踵荆襄偉觀殆如是矣後署大明嘉靖乙未菊月望日東村周臣寫成周東村水墨扣角圖紙本立軸長三尺六寸濶二尺餘人髙七寸行筆飛躍如草書逺勝於張夢晉宜乎唐仇之師則也欵在左邉石上東村周臣仇實父停琴聽阮圖絹本立軸長三尺六寸濶一尺八寸青緑山作園亭景欵居右仇英實父堇製長夏齊居景物清蕭然庭樹雨初晴幽人㑹得無言意不在琴聲在阮聲茂苑文嘉髙齊清夏不垂隂區外氛埃窅不侵古調自於琴阮得相逢那更覓知音吳郡周天球王雅宜草書七發藏經紙十一幅髙七寸許俱用辛夷館印鈐記烏絲行文不録丁亥夏五與昆仲同寓石湖精舍山窗燕坐為寫此卷雅宜子王寵識王雅宜書半巖潘君七袠序并辭紙本楷書字徑寸烏絲行筆法遒逸為生平所見中第一文不録嘉靖壬辰七月既望吳郡雅宜山人王寵書後附一札草書云病中數承珍貺感感令祖今嵗登古稀僕以羸困相仍尚未詣賀終當與衡丈一扣階下耳先為文致祝自入山來覺體中日佳唯嗽未除不悉寵頓首修伯老弟翰學雅宜夀潘半巖之文書既妍近辭尤古雅去之四十餘年展玩數四如與相對今人豈易得哉萬厯丙子康伯自金陵得之持來相示因題其後苑文嘉茂王履吉先生書如春雲出岫夭矯變化視世間肥筆溷墨真牧豬奴杖箠畫沙耳此篇尤遒雅秀潤與尋常率略之作相去什九潘郎何人賴之不朽哉康伯當首肯余言也王稚登陸包山榴花白雉圖絹本巨幅楷書欵在右香滿花林日正髙錦叢零亂掩霞綃修翎飛集瑶階上長夏渾疑雪未消包山陸治江村銷夏録卷三
