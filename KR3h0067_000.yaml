body:
  text: 江村銷夏録藝術類一書畫之屬提要臣等謹案江村銷夏録三卷國朝髙士竒撰士竒有春秋地名考略已著録是編乃其於罷歸平湖之日以所見法書名畫考其源流記其絹素長短廣狹後人題跋圖記一一志載彚為一書體例頗與鐵網珊瑚清河書畫舫相似惟間加評定之語又以己所作題跋一概附入稍有不同然所録皆以親見為定則視二家為詳審矣録中書畫卞永譽式古堂彚考已並載無遺蓋即從士竒此本録入其鑑賞之精為收藏家所取重亦槩可見也所記自晉王羲之及明人文沈諸家皆具惟董其昌舊迹悉不登載其凡例云董文敏書畫另為一卷此本無之殆當時未及刋行歟乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀江村銷夏録原序雲霞之變幻嵐之光水之色四時之繁花好鳥有之不適於用造物者亦不以是供世用而無之則天地與四時若受其黮暗顧是數者俗之人莫之好也惟夫曠達之士之有以樂乎此者則私之以為耳目之娛方數者之接於吾也取焉而不窮玩焉而不厭而吾未嘗有也及其歘然而斂飄然而逝而吾未嘗無是謂以無有為有以無有為有則數者皆足以悅吾而不為吾纍書畫之於人亦然而固者或執之以為有則陋已彼烏知夫天下之物凡聚者之必散耶又烏知夫聚者未始非失而散者未始非得耶又烏知聚者之未常得而散者之未常失耶詹事江村先生曠達者也先生以殊才遭逢聖天子不世之遇槖筆入儤禁庭備顧問十有餘年一旦乞身而退優遊北墅潄清泉枕白石迹與樵夫田叟狎而欣然樂之暇日取所見法書名畫考其源流詮次其甲乙如干卷題曰江村銷夏録而其自序以謂世人竭資力以事收畜與決性命以叨富貴縱嗜欲以戕生者何異覽此者當作雲煙過眼觀嗟乎先生之言蓋幾於道矣其視功名富貴古今智勇之所爭史册之所傳鍾鼎旗常之所烜耀亦苐如雲霞嵐光水色四時花鳥之忽有忽無於天壤之間而無所蒂芥而况書畫之區區者與書來屬豫序豫不辭而序之蓋深有慕乎先生之為人也商丘宋犖撰長夏掩關澄懷默坐取古人書畫時一展觀恬然終日間有挾卷軸就余辨真贋者偶遇佳迹必詳記其位置行墨長短濶隘題跋圖章藉以自適然寧慎無濫三年餘僅得三卷名曰江村銷夏録歐陽公所云晚知書畫真有益也曩在大內伏見晉唐宋神品不啻天球𢎞璧惜未記其尺寸録其跋尾而海內諸家之所收藏則又不能一一目覩今姑略之其所録者皆余親經品第足資鑑賞者也近代鐵網珊瑚清河書畫舫二編亦載世間名筆而多未精詳恐尚有傳聞之病世人嗜好法書名畫至竭資力以事收蓄與決性命以叨富貴縱嗜欲以戕生者何異覽此者當作煙雲過眼觀康熙癸酉夏六月江村髙士竒識自詹事之書出稍損益之不可雖有大駔巨狡伎將安施哉詹事曩在內廷久御府圖書資以鑒賞者歷歷猶能記憶而不著於録或疑不言溫樹之義然宋之米友仁元之柯敬仲皆嘗奉詔旨題書畫每言之不敢詳此詹事第於退居之暇先以江村所見録之書成於康熙三十有二年六月故以銷夏名編豫以是年九月作序印行之頃實藉以為負暄之助焉秀水朱彞尊序凡例一海內名迹收藏家甚夥未寓目者不敢妄載凡經評閲隨見隨録編次不以時代亦未敢輕為甲乙一晉唐以來書畫所存名迹無幾其有鐵網珊瑚清河書畫舫諸書所已載者偶以得見仍為登録非與之重復也一古來書畫名家前人俱已識其爵里兹録不贅一前人所書古文辭已見刻本者槩不録惟記其欵識跋語而已其中與世本異同者則詳録以備考訂一是録以標目尺度評語為主本文欵識為第二故下一字題跋又下一字至於圖記不能摹入但用楷字加圈以别之其間文字損蝕難辨者亦著方圈不敢謬為增益一録中間有一二為向日所藏同人題語後附小詩或為人作跋者今仍存之一明代名家不啻數十而文沈唐仇諸君為尤著然贋本實多後人難辨今遇真迹必為存録一董文敏公書畫為近代第一所見真迹甚多另為一卷
