body:
  text: 江村銷夏録卷二詹事府詹事髙士竒撰唐摹右軍遊目帖冷金箋髙八寸五分長一尺七寸共十一行有貞觀小璽髙廟寓意小璽淳化小璽紹興半璽鍾紹京印河東薛氏印乃十七帖中第七條也省足下别疏具彼土山川諸竒揚雄蜀都左太冲三都殊為不備悉彼故為多竒益令其遊目意足也可得果當告卿求近少人足耳至時示意遲此期真以日為嵗想足下鎮彼土未有動理耳要欲及卿在彼登汶嶺峨眉而旋實不朽之盛事但言此心以馳於彼矣魏泰嘗觀數合肥馬玘德之嘗覽羞澀類鈎摹而余在京師見右軍墨蹟皆窘束成者決知非真也今觀此帖寫森嚴於縱逸蓄圓徑於跳動其起止屈折如天造神運變化倐忽莫可端倪令人驚嘆自以世之臨學者雖積筆成山吾知其不能到非右軍誰足以語此哉或以紙墨未故為疑祕閣有唐初誥文紙色如新則此帖尚完不足怪也浦江鄭君仲辨最博雅善書亦謂為右軍真蹟無疑相與熟玩久之因識其後齊題遜志先伯庶子公得遊目帖出示遜志齊公相與鑒定題跋於後至永樂改元始刪去之今年偶過姻家見遜志齊稿假歸觀之跋語具存追計刪去時已歷二十五春秋展玩久之慨然興感重書附於帖後所謂仲辨者即先伯庶子公字也義門鄭柏謹記後有徐守和題贊四十餘行不録唐栁諫議行書晉人修褉詩卷緑絹本髙八寸長一丈六寸全文已刻戲鴻堂帖中宋徽宗金書標題前後黃素上有宣和政和諸璽御書瓢印紹興小璽柯九思喬簣成墨印邢天寵借覽卯嵗季夏月十日楊希甫祥符八年乙嘉祐四年嵗次己亥夏六月癸亥朔初五日丁卯㬠過時在蔡州淮安門裏街北監酒使臣廨署內寄寓虢郡日益習之謹志巳朔初五日辛酉㬠過嘉祐五年庚子嵗八月丁在汝南月祕校宗盛宅寄寓待陳州項城令姚闢來年三闕治平元年甲辰嵗夏六月乙未朔十二日丙午㬠過在陳州項城縣吉義寺天王院內寄寓待慶糾柯廓來年五月闕皆莆陽蔡襄題法未墜筆力遒晉人宗尚𤣥逺言曠淡唐室書逸咸可觀焉陽李處益宣和甲辰季秋六日平輿邑丞雒緱嶺孫大年三槐王易政和四年七月草八日同觀魏正始中務談𤣥勝及晉渡江尤宗理闕故郭景純始合道家之言而韻之孫興公許𤣥度輩轉相祖尚又加以三世之辭而詩騷之體盡矣今山隂修禊諸賢詩體正爾然皆寄尚蕭逺軼跡塵外使人懷想殊深頃見晉人一帖云三日臨水詩文既佳興趣髙覽之增諸懷年少作各有心正謂此詩也是時預集者四十有一人今詩存者草六人而已此􅗡唐諫議大夫栁公權書故自不凡當為希世珍藏也十一月戊寅承議郎行校書省校書郎政和元年臣黃伯思拜觀月四日宋適題時明昌二年七嵗壬戌夏四月六日淡游老人王曼慶題於潛玉堂永和一敘筆神絶遺刻居然走千古興公文字擲地聲安石詩為碎金譜羣賢爾時氣爭王那應零落同塵土絹素風神出毫鷙栁家新樣疇能覩鋒距寧登由也堂委蛇恥效邯鄲步嗚呼開元已還骨格變誠懸亦是書中虎不辭傾槖為買將欲傍墨池追定武君不見魯男子硜硜可畏哉自云善學君之祖何自禊敘出右軍筆玉匣蘭亭龍孫定武外石刻啻百千本而孫興公文及諸賢詩寥寥無傳者獨栁誠懸少師嘗一録之見宣和書譜栁法遒媚徑健與顔司徒嫓美書家謂驚鴻避弋饑鷹下鞲不足喻其鷙急去山隂室雖逺大要能師神而離跡者也余從顧氏驟見之恍然若未識久看愈妙因損一嵗俸獲之仍為歌志於後郡王世貞謹書吳此書乍看之亦似有一二俗筆而久之則俗者入眼作嫵矣殆似髭聖之視羊鼻翁也鋒徑處真純鉤鐸矟遊絲細筆亦似鐵鑄中間一二行小楷以無意發之絶似晉人心印耳跋尾楊少師有書名乃不能佳宋適無書名乃致佳亦不可曉也滄浪莆田海嶽無垢及長睿校書皆宋之諳八法者皆有跋淡游老人王曼慶庭筠兒也明昌金章宗年號則此卷蓋入北矣萬厯改元初秋書於九江道中舟行如畫世貞後有莫是龍跋不録唐明皇恤獄詔紙本髙一尺餘長七尺四寸共計三十三行每行十字字徑寸紙墨完美真神品也御寶前後二方又鈐縫三方朱文元印一方墨林藏印前後共草餘方髙氏藏印數方按張清甫書畫舫云宋初有毛應佺知竇州清節過人此詔出宋太宗但詔詞不似敕州官語亦未可盡信也敕毛應佺朕念三聖之愛育蒸黔垂著典法申戒官吏簡恤王章深切丁寧斯為至矣方郡官長如能刻意遵奉與我共此何患不臻於訟息而法平哉今歊燠戒時動植咸茂而圜牆幽圉猶有繫縲愀然以思當食興歎汝宜體是憂惻加於撫循無使狴犴之間重有淪胥之困躬勤省察稱朕意焉敕書到日汝可速指揮埿飾灑掃獄房常須淨潔每五日一度差人就獄內監逐人力刷洗枷杻及逐日供給水漿兼罪人內有疾病者立便差人看承醫療其委無骨肉者支與喫食有人供送茶飯者亦須畫時轉送不得邀難減尅無使罪人或至飢渴所有合歸法者候處斷之時給與酒食如小可罪犯便須逐旋決遣若是大段刑禁事關人命亦須盡理速行勘斷不得淹延仍散下管內汝宜常切提舉毋令曠慢及候依此逐件施行訖聞奏故兹示諭想宜知悉夏熱汝比好否遣書指不多及十七日三字大于文敕字倍大唐顔魯公祭伯父豪州刺史文稿紙本髙八寸長二尺五寸前後有宋人鈐印皆不可辨識惟穆字印并開封尹印項墨林收藏諸印燦然可見此文已摸入鬱岡齊中刻本十得其二耳惟乾元元年嵗次戊戌十月庚子朔草一日庚申第十三姪男銀青光祿大夫使持節饒州刺史上輕車都尉丹陽縣開國侯真卿敢昭告于亡伯故朝議大夫豪州刺史府君之靈日者叛賊祿山俶擾河洛生靈塗炭兵甲靡夷二兄杲卿任常山郡太守忠義憤發首開土門擒斬逆豎挫其凶慝元蒙授衛尉卿兼御史中丞城孤援絶身陷賊庭聖朝哀榮褒贈太子太保甥季明盧遜等八人被賊害者並贈五品京官嫂及兒女皆被拘囚睿略昭宣宇宙清廓脫于賊手並得歸京真卿比在平原遭罹凶逆與杲卿同心協德亦著微誠二聖憫焉授户部侍郎河北採訪招討使又遷工部憲部二尚書再兼御史大夫出為同蒲饒三州刺史聖恩錫類大門贈華州刺史兄弟兒姪盡蒙國恩允南授膳部郎中允臧授侍御史威明試太僕丞真卿男頍授太子洗馬頂授協律郎頰授祕書省校書郎賜緋魚袋諸姪男等袁綏華亭丞泉明皓頲等並蒙遷改一門之內生死哀榮真卿將赴饒州至東京得申拜掃又方逺辭違伏增感咽謹以清酌庶羞之奠以伯母河南縣君元氏配尚饗中書侍郎禮部尚書集賢殿大學士崔𦙍長安安氏富蓄法書顔帖數種此其一也觀其筆法遒徑初不用意實為竒蹟又歎魯公之烈義而曽不得少容於朝廷至逐為饒州刺史迄不免淮西之行則時事可知矣此尤可深嗟而永歎云東元祐九年甲戌四月㑹稽公穆父題時在開封紹聖初載九月八日上御集英殿策賢良方正陳暘等三人臣京臣協臣執中臣服臣古臣陶臣卞同待詔殿門同觀此書卞記史文稿真蹟宣德八右唐顔魯公祭伯父豪州刺年秋九月丙申前史官國子祭酒兼翰林侍講太子賔客致仕胡儼拜觀謹題右顔魯公祭其伯父豪州刺史公文稿一通觀其出為饒州刺史時眷眷朝廷之恩以一門生死哀榮告伯父于地下略無怨望非上之心真可謂懷忠之士也當明皇寵祿山公固知其必反張九齡亦知其有反相人主蔽固已深而不之知及反公以平原太守起兵討之明皇歎曰二十四郡都無一人義士獨不識真卿何狀而能若是嗚呼其真不識真卿也邪茍識之人無能間之者先與從兄杲卿同心戮力摧挫賊勢杲卿死於賊真卿亦不容於朝九齡隨罷安史猖熾幾覆唐祚可勝嘆哉公厯仕三朝數為憸邪所構纍斥而卒至縊死嗚呼悲夫天乎人邪徒起萬世之下扼腕而已撫為過化之邦祠而祀之宜也其手澤之留於撫者人之寶之代厯兵燹翰墨猶新重若拱璧兼金其有以夫宋元祐中錢穆紹聖中蔡卞題其後皆可以為竒蹟觀其字體有快㦸長劍龍跳虎卧之勢可謂發諸心畫者也撫郡李懋德氏藏之纍世屬書副本乃為録之如右并題其後觀者當知其忠烈之不磨也正宣德九年龍集甲寅春二月朏文淵閣祕書校豫章進賢包彥孝書題顔魯公遺墨卷也公自蒲州刺史封丹陽縣侯此顔魯公祭文草乾元元年御史唐旻誣劾貶饒州至東京作文以祭伯父及其一門之親約可三百餘字雖改擸塗抹然字字皆有規矩不失常度豫觀平生碑刻正書其峻聳如山嶽缺利若戈㦸其嚴毅莊重如端人雅士垂紳正笏於廟堂之上不敢䙝近此則小行書也剛徑而圓熟與爭坐位帖大略相似豫未敢以伯仲評之也爭坐石刻此則墨跡尤為可寶者自乾元迄今千有餘年楮墨完美筆畫爽朗而精神英發雖在草草之間正氣凛然史稱其如秋霜烈日可屈而仰非虛語也宜乎博雅君子珍藏什襲愈久而不失也公歷官至太子太師李輔國惡之盧杞嫉之屢遭貶逐年八十遣使李希烈雖不屈罵賊而死亦少知幾哉悲夫京景泰四年秋七月既望朝請大夫贊治少尹南國子祭酒致仕前翰林侍講史官陳敬宗謹題長安安師文家顔魯公祭伯父豪州刺史文舊在安氏别有魯公書草五紙老米嘗盡得之然猶獨以此祭文為天下竒書今從毗陵陸諭德廉伯借觀纍日信米老之言不虛也感慨之餘敬題其後吳郡李應楨卷尾有楷書二行云萬厯庚戌二月八日人以此卷來質錢至八月八日贖去厯閏月凡留清樾堂中百八十日閲二旬又復來歸遂獲永寶有日華小印五代刁光𦙍畫冊紙本俱扇團對題金龍箋宋孝宗書計十幀雙飛蛺蝶圖字作桃李大小四平臺翠石石上飛白刁光𦙍三用重墨鈎細徑疏簡又空鈎樹一株絶無皴筆石傍著雙勾黃草上有二蛺蝶五彩㸃成左有御府鈐印融融風日雜花開一雨凋殘滿緑苔倘有紅妝來拾翠無端蝴蝶鬭飛來御題五羊圖純羌羊五一囓草一跪草間仰首作咩狀一老羝白回顧一子羊藏于石畔一大羯羊面山背立曲盡生動枯木二株焦墨鐵幹泉石平坡近岫逺山用色濃厚寶光射人石上飛白刁光𦙍三字右方御府圖書鈐印霜風不動節毛塵同沐中原水草春蘇武還朝典屬國一時髙爵豈庸人御題葵石圖緑玲瓏石一座傍植秋葵五本水墨㸃葉上籠汁白粉鈎筋花用粉積綴以丹心其下茸草蒙密石間平處飛白光𦙍二字右方御府鈐印中央正色殊堪重况復丹心向太陽可信化工深意在只教此本染宫黃御題雪松圖一雪景作古松一株骨立屈曲泉石幽深松畔伏蒼兔樹石突處著粉地用墨染無欵印夢中衣褐定何祥明視由來世澤長誰擬前身是韓子為他毛穎著文章御題竹菊圖流細飛白竹石坡突兀坡下五色菊花髙下掩映泉蜿蜒石上飛白刁光𦙍三字左方宣和御寶押字右傍附卦圓璽蓋髙宗尊親之義也賦得閒情思獨工想攜巵酒對芳叢鉛華不為春爭艷留得先生醉頰紅御題蜂蝶戲貓圖海作平坡疊石貓純白頂尾帶黑石傍古檜一株桐一株右方御府印石上正中飛白刁光𦙍字止存其半白澤形容玉兔毛紛紛鼠輩命難逃後村詩與涪翁詠未及崔公一議髙御題雪裏山茶圖粉左方作滇茶一本碧葉丹花鮮艷耀目石上著遍地滃墨正中石上飛白光𦙍二字右方宣和長方御璽一枝殘雪照山城春意原非復後生羞把紅顔媚兒女梅兄知我嵗寒情御題江南風景圖旋作過牆紅薔薇一株巖石蒼翠弱栁數條蜻蜓繞左方御府鈐印飛白刁光𦙍字已不全秋雨池塘透晚涼蜻蜓飛處白蘋香江南風景堪圖畫怪得先生一闕長御題雪景水仙圖長作帶雪文石下寫水仙數本正中宣和御押并方璽飛白光𦙍字在石間黃冠翠帔玉為姿何處春風一見之未到湘江清絶地試看山谷老人詩御題芙蓉泉石㸃蒼苔碧石流泉湧波臨水斜倚芙蓉一本鈎花葉淡宕韻致非黃徐輩可及也石上刁光𦙍三字左方御府鈐印託根不與鞠為雙歷盡霜風未肯降本自無心那有怨年年清豔照秋江乾道元年仲春御題五代黃居宷桃花鸂鶒圖絹本立軸長三尺八寸濶二尺宋范華原劒閣旅行圖雙幅絹立軸長四尺七寸濶三尺一寸山作礬頭人物車馬俱寫意樓臺界劃用焦墨粗筆古拙渾厚非南宋人所及也又萬山飛雪圖絹本立軸長四尺二寸濶三尺一寸水墨畫耿都尉家藏宋李嵩寒林聚雁圖絹本立軸長三尺九寸濶二尺五寸焦墨喬柯雙鈎密竹蘆雁俱淡設色上有董文敏公標題下有黃琳藏印宋趙大年仿陸晃雪江捕魚圖絹本立軸長三尺八寸濶二尺一寸七分淺著色漁人紅衣狀若島蠻樓船大艑漁具畢陳設景甚竒宋文與可盤谷圖卷紙本髙八寸長八尺餘水墨畫極精徑前有宋人楷書盤谷序文不録湖州以寫竹名天下而山水人物世固未之覩文甲寅之秋夏叔宜兄弟出其所作盤谷圖相示曰此蓋湖州得意時筆也豫為之把玩不釋手蓋湖州胸次之髙足以冠天下翰墨之妙足以追配古人去之四百餘年覽此一圖尚足使人油然感動如李願初入盤谷韓昌黎與酒作歌時也此圖乃袁文清公家舊物鑒定真蹟無疑九靈山人書於囂囂亭嘗言唐無文章惟韓昌黎送李願盤谷東坡先生序一篇而已又稱其友文與可之畫與詩楚詞草書為四絶謂其友云世無知我者惟蘇子瞻一見識吾妙處今觀夏叔宜兄弟所藏與可畫盤谷圖山水人物林木風致灑落筆意髙古真足以追配昌黎文章之妙使當時坡翁見之必加歎賞無疑也然此圖既經清容公鑒定而復為夏氏竒玩則後世之坡翁亦豈無其人哉慈溪桂同德跋宋蘇文忠公後赤壁賦卷紙本髙一尺餘長六尺行書文不録右赤壁後賦東坡真蹟舊傳吳匏翁家物前王晉卿圖後宋元人題跋甚多今皆不存豈轉徙散失故耶東坡文筆固無容議惟因此展玩殊深慨歎後之收藏者尤宜保惜萬厯改元春三月後進文伯仁書余所見凡三本與此而四矣一在嘉禾東坡赤壁黃參政又𤣥家一在江西廬陵楊少師家一在楚中何鴻臚仁仲家皆東坡本色書此卷又類黃魯直或謂蘇公不當學黃書非也蘇黃同學楊景度故令人難識别耳文德承又謂此卷前有王晉卿畫若得合并不為延津之劒耶用卿且藏此以俟甲辰六月觀於西湖上因題董其昌書辛丑陽月朔越人邵發僧忍得觀稀世之寶拜手記之宋李龍眠赤壁圖卷絹本髙一尺餘長八尺全用水墨樹石沈著人物工雅有秋空幽致大江東流浩無極神斧何年開赤壁西風吹盡戰船灰翠疊峩峩掃空碧秋清白露洗銀河水落空山見危石何處扁舟載月行眉山學士黃州客黃州老客不世才江漢波瀾深莫測自說前身盧道人謫向人間了文墨平生顧義不顧害往往長遭權貴斥䇿題謗息詩案興不免姓名歸黨籍何如斗酒魚十頭鼓棹滄浪散胸臆目斷天涯望美人此時此意誰能識我懷髙風不可即坐對畫圖三歎息安得江東化鶴來洞簫吹徹東方白夢叟守仁天禧空明一葉泛扁舟紅蓼花開赤壁秋往事欲詢人已逺大江無盡水空流幕薪漫有千年恨載酒重攜二客游孤鶴不來山月上倚蓬吹笛過滄洲文余昔遊鄂渚舟次赤壁弔古興懷慨然有作士持此圖求題因書舊詩以附卷末正月豫章胡儼題永樂二年春宋蘇文忠公遊虎跑泉詩卷紙本髙八寸長尺許字大如錢行楷書連題欵共七行遊虎跑泉軾紫李黃瓜村路香烏紗白葛道衣裳裳字㸃去涼閉門野寺松隂轉欹枕風軒客夢長因病得閒殊不惡安心是藥更無方道人不惜階前水借與匏樽自在嘗右蘇文忠公真蹟此詩不載集中虎跑泉一在丹陽一在錢唐公嘗通判杭州則此泉蓋在錢唐者也正至正元年二月壬寅多爾濟巴勒跋觀至四年四月晦日揭徯斯觀張翥同余來戍蜀西因迿鎮過峩眉謁三蘇堂於蘇氏族人處幸獲拜覩老泉東坡墨妙乃知此帖不贋也至至正辛巳皋月尚急日舒嚕鐸爾道書少監杜正元年端陽日兵部侍郎陳思謙崇文秉彝祕書太監别多喇卜丹太常博士成遵禮部侍郎台哈巴哈同觀於寬簡堂以上篆書豫嘗從事海南憲府按行儋耳獲覩東坡先生墨蹟多矣今又得觀遊虎跑泉詩翰墨無異前所見者集中不載是詩意編輯者之遺失抑何害乎是帖也耶吾師寶之幸幸能鼎臣再拜謹跋至正改元六月望日看雲老人吳全節觀至正元年閏月望東平王士㸃拜觀余嘗見林和靖手書所為詩一巨軸多集中所不載坡翁所作視和靖尤富一詩不見於集中固無怪其然蓋古人之文亦有自刪去者此則坡翁得意之作必非自刪去編録者偶未之見耳至正二年七月草八日黃溍書則其揮翰如雲霞攬結雪堂老咳唾笑罵皆文章豈獨此詩也哉而龍翔之灑染尤得皮得髓則其髙弟弟子所收其為定本無疑矣杜本觀蘇長公題虎跑泉詩卷至正二年益友菴自燕都攜歸龍河豫得見之洪武九年再見於梓北山處十八年春虎跑戒定巖使其徒攜來槎峰又見之噫四十四年之間凡三見此卷自兵革後天下法書名畫零落殆盡何此卷流轉南北獨無恙如此豈神物呵護之耶既復還虎跑是猶完璧歸趙當刻之石以為山中故事一宗泐識遊虎跑泉文集右東坡手書七言律詩首題云是詩則題云病中遊祖塔院按傳燈録唐元和十二年大慈中禪師創寺於杭州南山長慶元年賜額大慈咸通二年師入滅開成元年其徒欽山請於朝易名法雲宋太平興國六年以南泉臨濟趙州雪峰諸人皆常至此故又名祖塔院東坡來遊止據寺名而書此詩時又偶作虎跑泉蓋一詩而有二名觀者以為集中不載一時未暇詳考耳此寺山川環秀郡中為勝郡志又言南渡後史彌逺卜葬其地民謡不吉而止乃即寺駐兵寺廢不治者百年嵗甲子戒師定巖始重作佛殿僧居宏麗殆可與靈隱三竺甲乙又訪得東坡是詩墨蹟購求前輩名文章家敘論已成巨軸間以示余噫佛氏之說有所謂因緣者是詩洊更兵燹失而復得豈亦有因緣耶戒師嘗汲泉水送豫豫以之煮茶香冽比蜀井宜其有異傳也五日門山道人齊郡張紳識乙丑十二月十有按蘇公子瞻通判杭州在宋熙寧四年而守杭在元祐四年詩蓋作於此二時距今洪武十有九年已三百餘年矣此卷流落人間不知幾易其傳今虎跑住山定巖戒公而以重購還之山中豫見夫世之大家巨室有好蓄法書名畫者曽不一二世其子孫有貨之而以為食者今定巖乃能不忘前賢品詠重購而還之於三百年後噫其亦賢於世之人也逺矣天台沙門清濬嘗聞蘇子瞻為五祖戒禪師後身其然乎哉所以平生喜與僧交好遊名山蓋宿習也守杭時至西湖夀星寺有詩云前身想已到杭州才到名山即舊遊及遊南山虎跑泉凡作二詩其一已鐫於石其一集中題云病中遊祖塔院人不知即為虎跑泉也今住山定巖戒公訪求得墨蹟亦欲鐫之噫物之於人或離而復合人之於物或去而還來亦時緣之所繫也然則定巖焉知其非前後身耶時洪武十九年丙寅夏四月中吳釋𢎞道宋黃文節公書梵志詩卷古色青襴箋髙七寸八分長一丈二尺五寸紙計七接有忠徹方印完璧世寶嘗齊墨寶四朱文長印皆宋元間鈐記行書連欵共七十行董跋小楷四行在本身箋上兀然無事無改換無事何須論一段直心無散亂他事不須斷過去已過去未來何用算兀然無一事何曽有人喚向外覔工夫總是癡頑漢糧不畜一粒逢飯但知嗎世間多事人相趂渾不反我不樂生天亦不愛福田飢來一鉢飯困來展腳眠愚人以為笑智者謂之然非愚亦非智不是𤣥中𤣥要去如是去要住如是住身披一破衲腳著娘生袴多言復多語由來反相誤若欲度衆生無過且自度莫漫求真佛真佛不可見妙性及靈臺何曽受薰鍊心是無事心面是娘生面劫石可動搖箇中無改變無事何須讀文字削除人我本冥合箇中意種種勞筋骨不如林下睡兀兀舉頭見日出乞飯從頭􅀈將功用功展轉冥蒙取即不得不取自通吾有一言絶慮忘緣巧說不得只用心傳更有一語無過直與細極毫末大無方所本自圓成不勞機杼世事悠悠不如山丘青松蔽日碧澗常秋山雲當幕夜月為鈎卧藤蘿下塊石枕頭不朝天子豈羡王侯生死無慮更復何憂水月無形我常只寧萬法皆爾本自無生兀然無事坐春來草自青元符三年七月涪翁自戎州􅑴流上青衣草四日宿廖致平牛口莊養正置酒弄芳閣荷衣未盡蓮實可登投壺奕棊燒燭夜歸黃文節公書世多摹本又多贋本生平所見以此卷為灼然無疑梵志詩較寒山更自竒崛書亦近之丙董其昌觀因題康遊廬山開先寺是涪翁所曩申之秋按行南書七佛偈於石壁苔蘚剝蝕不可讀因令工人洗滌并搆亭其上名曰護偈亭搨得數本而歸字形如掌大又藏寫蓮經楷法首尾如一曽鈎勒普門品一卷行世又收有富陽劉生讀書緑隂藏鏹諸帖多行押書此卷頗長所録乃古德語知老生之精於禪悅發為筆墨如散僧入聖無裘馬輕肥氣視海嶽眉山别立風格而其運筆圓徑蒼老結體緊密縱橫處從顔栁諸公上接羲獻故知四家雖殊勢其得法於晉唐衣鉢無異也蘇米二公手蹟海內爭購至今流傳卷冊尚多惟蔡忠惠絶少世亦不知求覓而先生贋本遍天下如董宗伯所云生平罕見真鼎信然也此卷得於吳門歸叟不惜傾囊易之亦以書家正法眼在此數公有志臨池安可不奉為師承耶永寶藏之無斁時庚申孟冬識於虎丘之鶴澗江上外史笪重光宋米南宫行書易義卷紙本髙九寸七分長三尺六寸七分凡二接共三十二行已摹入戲鴻堂帖中首有乾卦璽思無邪堂印鈐縫有曹子文子京墨林山人三印末有秋壑圖書項氏藏印三十餘方贉紙周伯溫補篆讀易堂三大字跋語十四行行楷書雅健秀拔亦精品也最後題云宋米元章行草書易說帖名賢題識項子京珍祕其值六錠易曰天數五地數五五位相得而各有合此五行生成之數洪範曰五行生數天肇一於北至隂之所隂極生寒寒生水故曰北耦二曰南陽之所也陽極生熱熱生火東陽中也陽散而生風風生木隂止以收而生燥燥生金金中央也隂陽之所交者也隂陽交而生濕濕生土所以成變化而行鬼神皆不出乎此夫體立而後成性以至稼穡皆五行之性也性定而後辨味皆五行之味也水物至隂其性流濕故江淮闕於山不若海之下故惟潤下所以指名之也五行聲色臭味而此獨舉味者人之所待以生養者惟味為急故也元符元年春二年夏三年秋游中天竺訪堂頭禪師紹聖四年同佛印訪禪師師已垂年苦留心於易芾遂贈其易義并大書讀易堂三字併闕遺之襄陽米芾元章書讀易堂篆書豫觀米襄陽為天竺大士書易義數語深得乾造坤化之奧世每以能書稱襄陽而其學識乃如此豈知米公者哉蘇君昌齡請篆讀易堂三字以補其闕用鎮山門遂書於左方鄱陽周伯溫識後二百六十一年當大元至正十五年三月朔旦也接米南宫於書無不讀生承平時以絶倫之資日賢士大夫緒言餘論故其造詣益深使其僅能字學則當時諸賢豈肯前席也世言王右軍能書而已殊不知其卓識偉見貽書殷深源勸其交歡桓溫使深源從其言則溫不至於跋扈而晉室尚可以扶持襄陽豪逸乃肯與佛印同訪中天竺至為之書讀易堂豈以少林指心單傳固與羲皇周孔元無間耶襄陽論易以及於洪範五行五位五性五味然所謂五行其五味人皆可知獨金曰從革從革作辛辛為辛辣使以金銀銅鐵百計煮之不能辛也此雖細事然子朱子門人固嘗以為問終不能折其為何如今已矣恨不能起襄陽於九原而質之吳人李君士明寄迹老子法中而嗜古好學出此卷以求題故粗書襄陽之為人而非敢及於讀易也此卷豫從項氏借摹刻於戲鴻堂帖甲戌修禊日再展觀於長安苑西邸中董其昌宋靈寶度人經冊紙本髙八寸餘楷書內多諱筆前後有紹興及乾卦璽印疑為思陵御書字亦遒逸圖凡三十九幅水墨畫人物宫闕俱極精麗當是南宋李嵩輩筆非元以後人可夢見也唐周昉缺伸美人圖絹本立軸長三尺三寸五分濶一尺六寸人物長尺許薄粧淡抹意態閒逸兩袖互舉作缺伸狀回身側顧略露半面微馨襲人石畔辛夷一株花萼鮮妍非宋人可辦宜歷代之寶藏也向有坡翁題七言古惜不知何時失去止存內府圖書及建業文房之印而已頃年曽見趙松雪臨本咄咄逼真惟設色稍艷今遇真蹟當避三舍矣上有前人題詠亦附録於左微步柔桑陌上塵辛夷花下一酸辛何人敢與千金贈獨背春風略缺伸句曲外史張雨題日長睡覺鎖窗深偶向花前一缺伸却憶行雲無覓處夢中心事付何人光弼宋江貫道長江圖卷絹本髙五寸長五尺餘水墨作巨然小景布置森密右有鑒定印左有其永寶用印隔水上有𨽻書二行云宗瀛嘗遍閲衜復同子儋記有淳字印寶經堂印前峰落照明後嶺層嵐積葉盡露山村潮來沒江石遙遙射雁子慘慘聽猿客何處下歸帆西陵渡頭夕山青丘生北水西東樵響千峰雨漁歌五兩溪南曲折舍風煙生寒谷暝潮落晚江空為客經行處悠然此畫中吳郡張適林雨鳴書屋溪流漲墨池終南山逺近渭北樹參差晴練春雲落天紳曉瀑垂只愁當變化雷電取無遺江梁溪吕迂清山色逾妍浦橋漁舟夜火沙風定聲稍息霜市人家晚煙翳徐賁湲隈春雨草木長曉晴雲霧嘉樹蔚繁翠彼漏開髙人採藥去野客棹船回抽毫寫幽思行吟緑徑苔拙逸子周南老石出夜潮落山明寒霧消江空千里棹村回一歸樵樹色連沙嶼人家傍野橋還同舊棲地風景日蕭蕭雪陶琛水急瀟湘雨餘雲樹濕迢迢翠嶼孤岷峨消春鶴回湛湛珠宫老蛟泣征帆數㸃風濤中出沒不計天西東鄉關杳渺在何處矯首遙送雙飛鴻潘伯濟里接清秋展卷令人憶舊遊白水西來通風煙萬别漵青山東去厯諸州雁離沙塞寒將近龍過雲林濕未收徙倚危欄看不極斜陽冉冉落歸舟相人韓宜可停杯看畫頻千峰青不斷萬里碧無每愛江山趣垠雲樹參差晚鷗波浩蕩春扁舟何處客飄泊正愁人金陵杜環大江西南來雲山亦隨繞迢遙過荆門浩渺連蓬島龍歸暮雨深鶴下秋雲杳孤懷正無際天空一帆小衆錢唐宋善長江白雲水何微茫連天秋一峩峩山髙渺渺色鳥飛欲絶頂浪衝將崩石樵歌林下風漁唱渡頭夕我非名利人誰是扁舟客俄然眷此圖長慨曽此役庭姑蘇沈琦見苔朔鴻南嶽去千嶺一猿霜後洞淺崖枯不哀楚俗依稀在吳帆浩蕩回平生此離抱偏向畫中開稽嶽王彞弋罷棹歌回斜陽映衰栁何處最秋多湘南斷磯口飛雁帶秋來汀蘆風夕響曽恐釣違時扁舟逆潮往石黃本過千里詩情送棹歌牛渚磯頭晚斷雲崩幾山風起江聲不似樹聲多舟張委少文畫壯嵗子長依微沙際路飄颻江上名山遊揮杯自酣適清咏以消憂且盡兹晨樂明朝非所謀倪瓚霜落半林秋鶴鳴衆山靜僧寺夕陽邉殘鐘送孤艇悵望未歸人空江淡雲影吳郡金問大江來自岷山逺萬里東流幾深淺洪濤巨浪日舂撞一派西隨萬山轉萬山峩峩翠黛浮大孤小孤當中流髙城逺出武昌樹衰草微連鸚鵡洲茅屋人家住深島雞犬不聞人跡少幾行歸雁日邉來一幅征帆天際小湘南雨歇秋風清落木黯慘哀猿聲荆門月出夜潮長九嶷山碧秋雲橫我生自是優游者足跡何曽半天下長江萬里欲神遊却喜今朝見圖畫畫圖再展未能休似有糢糊寒具油只恐通仙忽飛去驚絶當年癡虎頭錢紳吳門江山望難極樹色楚煙微萬里來鴻斷孤舟去客稀暮雲情渺渺春草思依依我亦飄零者看圖却念歸少太原王廷桂迹姑蘇來帝都天開景象人我昔年遊江湖發物阜金陵佳麗古今無石頭城枕玻璃雪紫金山照玲瓏月龍蟠虎踞世所竒四海朝宗興大業長江發源自岷峨一派分流荆楚多層巒疊嶂勢回互萬里直注翻洪波嘗思授職蜀川去後來典教富水住秉文持節草餘年半是平生經歷處曽聞毫素擅江公貌得江山淡復濃明窗展玩盡快意忽觀此圖超化工碧空雲收水拖練蛟龍不興澄鏡面差差密樹望中迷杳杳輕帆天際見仁翁得之久祕藏珠玉聨翩翰墨香書畫雖存人已逺臨風三歎淚沾裳謾賦長歌一揮寫醉筆淋漓似狂者舊游淪謝今應稀風景依然總瀟灑人生漂泊徒紛紜那似閒居屏俗塵殊途絶域無由到安分甘為林下人吾獨胡為世無補未報君恩奚足數王事驅馳寧憚勞豈敢懷歸戀鄉土自慚不及子長才遊覽安能遍九垓未擬清髙踵先哲空負儒名同草萊吳郡陳紹先長江悠悠急於箭一碧無聲寫晴練寂莫秋容雨後看依稀帆影煙中辨白鳥雙飛意自閒茅屋小住長蘆灣殘霞紅明晚天曙落木慘淡秋風還分明記得經行處鸚鵡洲前久呼渡多少天南地北情展圖一晌空凝竚小宿郡卞同癖年來時向夢勝水名山渾未識少徒嬰山水中遊覺後追思空歷歷匡廬衡嶽天下竒洞庭瀟湘浩無涯鳥道縈回不易致鯨渡險惡誰能窺何如靜坐茅檐下晴日和風展圖畫數㸃遙峰席上橫一葉征帆窗裏挂白鷗不動意俱閒蒼藤古木垂清灣人家住在鳬鷖渚繞屋春流繞舍山倫張浦樹望難即青山看漸微餘霞帶殘照偏送暮帆歸江村人歇早渡頭燈火稀涼風動蘋洲江上秋來早落葉滿溪橋荒村人跡少何處是漁家炊煙起林杪青城山中人離離衆樹深靄靄孤雲碧山色望難窮江流浩無極漁歌逺渚昏鳥下平蕪夕惆悵涉風波扁舟何處客畫南闕郭氓筆意逺到超常情闕江君筆古有名髙士得此幅一展一度心神清重巒疊巘更幽悄嵐霧霏霏積昏曉野橋日落少行人山徑雲生亂啼鳥碧波浩浩江如天腥風不起蛟龍眠潮平極浦短棹發雨歇逺岸孤帆懸畫中佳境疑曽住宛似匡廬讀書處月明洲上採蓮歸雪後林間訪梅去别來不覺嵗年多功名事業仍蹉跎我欲因君賦歸去故園風月今如何靄廬山陳繼泛夕漲遐渚斂暝洞庭淪湘江荆楚七澤奔流色飛帆雲外去旅雁煙中集狂飈激洪濤落景度赤壁憑髙欲望舜歌些憐弔屈木落秋氣清天低暮山碧待濟無方舟徒令歎行役渡張肯人其畫右宋江貫道長江圖貫道名參南霅川師董源巨然一時稱名家畫法之妙余雖不闕謹而諸賢題咏皆清麗可喜至於字畫亦皆精不茍視近時大書狂語動輒滿卷者有間矣詩凡二十五篇其尤知名者十有八人青丘子為髙季迪啓長洲人國初與修元史官翰林編修擢户部侍郎張適字子宜號甘白生仕終宣課大使王彝字常宗本蜀人流寓嘉定與修元史不仕而歸後與髙啓皆死魏觀之禍徐賁字幼文亦蜀人自毗陵徙居吳之齊門號北郭生仕終河南左布政周南老字正道濂溪之裔居吳門仕元浙省理問國初召議太常郊祀禮禮成發臨安居住韓宜可字伯時越人仕為陕西參政杜環字叔循廬陵人隨父居金陵仕為晉王府録事有行義事具宋濂所作小傳金問字公素一字公遡仕宣德中為禮部侍郎錢紳字孟書仕終鄞縣教諭陳紹先字宗述元儒陳叔方之子仕終王府紀善年九十餘張倫字文伯仕為太醫院御醫青城山人王璲字汝玉永樂中侍仁廟為太子贊善卒贈太子賔客諡文靖陳繼字嗣初仁廟初召為五經博士終翰林檢討倪瓚字元鎮號雪林子無錫人有髙行陶琛字彥珩卞同字孟符張肯字季孟號夢菴南郭氓為許觀瀾伯自倪公而下五人皆不仕而有文學之名同時别有許觀亦字瀾伯洪武狀元及第仕建文時為侍中後守安慶死於靖難時乃池州人與此許觀不同而皆有文學不知此詩誰作也跋嘉靖十一年嵗在甲午七月二日長洲文徴明寒蘆兩岸秋沙觜人家住渺渺天際帆歷歷江頭樹飛燕㸃遙岑歸樵辨微路蟹舍與漁村百里橫煙霧康熙己巳江村髙士竒題宋許道寧羣峰秀嶺圖卷絹本髙八寸長五尺水墨畫卷末有許道寧三字上有宣和御寶內府圖書內府條記困學齊印宋燕文貴溪山行旅圖絹本立軸髙一尺五寸濶二尺一寸水墨畫筆意秀徑有稽察司印王孟津題邊綾云凡畫百不如此二尺絹巖學有本源骨氣稜然得壑深垕文蓀老親翁韞之觀之不厭三月初五日王鐸識順治六年宋郭恕先嶽陽樓圖絹本髙一尺五寸濶一尺四寸界劃精細樹石蒼古逺山漁艇尺幅間具洞庭偉槩誠巨觀也下有松雪藏印宋趙彝齊水墨花卉卷紙本髙八寸長一丈四尺計四接俱有玉牒孟堅小印鈐縫花卉二十四種引首彝齊戲墨四字明太常少卿鄭雍言篆欵在卷末小行書作三行前有趙氏彥良趙原初印項子京家藏諸印甲寅中秋玉牒子固擬江右湯叔雅慶元丁巳上元日戲筆為善堂書子固為宋宗室精於花卉平生畫水仙極得意自謂飄然欲仙今觀此卷筆墨飛動真不虛語蘭雪坡劉笏曰凌波仙子言輕盈縹眇可凌波也子歌水仙者固此卷庶幾為花傳神矣周氏其世保之附李范菴札叔野昨承寵顧知感知感子固畫卷望借一觀不致沈滯也晚生應禎奉白趙老先生契文趙子固白描水仙卷紙本髙八寸長丈餘凡四接前後并中間鈐記俱係子固方印無欵水墨細描髙下得二三十本或半掩或露花頭間出上坡用焦墨㸃苔秀徑生動無起止之跡真仙品也昨夜天風顛飄飄吹下凌波仙湘神相邀入瑶池水府羅襪步月搖金鈿仙姝自憐嬌莫比玉立亭亭照秋水嗟哉可望不可攀注目滄洲渴心起方泉生香殘雪後氷魂夢斷月明中生怕麗娟輕玉質欲舉桃花扇底舞回風丙鐵笛道人在七星寮效玉臺體試龍香寶劑時午秋八月十日也湘水深湘月沈湘裙翠帶青瑶簪藜華山雲下立明夜黃金鑄出相思心舜江鄭元秉題八分書冰姿髙潔筆難圖不遣春風暈玉膚驚破盈盈湘水夢一羣仙子戲蓬壺抱瓮翁髙士竒康熙辛未正月十九日瓶廬水仙盛開偶賦一章書趙子固所畫水仙卷後是日雪後輕隂天氣未暖尚垂簾擁爐也早嵗妍曉風迷洛浦夜月下瑶葉聳殘冬翠花舒天脈脈香微逗輝輝態獨鮮江梅差可並羣卉敢誰先竹窗髙士竒宋錢進士舜舉寫生紫茄卷紙本髙八寸長僅一尺七寸蚤日毗山愛寫生瓜茄任我筆縱橫自憐巧處還成拙學圃今猶學未成吳興錢舜舉畫并題壬子嵗余客舟徒與太原李鶴舫同舍㑹丹陽姜子恂持宋元人畫冊來觀其中有舜舉畫茄妙絶如生每憶之不忘今於十四年余幸再遊又見此幅頓還舊觀矣昔松雪翁歸林下檢笥中得舜舉茄果各一幅題其上云交遊來住休相笑肉味何如此味長想見古人髙致因并識之時乙丑嵗十月八日將樂余思復錢舜舉劉伶荷鍤圖卷紙本髙不及七寸長三尺四寸重金碧樹石簡雅人物蕭閒深得晉人逸致前有錢氏方印跋尾亦佳伯倫終日醉如泥野鹿牽車任所之荷鍤後隨從處瘞飽遊山水已忘飢吳興錢選舜舉劉伶劉伶酒是務風流瀟灑曠襟度吸乾滄海恣閒遊天地八荒為庭路君不見長松傍野鹿牽車參翺翔呼童荷鍤攜壺觴掀髯一嘯歸醉鄉醉鄉之境原自好好似海上蓬萊島青山緑水淡相忘玉樹璚花長不老到今尚想顔色紅顔色不改今古同醒時復醉醉復醒判然生死超鴻蒙嗚呼人間飲者醉多競先生不競名獨盛先生之醉不在酒只在乾坤一真性又不見李白一斗合自然須臾掃盡數百篇先生出處乃相似風流醉樂酒中仙豫章言隱峰酒星光白如銀下地不化石化作卯金刀姓人人生何落魄不顧王侯臣鼎鐘功名薄如紙只與麴蘖心相親笑呵天地天不嗔霹靂鼓舌潮翻脣洞庭三萬六千頃之水都將釀成酒盛貯盞斚波粼粼長鯨燥吻倒吸蓬海竭一日一醉陶然春宇宙須臾日月牖回視當世浮埃塵是誰丹青妙寫真吳興舜舉筆有神幻出當年荷鍤景二童相隨一鹿拖輪胸中浩氣直欲蓋紫旻從者莫助山頽身就成酒德頌百字駭走貴介驚儒紳我欲呼起栗里之陶碧山李與論衷曲為比鄰與論衷曲為同倫醒參政長洲徐俌醉東家碧玉瓢醉了又醒醒酒涼思正飄飄盡又醉伯倫終不信離騷齊右詩乃姑蘇夏先生集張翥丁復朱淑真陳艮句也客有以荷鍤卷索詩因碌碌不及造辭輒書以歸之西錢塘沈宣録鹿車駝醉眼花低荷鍤相隨東復尤勝相逢接䍦倒小兒爭唱白銅鞮禹苕西施義邁醴泉之如醉遊賦佳哉宜春也后時作兮飴魏武再造兮誇甘露之若􅨽洞庭春色兮柑釀嘉酏中山松醪兮羣仙偕戲主人不顧兮獨酌以自怡吏部卧瓮兮見恧而小鬾或漉以葛巾或換以金龜汲汲於是安知吾身肖天地宇宙為量四海為歸縱八極而一覽斡造化於𤣥機嗟乎天生劉伶以酒為名一飲一石五斗解酲僕荷鍤兮馭呦鹿挈榼提壺兮恣幽谷渴時轟飲飲時醉醒時復醉醉復醒豁醉眸兮遨遊釣詩懷兮酩酊鹿呦呦而思芩兮闖紫陽之遺場駕髙軒而粼粼兮歎鹽車於太行臨水停驂兮日永徜徉斷煙橫碧兮平原茫茫春而夏秋而冬吸乾天漢黃河之酒觴渴而飲醉而歌浪遊𤣥都蓬島之仙鄉亂曰人生百年功名事業一夢邯鄲老之將至西山日寒先生醉遊非耽酒籌寓意髙古其樂悠悠華亭嚴贊納乾坤裏陶陶醉十分死生成大夢富貴等浮納雲短鍤隨春草輕車帶夕曛秖憐埋瘞後無酒酹孤墳給事中嘉禾張寧題春風生面倩誰開落日題詩意幾回惆悵醉魂招不起杜康橋北有荒苔錢唐陳梁任達聊為爾沈冥亦復佳問君有底恨荷鍤欲長埋江村髙士竒題元趙文敏小楷書道德經卷宋紙本髙七寸五分長八尺六寸烏絲襴一百九十三行字大如指紙凡三幅老子文不録老子終延祐漆年孟秋七月望日太上弟子吳興趙孟俯為崔汝晉書于松雪齊趙文敏書道德前後凡一百九十餘行筆法遒媚結構整密真為禇薛冢嫡想見閒窗握管氣象雍容致足樂也張伯雨跋子昂書過秦三論曰後世誰知公落筆如風雨蓋公一日能書萬字故耳余所見文賦雪賦太極圖說千文墨君堂記耕織詩皆文敏得意行押此卷楷法精妙璠璵夜光爛漫几案當與五千言共垂不朽董宗伯云時作楷書以斂浮氣余謂時時展此亦使神怡務閒矣康熙壬申二月八日宿雨初晴春寒未退坐瓶廬敬跋江村抱瓮翁髙士竒趙文敏公書丹陽廣教寺興復記紙本楷書烏絲界前缺五十餘字丹陽沈山山東距縣治三十五里山名沈者因五季時漢吏部沈公歸隱而名著焉公生宜春官建康辭相命避之鐘金二山已而從釋於寺尋結菴寺之左時年八十九啓夀穴得銅碑䜟云佳城今已開雖開不葬埋漆燈猶未滅留待沈彬來後遂葬焉寺創於唐神龍間時國舅寶法師講經於兹至宋皇祐間主僧守玉感里人吕似施膏土繼伏臘復構彌勒佛大殿已而金人入境寺燬積廢久之有金禪師來居尋度道潛道一乃兩其派而傳之經營方殷㑹聖元混元甲申鼎建法堂己丑建山門甲午主僧善守知事紹登營丈室架穿堂大德庚子陳山唐如瑩三城束崇文助緣建大佛殿居無何嗣宏入寂宗禧領院事辛丑繼傅大鳴化喙造靈山一㑹洎觀音擁壁應真金剛等像延祐甲寅兩廊庫院從而新之丁巳里人齊山書院山長蔣公善秉同叔仲玉以故父桐隱宣使所遺節棁衆木助營藏殿己未提領唐用楫承先志施財造轉輪藏架樓鳴鐘繼傅繼心紹榮紹夀悟空等咸助成之寺之積廢後先百年僅有成績亦惟艱哉宗禧逺持事狀求文以記之因告之曰昔銅碑之䜟沈公信有數焉今寺之廢興豈能外吾所謂數乎原夫一定之數乃所報之果也終日營營乃能作之因也於一毫端現寶王剎一微塵裏轉大法輪因在果中果居因內塵毛剎海皆吾廣教伽藍離廢離興不增不減諸佛妙心於此成就如是觀者上延聖夀次報檀福殊勝莊嚴入未來際不爾觀者緣遷業變與物同途豈常住之理果如是哉宜勉之宜勉之至治三年夏五月庚子記泰定三年四月八日住山廣慧𢎞教大師宗禧立按兹記前題云丹陽廣教寺興復記次書沙門明本撰翰林學士承㫖趙孟俯書文曰佛化起自五天法音室傳流至中土互起迭興未易以數量也廣教寺居丹陽沈山云云今直以丹陽字起之蓋嵗久蠧蝕不完野衲無文強齊之爾此為趙公手筆傳今有年歷劫不朽兹得披覽終日備閲其間筆意縱橫流麗飛動非造書法三昧者不能及真神物哉夫兹山特江左一丘亘天地凡幾千載而得省郎以名自省郎傳五百年而有此文迄今復二百年矣楮墨儼然謂非有延於趙公也耶余知兹丘之遭不徒矣嘉靖壬午侍邃師閣老來遊主寺出此索題悵然感之漫記數語并係一詩於下九日七峰山人孫育志突兀當其中平原莽蒼躍大江東岸山萬疊嗟此虎兕海若震蕩馳蛟龍峰巒委蛇崦嶂合鬼斧鑿出仙人宫神龍已前尚茂草幽禽野燒為春冬省郎歸藏得天啓大隧之樂何溶溶開靈泄祕山始著漆火既滅禪燈紅瓊函法書貝葉文寶花妙相祗園宗行人臨溪不見寺清磬忽破煙蘿叢江城車馬隔塵海或許樵牧閒相通天風吹人落仙界一洗俗慮心為空丹楓蕭蕭戰寒雨青嶠靄靄飛秋虹吏曹遺骨太史墨當與歷劫相終窮昔人衣冠山下土惟有名譽留餘蹤浮生百嵗豈足恃紛紜障礙皆泥鴻尊前緑酒且盡醉俯仰宇宙如飛蠓絶纓長嘯走狂筆後世視我將無同趙文敏公浴馬圖卷絹本髙九寸長六尺餘重設色欵在卷尾小楷書子昂為和之作數匹青驄馬牽來不被鞍太平無用處閒殺老奚官鄧𢎞誰將韋侯筆掃出神駿姿何當脫羈縶變化騰天池承逺將閒銷戰器那復顧青驄落日秋原上長鳴向朔風廣益天間惠養神駿豪健自欲騰驤悵望東郊瘦馬日暮老烏啄瘡章庠少年曽進搏桑馬駿骨連錢不受鞿今日重於江上見却疑何處使人歸東吳道人李伯時好畫馬繡長老勸其無作不爾當墮馬身後更不作止作大士象耳趙集賢少便有李習其法亦不在李下嘗據牀學馬滾塵狀管夫人自牖中窺之政見一匹滾馬晚年遂罷此技要是専精致然此卷凡十四騎奚官九人飲流嚙草解鞍倚樹昂首局地長嘶小頓厥狀不一而驂驔千里之風溢出毫素之外王生老矣猶能把如意擊唾壺歌烈士暮年耳熱烏烏也庚辰六月雲棲館中漫題王稚登駿真有洞入馬腹中畫出一川花馬松雪翁十四之意龍眠敵手也余嘗見曹霸馬後米南宫跋并寫杜少陵歌行惜吾輩不敢望襄陽老子後塵耳同時龔聖豫與陸秀夫同居幕府秀夫死家益貧故人來訪者坐無几席一子俯榻上就其背寫唐馬風騣霧鬛蘭筋闕骭備盡諸態一持此僅換數金賴是不飢竟以無求於人而卒今使人但見趙王孫龍種展卷不覺三歎題七十五老人陳繼儒余在京師見天廏馬出浴德勝池真是一川雲錦今觀此圖洵稱神腕具見蘭筋血汗外别有躡空騰影之氣在也若十四駿情態則百谷言之詳矣崇禎癸酉與夏長卿中翰同觀瀨上宋獻松雪畫馬得神俊筆奪造化非人為偶然弄墨尚矜貴况是勾染窮精竒卷中駿馬一十四龍髵鳯鬛殊凡姿奚官或騎或牽引或將浴洗或爬釐飲者俯啄嘶者顧前者入水後水湄一馬眠坡意歡樂一馬昂首臨陽陂一焉青絲作韁絡紅衣圉人老多髭一馬當風繫髙樹獨聳雙耳如竹批餘皆騕裊色斑駮縱逸騰飽脫馽羈想似天間見萬匹摹寫不用韓曹師夾澗森木美清䕃繞岸小卉饒芳㽔㸃注隨意有别趣豈同畫史格庸卑只今春風動林野狂遊忽記花間騎江村髙士竒題趙文敏公二札卷一札白紙髙盈尺札及函封共長一尺六寸餘第二札月白箋髙一尺長二尺餘名上俱有趙氏子昂印孟俯頓首德俊茂才友愛足下昨便中承惠書兼寄碼瑙界尺并紙卷欲書金丹四百字當時寫畢附便寄還矣今兹便中得書乃云未至殊以為駭但失記何人寄去昏忘記憶不得殊以慚愧若旦夕思想得是何人當報去追取不肖不幸書頗好凡寄書與人多是為寄書者所匿甚苦甚苦棕笠之惠極仭厚意感激無喻因吳宣使便専此奉答時中善保不宣孟俯啓事頓首五月十七日啓事奉復德俊茂才友愛足下趙孟俯就封孟俯頓首再拜知州相公子誠閣下孟俯去嵗騎從來吳興因得略吐久别之懷所恨貧家無可將接坐成簡慢知我最深必不見咎别後賤體老病交侵藥裹不離左右者一年於兹獨坐空齊憒悶無聊子誠聞之必能見憐耳他人前不敢道也兹承専價惠書就審履候勝常深以為慰承諭三皇廟碑及先德碑託愛如此其敢不書但恐筆墨蕪穢不堪上石耳漫爾寫付去人更在裁之外蒙潤筆之贈子誠何必爾耶不敢引辭領次惶愧之極草草具覆餘唯上為國家下為吏民慎護興息不宣孟俯頓首再拜五月十九日松雪翁蚤學宋髙宗書即擅出藍之譽逮元貞大德間駸駸然晉人法度多矣正書小字妙得黃庭樂毅蘭亭筆意及皇慶延祐行書能到羲獻處晚年大字出入李北海蘇靈芝規矩蓋是習衆善而成一家者評者謂其正書如冠劒大臣議於廟堂之上行書如貴胄公子風神朗發照映四座大篆妙絶古今嘗書湖州學明倫二字蟠結莊重古意森然若揭雲漢奎璧昭回觀者莫不聳動稽諸詩與書法自五季以來其道浸以衰陋至宋末尤甚賴以天挺拔俗之姿獨能振起一時末俗之弊使學者逺追古人是有功於世教矣當時既有書名學者宗之有得片言遺藁爭相寶玩至於請書碑榜户外之屨常滿簪纓之家所有法書名畫得其跋語則倍加光彩暇時喜畫人物山水曽非俗史所能到也虞學士集多稱吳興天人豈虛言哉初公以御史程巨夫薦起家為郎官至翰林承㫖其出處顛末文章政事在元史有本傳云初禪者遂元朱澤民秀野軒圖卷紙本髙八寸餘長六尺二寸淡設色前後鈐記有良惠堂及朱字圓印向為墨林氏物故卷中有項氏藏印三十餘方又李㑹嘉藏印數方引首秀野軒大篆三字玉雪坡翁書秀野軒記一元之氣生物而得其氤縕扶輿以成其精英淑粹者為秀焉故卿雲景星天之秀也崇崖繚溪山之秀也麒麟鳯凰羽毛之秀也賢材碩德人之秀也人介乎兩間又能攬其物之秀而歸之好樂寓之遊息如昔棲霞之樓醒心之亭見諸傳記者不一也吳人周君景安居餘杭山之西南其背則倚錦峰之文石面則挹貞山之麗澤右則肘玉遮之障左則盼天池之阪雙溪界其南北四山之間平疇沃野草木蔥蒨卓然而軒者景安之所遊息也軒之傍幽蹊曲檻佳木秀卉翠軿玉映於闌楯之間得江浙行省左丞周公題其軒之顔曰秀野以志其美此其是歟嗟乎物有托而傳野得人而秀雷塘謝池是已景安居是軒也又將觀列史諸書以鑒其事服前言往行以進其學使他日有偉然秀出於餘杭之野者吾於景安有望焉因書以為記至正二十四年嵗甲辰四月十日睢陽山人時年七十有一朱德潤畫并記行書十六行在畫紙之末余昔游吳中諸山至周氏秀野軒領覽天池玉遮之勝今數年矣近歸寓軒獲觀周侍御之篆朱提學之新圖恍然若夢游也景安求余著語聊爾塞責耄餘材盡愧無佳語耳我憶天池與玉遮幽軒水木淡清華竽笙逺振風林竹錦綺晴連曉徑花山罽敷牀朝看雨澗泉潄石夜分茶番陽大篆睢陽畫不負舂陵處士家年至正草又五年五月既望京口張監天民書時八十五嵗軒中客今日重題秀野詩四檻彩雲晴昔年曽作縹眇繞牆蒼雪曉參差雨餘山氣侵茶鼎風過林香落酒巵念我松楸渾咫尺倚闌長是不勝思吳郡朱斌屋外溪水流雲度生中知繁花翠竹春屋裏青山來好古木蒼藤晚更竒教子讀書兼學稼留人炊黍復烹葵鹿門風景青門趣都在斜陽曳杖時張吉閒門日日開逺山如髮水如苔幾時脫却塵髙士中鞅布襪青鞋屢往來簾瞿莊上鈎憶得玩游聨琅玕芝草繞軒幽日靜垂不玉麈仍同騎鶴赴𤣥洲鍾朵朵峰巒簇緑鬟桐隂多處地尤慳居人一覽神秀霽月光風詠笑間煙香裊銅奩春畫遲窗分花影覆參差只輸我輩霞侣恆得憑軒歌紫芝靄靄凉雲雨後隂抱琴開酒愒中林眉山不獨知司馬安也還能識我心北澗生薛穆江晚洲渚交雨晴草菲菲前山靄欲暗罟師度水歸望煙知君家花竹隱半扉乍休田中耒猶響林下機此鄉即桃源亂後世有稀開圖身已到不知塵境非渤海髙啓何處問幽尋軒居湖上林竹隂看坐釣苔跡想行吟嶂日斜明牖渚風涼到琴相過有鄰叟應只論閒心青郯郡徐賁此獨幽竹深頻理徑山近不為霽色蕪外開軒樓茶興邀僧共花期報客遊看圖憐到晚借屐擬相求潯陽張羽濕翠浮草芽空青散林杪輕舟理橫塘歸人渡清曉棲鴉返故巢潛鱗躍新藻倒景淡斜暉回飈蕩晴昊衡門夜不扃燕坐事幽討落葉秋自飄殘花春懶掃愛此軒中人朱顔常不老我欲往從之稅駕苦未早揮手謝孤雲去去沒蒼徼臣菜薖余堯髙館罷零雨前榮揚微風霏霏碧蘿花吹落酒斚中移席俯流水揮絃度秋鴻遙思獨樂意邈哉誰與同十太原王行窈窕幽華映深竹中有髙人畫古苔畝青山麓掩扉裊裊藤梢上書屋清風出谷灑秋香返照穿林破春緑不省睢陽畫裏看細路經丘杖藜熟青城王彝曉環翠南畝斜陽晚映紅物我兩忘天東山淑氣理見欣欣花木總春風景徐圭異賦之恆愧草草秀野軒僕數年前曽為安茂塵語不足記録今一展卷諸傑作在前甚覺形窳俯用書此圖後日更賦之也秀野軒髙瞰水濵無邉光景四時新句十畝樹隂都是雨一庭草色自生開屏障啼鳥如歌送酒巡晴色錦紋題不盡幽花修竹總清真青城山學樵虞堪背郭幽居如畫裏斷林春水緑回環樹連煙外啼猿寺門對湖中過雨山送客馬嘶清䕃去鈎簾鳥度亂花還十年奔走風塵際肯借憑闌一日閒周世衡春風十里翡翠屏玉遮對峙峨眉青清泉白石雜華竹天放畫圖鍾地靈髙人開軒當此景酌酒賦詩白日靜四簷風作翠濤聲八窗簾捲晴霞影我亦托跡耕漁間結屋讀書湖上山抱琴訪子從兹始布襪青鞋相往還八分書皋南州徐達左如膏幽居謝塵喧啓户瞰平陸東夜來雨百卉沐泓泓水浮溪靄靄雲出谷雉雊麥風暖蠶眼柘煙緑忘形絶衆纍居寵有深辱揮弦對青山夕陽見樵牧安金覺秀野軒因懷季瞻劉君奉題景徴士十年歸向山中住每得從容訪隱居雲氣白飛檐外雨竹光青映案頭書憑闌晝靜聽呦鹿鑿沼泉香愛畜魚因憶軒中舊賔客江湖清夢未應疏董逺盤盤錦峰陽原陸平如掌中有故人居曽軒起𢎞敞緑林幽鳥鳴清沼游魚上已知禾黍收更喜桑麻長徴輸了官賦豈念田園廣躋堂夀雙親賔朋時燕饗怡悅心自安坐久絶塵想披圖一長吟松風答清響曠寄翁散煩襟叢蘭靄幽芬修篁結重軒宇何清憑軒隂兹焉愜遐賞逍遙冥素心斯誠茍不昧訪子西山岑惠禎軒居面蒼岑種藝雜花竹竹影畫扶疏花香時馥郁坐對雪山髙庭隂桑柘緑石田春雨餘幽歌聽樵牧冠蓋豈不榮誰能受羈束韜囊琴滿牀插架書連屋門前好客來槽頭酒應熟張均得覽先公筆悠然記昔時松楸先隴近花竹故人稀圖畫留遺跡雲山起逺思投閒身未遂感慨一題詩軒鄉人朱吉安眺覽之所也鄱陽周公為題秀野者吳周景其顔我先公寫而圖之復從而記之蓋軒與吾先隴密邇景安乃先公之愛友非若是孰從而得哉先公暮年每倦於此明年遂即世此絶筆也景安亦已物故景安之壻何幼澄氏持此示余拜觀圖後題詠多吳中秀士俯仰之間已四十餘年矣諸公亦多淪沒豈易得哉且夫名之著者因以德境之勝者由乎人他日何氏子孫傳示永久亦足以侈外家之雅集矣幼澄宜珤藏焉余既賦之以詩復求識之於後遂書而歸之日朱吉識永樂庚寅二月望元蘇昌齡靜學齊銘紙本袖卷髙七寸五分長三尺餘𨽻書靜學齊銘人生而靜於惟本性靜以成學斯得其正寡欲則存思誠則明艮背止止寂感相承死灰不然槁木多腐彼偏於私執一廢務學貴適用見學之工乾闢坤翕造物與同徒好其名不核其實珉中玉表餘將不食昔我先覺載著善言核其始終毫髮靡愆豐功遺烈照映簡冊二表忠藎六經日月尚友古人有志不渝睎顔之人亦顔之徒勗哉徐君士惟尚志舜何人哉睎之則是至正辛丑蘇大年銘昔者儒先君子教人為學必以靜定端莊之工為治心養性之方若夫施之於日用而合其宜見之於事為而得其當物至而理融逆來而順應自非靜定端莊積之有素行之有成鮮不瞀矣晉陵徐伯凝以靜學名其齊此其志何可量哉異日伯凝以其所積見於所行有不負名齊之意者豫將荷伯凝之有成山戊戌嵗二月草七日勾吳周砥庭聞道藏修地深秖閉門閒雲生几席流水繞軒身逸心逾逺神明道自存著書應滿屋妙處可忘言范致大靜學齊說伯凝以靜學名齊徴說於潯陽陶處仁吾友徐君愚謂靜之一字吾儒與佛老皆言之矣佛者曰定能生靜老氏曰清靜皆原於空寂言體而不及用吾儒大學首章曰知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得體用兼該始終兩盡必如是然後可以言學後世惟諸葛武侯知此義見於誡子書曰君子之行靜以修身又曰非寧靜無以致逺非靜無以成學格哉斯言今夫人之有心以靜為體方其靜也一塵不生萬慮俱寂如水之平如鏡之空湛然虛明人欲淨盡天理流行顔子之終日如愚孟氏之夜氣所息仲弓之出門如見大賔使民如承大祭良心所在莫非學也及其動也茍不以正則衆欲交馳萬慮紛擾存諸中則六鑿相攘處於室則婦姑勃蹊天理澌盡人欲橫流所謂視而弗見聽而弗聞食而不知其味者有矣而况於學乎吾想夫子之居是齊也將以齊其思一其慮以求至於安而能得以造夫大學始終之工夫不必淪於二家空寂之境也言未既伯凝笑曰吾子得之矣請以是書之左方知府徐績字伯凝號靜學别號雪溪漁隱晉陵新塘人也當元末搶攘之時隱居立學是時僞吳士誠僭有蘇常等處聞績行義服人屢逼入仕績堅守不從吳元年講學無錫梁溪之滸適遭僞將莫天祐據邑以叛殺害使者我太祖髙皇帝命豫章侯胡公統兵圍錫旦夕屠城錫民驚惶哭聲動天績計會耆儒張翼輩冒死投進軍門懇告願以仁義說賦奉胡公鈞㫖限爾後日率其妻孥來降免爾屠戮往說莫天祐果能自縛納欵全活生靈功德及民大矣士民愛戴弗舍留其家焉遂占籍無錫至洪武三年詔舉經明幡然應聘第居首選初任武岡尋改順德授中憲大夫在郡之日復能延致名儒作養士類文教大行至洪武十一年三月二十四日上憫衰邁尚居劇仕賜給驛舟送還鄉里欽奉敕諭如本府有疑難大事卿必同署㑹計鄉民無爵無德者不可同坐卿之子孫世世隨朝稱官稱舍人雜派差役一體優免及歸老於家優游林泉足跡未嘗一至府縣年九十七而終平生尤善詩文有雪溪漁隱集存焉王直元李息齊墨竹卷紙本髙七寸五分凡二幅一幅長一尺五寸作叢篁文石無欵右有圖記二方一幅長二尺五寸作過牆竹一枝欵在右任叔實教授有松江之行武林士友作歌詩以贐之豫不能也寫此二圖以見意云至大改元春二月息齊道人薊丘李衎仲賔題將過華亭一詩留别尚士林再拜倦客天地有真出處何時定歸棲老遲江山無知竺嶺呼猿日華亭聽鶴時平生愛杯酒到處住襟期叔實先生應衛君有山之招將過華亭枉道訪余且出詩卷見示輒次嚴韻二首一以寄衛君一以奉叔實併簡詹載使君遲吳興趙孟俯再拜有心衛子别我久雁來書尚相思無夢到自得知江雨論詩日春風把酒時鬢毛今已白早報重來期任子老於學飛騰無歎遲扁舟今又去吾道定誰知賔主歡娛地琴尊聚集時應同賈太守話我失前期元李息齊墨竹圖雙幅絹本長四尺五寸濶三尺一寸印在左方下有溫字一號楷字墨印覆以禮部評驗書畫關防實美如粟𤣥雲翻空下往時家住篔簹谷丹鳯之深靚昆吾寶刀削秋玉石衣漬錦侵書光風微粉墮生細香琳館瑶臺九天近夜寒笙磬聲鏘鏘萬斛蒼煙鬱江雨二妃彈瑟瀟湘浦郫筒蜀酒亦堪酤蟠石雙杖今誰取河朔嵗晏冰為梁羣木鱗皴臨雪霜遲汝狂飈莫吹裂裁管他年侑帝觴天山馬雍古祖常題雲江所藏息翁風竹蜀郡虞集書楷書十一行種竹如種粟九秋無實孤仙人家住太華谷平生鳯飢碧色離離擁寒玉琳宫髙壁澄月光天風吹影𤣥雲香老龍蛻骨墜人世衣製鐵鎖翻琅鏘西山採薇淚如雨嶰管參差鳴洞浦苔根稚籜正堪煮陂中棄莖拋莫取蒼官去作明堂梁玉妃零落凄曉霜嵗窮日晏耐幽獨仙人披圖釂君觴妙也東平王士熙次韻清竒相頡頏真一時二故併書之行延祐丁巳冬十一月既望楷書十四集記元張伯雨小幅紙本長一尺四寸濶一尺三寸水墨畫至正戊寅九月一日為太𤣥道友擬趙榮祿筆意天雨元趙善長小幅紙本長一尺三寸五分濶七寸餘淡設色作古木幽亭左方署丹林二字右角有蔣宜之印丹林元丹霞子萱花紙本長一尺七寸濶七寸五分水墨畫篆書欵在右方丹霞仙客寫元黃子久小幅紙本長一尺八寸濶八寸大癡道人為鐵舟主者作中峰大面削鐵如巖岫綺錯非一途上連閣道旁屋廬尋窗數户愁﨑嶇米顛所製三尺圖筆力視此微粗疏閬風之臺遲子久不歸政為松江鱸久至正戊子七月草又七日為鐵舟先生題黃子畫吳郡張雨元趙仲穆臨李成寒林圖紙本髙一尺六寸濶不及八寸我心漂泊似秋雲閒步松隂到寺門為問幻仙詩在否墨花猶續舊書痕右游靈峰寺見句曲外史所賦詩就次韻趙雍元曹雲西為倪髙士作小幅紙本水墨畫長一尺二寸餘濶八寸雲西老人作于清祕閣吾聞箕潁水能洗古人心兹山有飛泉泠泠琴上音塵垢悉蕩除方寸清似滌何止匡廬間嘯咏成李白危素元張可觀西清菴圖小幅絹本界畫臺榭古桂屈曲一人對月撫琴欵在樹間細楷書張觀二字桂花盛開西清菴冬日桂叢何自舞傳芭驚怪𤣥冬見此花月窟再開金粟影天香重降玉皇家攀枝楚客歌招隱耐冷嫦娥起散花况有清霜辟蟫蠧從兹不老是生涯遂昌鄭元祐元仇山村詩卷紙本髙九寸許長六尺四寸行書字大如指我本迂疏落拓人滿頭霜雪滿懷春登山有屐身恆健挂壁無絃趣更真往嵗效官殊漫浪老來學佛離貪嗔却憐衛鶴齊雞輩空費心機不庇身野鶴清髙六翮輕孤雲萬里去冥冥漢科合應茂才舉唐士曽書遺教經好趁江南諸老在盡看薊北衆山青錦衣歸日春風滿期醉沙堤雙玉瓶懶學羊裘漢子陵亦非解印晉淵明好山好水恆相對浮利浮名不願爭詩酒每尋朋友共田園都付子孫耕野心直與閒雲似却笑孤雲出岫輕末俗由來不貴儒愚夫愚婦恣揶揄束書合向山林隱絶迹莫登名利塗膝上有孫貧亦樂門前無債醉如愚咸平處士真堪羡死守梅花住裏湖宦海漂流四十年老來默默守吾𤣥艱危頗得文章力嫁娶各隨兒女緣白飯充腸聊當肉好書到手不論錢閒心懶作邯鄲夢樂取南窗一枕眠筆硯生涯獨善身一區花竹四時春無求莫問朝廷事有恥難交市井人簾外烏衣飛下上窗前絳蘂結輪囷鑑如居士東鄰住肯借霜毫為寫真難得心交左伯桃亦無善相九方皋而今賤子多儒誤自古山人索價髙衆雀豈能知鵠志一雞何足用牛刀獨醒獨醉俱堪樂妙理依然有濁醪倦游懶著小烏巾短髮絲絲白滿簪信手拈書聊慰眼轉頭忘事太無心笑他杜老頻看鏡愛我昭文不鼓琴喜有山林方外友時攜佳紙索新吟北風雨後忽南風頃刻開晴又轉東后土未乾偏有恨漏天難補愧無功小樓兀坐思猿鶴好客相期避燕鴻壁上墨蘭香可掬令人長憶所南翁豪氣年來漸掃除簞瓢自樂守臞儒江頭盡醉唐朝士澤畔行吟楚大夫萬里鯤鵬何必羡一官蟣蝨不如無葛巾草屨從人笑莫問青衫闕葉枯士瞻上人習定好修與豫晦翁笑隱長老三世交矣求豫斐章遂信手寫七言十首塞白上人其為我佛前懺悔綺語業至治元年九日山村老友仇遠書於北橋躬行齊豫始就學時即知仇白名蓋二先生乃宋之遺老同居錢唐名望相等一時制作多出其手學者宗之爾時天竺南北兩山法席甚盛諸尊宿咸在無不與二人者游仇名逺字仁近自號山村民學者稱為山村先生蓋抱道博通之士也今觀其詩冲逺幽茂而靜退閒適之趣溢於言外信可敬也此詩乃為前住天平山士瞻和尚所書者今六十餘年矣今天平住山復菴禪師士瞻翁之法子也一旦得之如獲舊物且喜且歎既為卷俾識於左夫物之廢興成敗似有數存乎其間自兵興以來故家所藏法書珍玩殘剝毁棄鮮有脫者而是書獨完於水火瓦礫之餘而又復歸於其後之人殊非偶然也俯仰今昔為之一慨皋釋妙聲謹識洪武戊辰八月東吾愛山村叟詩工字亦工波瀾唐句法瀟灑晉賢風交好論方外英雄在彀中天平宜寶護開卷氣如虹尊中吳釋𢎞道逸民書傳東晉法詩接晚唐朝野遺老山村有人樂易胸中道風流席上珍前賢不可見仰止挹清塵吳僧守道仇先生仁近宋季老儒也與白先生湛淵詩名並稱於吳下人謂之仇白若唐之皮陸也二先生晚年謝事樂於湖山泉石間多與方外士游名山勝地佛剎靈區足跡所到無不有其題詠兵後石刻墨本百無一二存也此數詩乃仇先生晚年所作録與天平士瞻翁者兵後亦失去翁之徒今天平住山復菴禪師復得之於他人復菴以為傳家之珍徴余題其後衍壯時過天平見翁於松下翁善辨評論古今人物惟允於詩亦稱道仇白也仇先生詩前輩已曽論余尚何言哉然是詩既失而復得禪師宜加寶重慶洪武二十一年嵗在戊辰十二月望日燕山大夀獨菴道衍山村先生詩置近代詩家中如新巧局中置一古商彝識者寧不髙其雅厚耶先生所交多偉人在方外亦皆卓卓如晦翁輩人物先生詩中稱所南所南鄭憶翁其制行不可屈撓世指為殷之逋播臣先生稱之先生為人可知矣所奕也其冲淡閒右詩蓋山村先生莫年退休時作曠之意藹然可謂達生委命者矣前輩文墨近不多見復菴其寶之洪武己卯冬孟二日吳門後學梁用行觀季猶歐虞之於元初觀其辭翰則知仇白之於宋其趣矣其語平而易其氣醇以和若行雲流水曷嘗用意求竒哉在唐稱郊島鳴於詩前輩謂其雕刻腎肝語險艱澀既以窮其身又以愁於人韓子云將使自鳴其不幸耶是卷始於南麓禪師值時艱成烏有復菴復藏之山中以貽後人後之覽者當珍之練川遺老姚性善夫正德丁卯八月十九日吳門盧襄師陳觀首愛其仇山村詩余嘗於西湖遊覽志中見其數冲淡典雅每以未見全集為憾是卷乃其親筆書與方外友士瞻者其風格大類樂天觀其詩可以知所養矣卷後諸跋皆釋子所書字畫不茍豈皆賢而隱於衲者歟嘉靖丙辰春正月既望箬溪七十四翁顧應祥書元柯丹丘古木竹石圖紙本立軸長四尺四寸五分濶一尺九寸五雲閣吏為正臣作木石山中拔舊盟嵗寒不改此君清相期雲霧隨龍化更待天風引鳯鳴靜對聞琴宜夜雨閒來欹枕愛秋聲老樵自是伶倫手調入黃鐘取次成笑隱元髙房山墨竹坡石圖紙本立軸髙三尺三寸濶一尺二寸克恭為子敬作髙侯落筆有生意玉立兩竿煙雨中天下幾人能解此蕭蕭寒碧起秋風子昂題元王叔明夏山髙隱圖絹本立軸長四尺二寸濶一尺八寸淡設色重山疊嶂倣董巨筆欵在右方楷書二行夏山髙隱至正二十五年四月十七日黃鶴山人王蒙為彥明徴士畫于吳門之寓舍元黃子久秋山圖紙本立軸長一尺九寸濶八寸元統癸酉十月一峰道人為太朴先生作癡翁為危承㫖作此年過渭老而目力瞭然筆法古雅大有荆關遺韻僕之㸃染不敢企也雲西老人癡翁畫峰巒淡渺茫神機磅礴處不羡愷之珍重良鶴齊宋暹題于懶雲窩元倪元鎮竹石霜柯紙本立軸髙二尺一寸濶一尺十一月一日燈下戲寫竹石霜柯并題五言久客令人厭為生只自憐每書空咄咄聊偃腹便便野竹寒煙外霜柯夕照邉五湖風月迥好在轉漁船雲林子去年溪上泊輕舟笑弄滄波狎海鷗雲去樓空無此客寒林留得數竿秋曲江居士題懶瓚先生懶下樓先生避俗避如仇自言寫此三株樹清閟齊中筆已投老鐵在素軒醉筆雲林此圖為曹雲西作楊鐵崖先生跋中所云素軒者是也曲江居士錢惟善與鐵史二詩其清絶同於髙士畫法詩意每為展玩吟咏滌盡胸中百斛塵矣舊屬婁江王煙客太常家藏豫從其嗣君得之因憶曩日藏有師子林圖竹石小山江亭山色諸卷幅皆散去無復存幸獲此幀為娛老之物能無珍祕耶江上外史笪在辛記元梅花道人墨竹絹本立軸長三尺二寸濶二尺四寸晴霏光耀耀曉日影曈曈為問東華塵何如北窗風梅道人戲墨元盛子昭松亭讀書圖絹本立軸長四尺餘濶一尺七寸欵在右方盛懋二字子昭長印季畫師稱盛昭天機妙出秋霜毫巖屏屹峙千元萬疊喬林六月藏風濤誅茅新構臨蒼麓門對橫唐渺晴淥小舟蕩漾若鳬鷖漁父為家穩於屋二山欄楯何嶙峋那知海內飛紅塵無名藥草迷行徑平地蕩胸生白雲索居信足求吾志杖屨何曽入城市翛然野服淡無營從教許史論豪貴我嘗叨祿方解簮披圖湔却奔馳心相尋甚欲窮幽賞擬抱牀頭霹靂琴歸政叟王友行盛子昭秋林漁隱圖紙本立軸長三尺濶一尺左方小楷書欵二行至正庚寅五月望日武塘盛懋子昭為竹溪作秋林漁隱萬里滄波杳靄中平林落日映丹楓黃塵撲馬長安道誰似磯頭一釣翁林鏞羣動日擾擾何由止囂煩我心一以靜庶或澄其源天髙四山寂落日孤雲鶱至理無不在朝市同丘園君應領斯妙吾亦忘其言題九龍山人王紱長松老樹水灣環野徑無人石蘚斑幾許秋光看覺好恰如苕霅雨餘山江村題元黃潛倣大癡富春山圖卷紙本髙一尺長一丈八尺倣大癡而淡加設色筆意蕭逺不凡其人無考按元黃文獻公溍亦别號氷壺以俟博識者至正三年秋氷壺外史筆元王元章墨梅紙本立軸小幅中萬蘂千花若不經意自成一家題云凍壓瑤臺月影虛玉妃謫墮夢糢糊無人可論江南事小引春風上畫圖王冕不分村野與溪橋亂寫橫枝一兩條酒醒只疑疏影落朧朧煙月伴寒宵士竒題王元章月下梅花絹本立軸長五尺餘濶三尺八寸雙幅絹平生愛梅頗成癖踏雪行穿一雙屐六花散漫飛滿空千里萬里同一色衝寒不畏朔風吹乘興來此江之湄繁花滿樹梅欲放倣佛羅浮曽見時南枝橫斜北枝好北枝看過南枝老中有一枝至奇絶萬蘂千葩弄天巧老夫見此喜欲顛載酒大酌梅花仙仙人怪我來何晚一别已是三千年醉來仰面卧深雪夢扶飛瓊上天闕酒醒起視夜何其曉烏啼殘半江月㑹稽王冕元章寫明金本清雙鈎竹紙本立軸看遍長安陌上花題詩偏憶舊生涯門前一曲南湖水多種琅玕護釣槎朽木居士書明夏太常湘江風雨竹卷紙本髙一尺四寸餘長三丈三尺有竒錢唐戴君文進博雅之士也善寫山水與余有舊好持紙一卷求寫湘江風雨奈余人事紛擾久未能復一日小酌之後頗有餘興遂作此圖殊覺粗俗可愧觀者幸勿誚余之狂而恕其醉也般門弄斧之議其能免乎正統元年夏六月望後東吳夏昶識題湘江風雨圖於湘江而極竹之所以為情態者天下之竹莫多則莫越乎風雨時也問之湘江之人其知愛而加玩以適夫趣者蓋少焉然而古今之言竹者必曰湘江至於善寫竹者亦必作風雨然後有以盡其妙也夫以古今之言竹者必曰湘江而湘江之人不知所愛豈不以其多乎風雨之態生乎毫端見者恍然耳有聞乎錦瑟之音鷓鴣之啼聲猶能興夫感今懷古之思而湘江之人不知有此豈不以其熟於目乎輕於多而忽於熟者豈徒湘江之人之於竹哉夫玉世之所共寶也居崑山者以之抵鵲物固不足論也士之猶夫是者深可慨哉吏部考功主事玉峰夏公仲昭每當退食之暇輒事揮灑其法蓋得之於中書舍人錫山王先生孟端在今獨步而錢唐戴君文進乃為修飾之士其於圖繪偏得昔人所長仲昭雅推重之為寫此卷而題之曰湘江風雨觀其水石聨延駢梢挺節逺近相映帶爽氣蕭然襲人巾袂而竹之情態極於此矣竹豫所愛之物而仲昭文進則豫所愛之人也兹因文進以卷出示而請題焉因書此以復然豫又愛文進之獨異夫湘江之人也耶文時正統二年龍集丁巳夏五月望前一日進士林郎大理寺左評事兼修國史姑蘇張益題并書夏公仲昭所湘江風雨竹一卷乃太常少卿東吳作者也以贈錢塘畫史戴君文進學士張先生士謙嘗為序之文進復以贈同邑髙隱瞿君德宣德宣復囑豫題其後蓋仲昭永樂乙未進士素工書被選在綸閣太宗皇帝甚重其書以餘力師中書錫山王君孟端寫竹盡得其妙孟端沒仲昭之竹遂獨步當世四方之人得其一筆莫不寶愛之仲昭作是時為吏部考功主事正其中年得意筆也說者謂書與畫一法耳工書者必工畫其信然哉豫觀其平昔所作或直幅或橫披不過三五竿而止耳十數竿而止耳未見有至若干尺多至數百竿若是卷之富者也誠以文進一代良畫史也山水人物翎毛花卉無不臻妙是以仲昭曲盡其能以示之以文進為具眼也文進見之能不撫卷而愛羡之乎使其未造精妙文進名手顧肯求之豫以是知是卷之不易得也且竹之為態得水則格益幽清得風雨則姿益活潤况湘江乃多竹之地仲昭抽毫運思狀其景於目前鷺灘鷗渚縈回曲折清流激湍潺湲溶漾而叢篁密篠掩映於兩岸之間微風搖動疏雨淋漓其幽清活潤蓋有無窮之趣焉一開卷間真若接蒼梧暝煙而駐重華之霓旌也真若弄瀟湘水雲而鼓江妃之瑤瑟也真若翠羽毰毸而鳯來巢也真若長身交亞而龍欲化也真若風淒雨霏枝翹節徑山長水逺而望不極也竹之妙信無以加於此者矣昔白樂天作畫竹歌贈蕭協律有云蕭郎蕭郎老可惜手戰眼昏頭雪色自言便是絶筆時從今此竹尤難得今仲昭年已八十餘雖欲復為此必若蕭郎之不能矣則斯卷也得不為世寶哉德宣博雅好古君子也文進持所愛為之贈其重德宣亦至矣豫故道其為難得俾益知珍襲焉成化四年戊子嵗秋七月既望賜進士及第禮部侍郎致仕前翰林學士左春坊大學士侍文華殿講讀直東閣兼修國史同邑倪謙書於靜存軒賞之人而後其名益稱爽物有可賞之竒必遇鑒所遇矣徒多其有實之併喪名孰稱揚物之遭逢從㑹信有幸與不幸歟夏太常之墨竹蔣儀曹之題署張倪二學士之髙文皆一世之竒也所謂物華天寶人孰得而掩之文進畫妙空當時藝苑故太常為盡心焉其寄情髙山流水邈乎其聽於子期矣文進不有其有持贈德宣德宣博雅者也豈有按劒夜光盼無因而至前耶庶矣其竒遇而萃諸鑒賞也其是卷之稱揚而名後世無疑余心若有感也天下之竒有需於遭逢從㑹者豈獨物而已哉書以歸於德宣俾永保之以志豫心所感後之觀者應得夫鑒賞之竒乎蕩南京大理寺卿致仕仁和夏時正書於北郭白僑居時年六十又二云與可之竹妙而不真息齊之竹真而不妙其古於竹理微矣三百年以來而有仲昭真具寫生妙手神光奕奕每對其手澤便如莊服見天帝然未有若此卷之神妙者一縱一橫大山長水咫尺萬里矣吉甫先生篤誠髙雅神物遂歸之此亦類聚之義也展閲間不覺驚歎世識天啓乙丑鹿城歸昌沈啓南寫韓錦衣園林六景圖紙本髙九寸濶一尺三寸餘計六幀設色畫右圖俱作林泉小景人物衣冠亭臺花木種種畢肖乃早年精徑之筆每幅題以小楷詩品亦髙緩帶垂楊下觀魚流水中江湖人不逺尺素幾時通沈周大將心忠赤栽花亦向陽捫心對花坐彼此共恩光沈周槐影張髙幕林亭潑緑油將軍讀韜略六月氣如秋沈周鸂鶒荷花影蜻蜓青竹竿還知掣鼇地東海始為寬沈周有月來青天落我酒杯裏酒盡忽不見天上長如此沈周老圃韓公第新亭上將家秋風吹白酒無事醉黃花沈周右石田先生畫冊六幅蓋為韓襄毅公之子錦衣君作精妙無比不知何緣流落至此余寓京師偶爾得之喜不自勝坐卧必觀殆忘寢食昔嘉弟藏有石田畫冊每以詫余余將歸而誇之不能自祕汝所一見遂豪奪而去蓋其好又有甚於余者因思楚弓之義更不必論其在彼在此也題而歸之汝所其謹藏不可更為人豪奪也坐客皆為之一笑嘉靖辛酉臘月望日文彭謹題沈啓南空亭秋色圖紙本此豫十年前所作後齊藏以為可觀清明日出示舟寓生澀甚醜重為補苴數筆終不能掩也辛丑沈周沈啓南釣月亭圖卷紙本前有引首長洲文璧篆書釣月亭三字學趙松雪設色精工後方用有竹莊主人朱文印記别紙又吳氏釣月亭記𢎞治九年嵗在丙辰冬十一月辛亥日鄉貢進士里人祝允明記又釣月亭記戊午四月草日鄉貢進士郡人都穆記文俱不録長洲陳璚徐禎卿黃雲題識俱佳水心亭上詠滄浪閒拂珊瑚夜氣凉碧落欲將吾手摸青天堪倚釣竿長要知水月原同相亦把人魚付兩忘曲曲闌干獨憑處鬢絲零落怯秋光沈周一撮黃茅覆碧波偷閒功業晚來多絲綸不管魚龍事烏兔其如水石何未為玉璜思尚父肯將靈餌誤嫦娥江湖頃刻歸城市誰把新詩記唱和祝允明翼翼虛亭假碧渠坐令城市類溪居髙懷不減元真子新匾重拈仲晦書夜靜水寒聊復爾酒醒風起欲何如江湖滿地堪乘興安用煙波目釣徒長洲文璧沈啓南虞山古檜圖卷紙本髙一尺四寸長一丈二尺水墨作虬枝三株蒼古屈曲瑗􅓨滿紙後題三十餘行詞翰雙美誠名品也虞山至道觀有所謂七星檜者相傳為梁時物也今僅存其三餘則後人補植者而三株中又有雷震風擘者尤為詭異真竒觀也暇中與子壻史永齡往觀焉永齡因請圖之歸為而翁西村先生之玩蓋以西村未嘗見并寫歸途所得詩於後西村寧不有以教我乎昭明臺下芒鞋緊虞仲祠前石路回老去登臨誇健在舊游山水喜重來雨乾草愛相將發春淺梅嫌瑟縮開傳取梁朝檜神去袖中疑道有風雷按永齡字德徴成化甲辰人日沈周虞山老檜三株青斗壇半掩招搖星道人丹成化鶴去三檜夭矯飛龍形是誰手植經千載曽見昭明讀書在幾回天上葬神仙不獨人間變桑海古人今人繞樹行古今人去樹長生乃知徑氣合元化不與凡木爭枯榮長洲老石好竒者百里攜杯遊樹下浩嗟天下有樹此樹無我去此樹何人圖三日經營雙眼力滿空蒼翠移真跡鶴骨虬筋左紐文雷裂霜皴古秋色日暮袖歸歸不得滿山風雨山靈惜居然贈與卧雲人長嘯寒風生石壁於乎石君詩畫天下知此筆尤為天下竒勸君風雷當掩户恐化蛟龍擘空去為吳興張淵生老氏宫七星檜海虞七星檜宜羣木冠列與邑作竒觀廣墀氣蕭森入門懍欲汗信哉天地成沃如雨露灌傳植從蕭梁其說我恐謾驗斗形叵全七既斃其半三株實聊存難執嵗月算各各具一異形容匪詞翰西體裂多槁豁然敞三判東本活亦裂筋骸互續斷北者蜷而秃袖破舞脫腕葉亦不暇葉幹亦不暇幹左文皮索綯孤蕝頂留繖槎折象齒蹺癭決鬼目爛疏越復叢冗骳骫仍軒岸蛟攣及猊跛努力不得竄矛長及劒短接戰驚楚漢如此紛怪駭聃君不能按知遭幾雷厄還屢兵火難生死付冥然造物反被玩君子重貞固頑醜小人讕緣髙坐吹簫我欲呼鶴鸛從根覓埋丹澆泉覬紅燦長生就其䕃永作婆娑伴咏致道觀靈蹟成檜蛟欲走夜壇雷飛石驚門不敢開明日道人一笑緑隂仍鎖舊樓臺藏丹地底發金輝半夜通明識者希闕雨老師還急起畫符封井鴿先飛暮春虞山阻一夜篷聲滴向晨惜無笠屐訪嶙峋山行敗却乃公事水宿悔來今兩人旗鼓迎神妨舊社酒杯供我送殘春明年花栁如相待白髮還宜老健身走經尚湖望虞山日午放船湖上頭虞山隨船不休髙雲仰見出翠壁飛影下接滄波流青林人家隱山麓雞鳴犬吠聞中洲鸕鷀羣棲竹葉暗蜻蜓特立荷花秋採蓮還歌採蓮曲落景在樹尤堪遊小舟爭渡各先去獨逆風波渾不憂三月九日舟泊虞山下仰見遊人續續於椒麓間可愛賦此秋霽色澄虞山正與遊事偶一年無多月春三及九勿厭傾郭人隨俗悅親友春風若招邀處處閙花栁林華競妍鮮無復有惡醜間見叢緑中逺映紅裙婦休云惱山谷㸃綴亦可取摳趨識壯步屢頓驗皓首上下相追攜從髙引衣手尚有散逸流列石自爼豆老夫目中盡末在逐逐走况當氣力衰孤坐還可酒過烏目山髙道禪居山復岡回靜結廬林蹊生處我來初杖欹新緑苔痕裏屐踐殘紅雨迹餘酒榼臨春聊遣撥禪單消日自清虛壁塵怪是遊題滿教種芭蕉别倩書虞二月二十日與吳宫諭遊虞舟中見山即咏山我鄰壤欲往路非遙比來無好抱風日虛春朝兹藉佳友興理舟訪岧嶤漸喜蒼翠近豁眼嵐霏消上有古松杉落落旌幢標其下見行人往來雜僧樵我坐意亦馳豈同雙足超何異謝康樂五湖眺且遨􅋈舟山下同遊至道觀登梁昭明書臺訪徐神翁丹井復作一首秀色目已周復騁登髙足青山不嫌人所取隨我欲巍巍古仙壇寂寂奠林麓七檜交雲霞靈飈散清馥崇臺轉磴道攀緣把旁竹同行玉堂彥髙咏應虛谷逍遙東山風能去歌管俗申紙驚連章謬圖附一軸聊以識欣賞流傳亦何卜或恐聞邦人有酒悔無逐層留戀山間逮暮始返棹遲遲二三客默默對岑轉柁清川口忽然西日沈常時急歸路兹焉迂我心行行望不輟去逺思兹深所思何以寫丹青亦難任不如就明月彈我丘中琴便題拂水崖賖只有看山是勝緣青鞋布襪且輕天收雨腳今日我趁花時遣老年絶壁雲扶將墮石豁崖風勒下奔泉此來不分空歸去旋構新篇揀竹鐫往年曽與德徴觀虞山七星檜為德徴既圖而詩之矣兹攜來重題不覺易寒暑後續有遊漫得此數篇連録卷尾皆虞山一家事約德徴他日更得如拂水崖者縱攀之以驗其勝云𢎞治壬子夏五望沈周識沈啓南設色雲林小卷紙本髙六寸長八尺餘倪迂戲於畫簡到更清臞名家百餘䙫所惜繼者無况有冲淡篇數語辨小圖吳人助清玩重價爭沽諸後雖有學人紛紛墮繁蕪崔子強我能依樣求葫蘆墨澀不成運林慚澗與俱何敢希典刑虎賁實區區醜惡正欲裂捲去不須臾今夕秋燭下載見眼糢糊妄意加潤色泥塗還附塗崔子豈不鑒愛及屋上烏淵甫嘗索此小景蓋倣倪雲林筆意為之特草草耳今徴題持來燈下更添數筆雖曰潤色之終不能掩其陋也𢎞治辛亥九月前一日長洲沈周沈啓南春雲疊嶂圖立軸十月消閒障子成看君堂上白雲生有人若問誰持贈萬疊千重是我情文美趙君知豫老抱拙靜逺以漢鼎為贈用助蕭齊日長焚沈悅性其惠多矣文美讀書好古於書畫尤萃意焉因作春雲疊嶂報之愧莫敵施也𢎞治新元七夕日沈周沈啓南八帙圖立軸長四尺五寸濶一尺六寸人物山水淡設色八帙身加健三春月倍明母儀兼婦道清世樂長生績橘黃金顆蟠桃赤玉英採花浸夀酒催進紫鸞笙沈周陸母今年慶八旬顔如丹渥尚精神誰知膝下稱觴子便是懷中奉橘人萱草忘憂偏得意桃花含笑不勝春瑤池宴飲笙歌夜應與麻姑作主賔成化壬寅三月望日八十三翁沈貞吉吕廷振松鶴圖絹本立軸世傳廷振畫甚多此軸小而筆雅又有題句故録之不向雲霄汗漫游昂然獨立倚髙秋一聲喚起天邊月便覺清光遍九州𢎞治己酉仲冬九日四明吕紀為金陵故人傅克敬先生寫題祝京兆書陶靖節田居詩卷藏經紙四幅計詩六首行草書字不及錢大後用小字題云梁昭明太子云有能觀淵明之文者馳競之情遺鄙吝之意祛貪可廉懦可立仁義可蹈爵祿可辭何淵明之見重若此哉余領京兆如逆旅寄寓未嘗一日忘歸田也偶過石湖僧寮見几上有淵明集舉未竟而恬淡止足之意有先後同符者矣遂録其田居六詠以見志云時正德庚午秋八月既望枝山祝允明識又見一卷為陸人傑書夢草記紙本行書倣李北海遒徑有致後題正德庚午仲春之望京闈鄉貢進士祝允明記臣書梨谷記紙本行草書倣米海又一卷為張堯嶽縱橫有度閲題識亦云正德五年嵗在庚午夏六月既望京闈鄉貢進士太原祝允明書三卷俱係庚午嵗書盛年得意筆也文待詔仿倪元鎮山水卷紙本髙八寸長一丈六尺紙凡四接鈐縫有司徒之章前有康氏中丞世家圖書府印後欵細楷四行倪元鎮畫本出荆關然所作皆咫尺小幅而思致清遠無一㸃塵俗氣余暇日戲用其墨法衍為長卷所謂學邯鄲而失其故步癸丑十月十又三日徴明識時年八十有四衡翁畫法妙絶古今兼衆長而時出之蓋人品既髙下筆自能過人也作此長卷清潤出塵加倪一等使迂復起亦當退讓耳年癸丑長至日穀祥題衡山先生於丹青獨妙晚更喜水墨描寫此卷筆意其源得之倪元鎮元鎮得之荆浩關同按浩在晚唐為畫家一時山斗同親授衣鉢遂窮其技名並稱焉此道中子美牧之也元鎮天韻標令陶鑄千古至於衡山先生大海也何所不有况此復斟酌三家之勝有浩有同有元鎮而又自有衡山窮神極致而後可知己浩之言曰吳道子畫有筆而無墨項容有墨而無筆吾當采二子所長獨成一家之體噫此可以觀此卷庚子端午日康于寰識文待詔湘君圖紙本立軸長三尺五寸濶一尺外運筆如絲朱碧簡淡觀其自識云取法於吳興二公然逸韻處當出藍也余少時閲趙魏公所畫湘君湘夫人行墨設色皆極髙古石田先生命余臨之余謝不敢今二十年矣偶見畫娥皇女英者顧作唐妝雖極精工而古意略盡因倣佛趙為此而設色則師錢舜舉惜石翁不存無從請益也衡山文徴明記右作小楷五行其上又書屈子九歌二章倣雲林楷法清徑有致署云正德十二年丁丑二月己未停雲館中書筆法如屈鐵絲如倪迂所云力能扛鼎文太史此圖者非仇英輩可得夢見也故戊寅七月王稚登題先君寫此時甫四十八嵗用筆設色之精非他幅可擬追數當時已六十二寒暑矣藏者其寶惜之萬厯六年七月仲子嘉題江村銷夏録卷二
